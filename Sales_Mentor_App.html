e;\n  document.getElementById('sb-role-label').textContent = R.label;\n  // nav\n  renderNav(R);\n  // topbar\n  document.getElementById('topbar-title').textContent = 'Dashboard';\n  renderTopbarActions(R);\n  // greeting\n  document.getElementById('greeting-text').textContent = R.greeting;\n  document.getElementById('greeting-sub').innerHTML = R.greetingSub;\n  document.getElementById('role-chip').textContent = R.label;\n  document.getElementById('role-chip').style.background = R.chipBg;\n  document.getElementById('role-chip').style.color = R.chipColor;\n  // widgets\n  const w = R.widgets, ws = R.widgetSubs;\n  document.getElementById('w-customers-val').textContent = w.customers;\n  document.getElementById('w-customers-sub').textContent = ws.customers;\n  document.getElementById('w-opps-val').textContent = w.opps;\n  document.getElementById('w-opps-sub').textContent = ws.opps;\n  document.getElementById('w-meetings-val').textContent = w.meetings;\n  document.getElementById('w-meetings-sub').textContent = ws.meetings;\n  document.getElementById('w-tasks-val').textContent = w.tasks;\n  document.getElementById('w-tasks-sub').textContent = ws.tasks;\n  // tasks table\n  const taskCount = currentRole === 'member' ? 2 : currentRole === 'admin' ? 5 : 5;\n  document.getElementById('task-count').textContent = taskCount;\n  renderTasksTable(taskCount);\n  renderUsersTable();\n  renderProducts();\n  if (currentRole !== 'admin') renderDashboardCalendar();\n}\n\nfunction renderNav(R) {\n  let html = '';\n  R.nav.forEach(sec => {\n    html += `<div class=\"nav-section-label\">${sec.label}<\u002Fdiv>`;\n    sec.items.forEach(item => {\n      const active = item.id === activeNav;\n      let badgeVal = item.badge;\n      try {\n        if (item.id === 'customers') badgeVal = String(CUSTOMERS_DATA.filter(c => c.type !== 'Lead').length);\n        else if (item.id === 'leads') badgeVal = String(CUSTOMERS_DATA.filter(c => c.type === 'Lead').length);\n      } catch (e) { /* CUSTOMERS_DATA not yet initialized on first paint */ }\n      const badge = badgeVal ? `<span class=\"nav-badge ${item.badgeClass||''}\">${badgeVal}<\u002Fspan>` : '';\n      html += `<button class=\"nav-item ${active?'active':''}\" onclick=\"navClick('${item.id}')\">${icons[item.icon]||''}${item.label}${badge}<\u002Fbutton>`;\n    });\n  });\n  document.getElementById('sb-nav').innerHTML = html;\n}\n\nfunction renderTopbarActions(R) {\n  let html = '';\n  if (currentRole !== 'admin') {\n    html += `<button class=\"tb-btn primary\" style=\"margin-right:8px\" onclick=\"openSalesConsultant()\">💬 Sales Consultant<\u002Fbutton>`;\n  }\n  if (R.showToggle) {\n    html += `<button class=\"toggle-pill ${myRecordsOnly?'on':''}\" onclick=\"toggleMyRecords()\"><span class=\"toggle-knob\"><\u002Fspan>My Records Only<\u002Fbutton>`;\n  }\n  document.getElementById('topbar-actions').innerHTML = html;\n}\n\nfunction renderTasksFiltered() {\n  const st = listState.tasks;\n  let list = tasks.filter(t => currentRole === 'member' ? t.ownerI !== 'AY' : true);\n  if (st.filter === 'open')   list = list.filter(t => t.status !== 'Cancelled');\n  if (st.filter === 'closed') list = list.filter(t => t.status === 'Cancelled');\n  const q = (st.q||'').toLowerCase();\n  if (q.length >= 3) list = list.filter(t =>\n    (t.meeting||'').toLowerCase().includes(q) || (t.customer||'').toLowerCase().includes(q));\n  const total = list.length;\n  const page  = list.slice((st.page-1)*PAGE_SIZE, st.page*PAGE_SIZE);\n\n  let html = `<thead><tr><th>Task Type<\u002Fth><th>Meeting<\u002Fth><th>Customer<\u002Fth><th>Owner<\u002Fth><th>Date<\u002Fth><th>Status<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>`;\n  if (!page.length) {\n    html += '<tr><td colspan=\"7\" style=\"text-align:center;padding:32px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No tasks found.<\u002Ftd><\u002Ftr>';\n  } else {\n    page.forEach(task => {\n      const actions = task.status === 'Scheduled'\n        ? `<button class=\"start-btn\" onclick=\"openCoaching(${JSON.stringify(task).replace(/\"/g,'&quot;')})\">&#9654; Start Session<\u002Fbutton><button class=\"cancel-task-btn\" title=\"Cancel Task\" onclick=\"openCancelModal(${task.id})\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6\"/><path d=\"M10 11v6M14 11v6\"/><path d=\"M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2\"/><\u002Fsvg><\u002Fbutton>`\n        : `<span style=\"font:400 12px/1 var(--font-sans);color:var(--genbil-ink-4)\">&#8212;<\u002Fspan>`;\n      html += `<tr>\n        <td><span class=\"task-type ${task.typeClass}\">${task.type}<\u002Fspan><\u002Ftd>\n        <td style=\"font-weight:500\">${task.meeting}<\u002Ftd>\n        <td>${task.customer}<\u002Ftd>\n        <td><div style=\"display:flex;align-items:center;gap:7px\"><div class=\"avatar-sm\" style=\"background:${task.ownerColor}\">${task.ownerI}<\u002Fdiv>${task.owner}<\u002Fdiv><\u002Ftd>\n        <td style=\"color:var(--genbil-ink-3)\">${task.date}<\u002Ftd>\n        <td><span class=\"status-chip ${task.stClass}\">${task.status}<\u002Fspan><\u002Ftd>\n        <td><div style=\"display:flex;gap:6px;align-items:center;\">${actions}<\u002Fdiv><\u002Ftd>\n      <\u002Ftr>`;\n    });\n  }\n  html += '<\u002Ftbody>';\n  document.getElementById('tasks-table').innerHTML = html;\n\n  // Pager (append to tasks-table parent)\n  const tbl = document.getElementById('tasks-table');\n  const old = tbl.parentElement.querySelector('.list-pager'); if (old) old.remove();\n  renderPager('tasks', total, tbl, () => { renderTasksFiltered(); document.getElementById('list-table').innerHTML = document.getElementById('tasks-table').innerHTML; });\n}\n\nfunction renderTasksTable(count) {\n  renderTasksFiltered();\n}\n\nlet _userSearchQ = '';\n\nfunction onUserSearch(val) {\n  const hint = document.getElementById('user-search-hint');\n  if (val.length > 0 && val.length < 3) { if (hint) hint.style.display = 'block'; return; }\n  if (hint) hint.style.display = 'none';\n  _userSearchQ = val.toLowerCase();\n  renderUsersTable();\n}\n\nfunction renderUsersTable() {\n  const q = _userSearchQ;\n  const filtered = q.length >= 3\n    ? users.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))\n    : users;\n  let html = `<thead><tr><th>User<\u002Fth><th>Email<\u002Fth><th>Role<\u002Fth><th>Language<\u002Fth><th>Member Since<\u002Fth><th>Status<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead><tbody>`;\n  if (!filtered.length) {\n    html += '<tr><td colspan=\"7\" style=\"text-align:center;padding:28px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No users match your search.<\u002Ftd><\u002Ftr>';\n  }\n  filtered.forEach(u => {\n    html += `<tr>\n      <td><div style=\"display:flex;align-items:center;gap:9px\"><div class=\"avatar-sm\" style=\"background:${u.color}\">${u.initials}<\u002Fdiv><span style=\"font-weight:500\">${u.name}<\u002Fspan><\u002Fdiv><\u002Ftd>\n      <td style=\"color:var(--genbil-ink-3)\">${u.email}<\u002Ftd>\n      <td><span class=\"role-chip\" style=\"background:${u.role==='App-Admin'?'#EDE9FE':u.role==='Sales Director'?'#EFF6FF':'#F0FDF4'};color:${u.roleColor};font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600\">${u.role}<\u002Fspan><\u002Ftd>\n      <td style=\"color:var(--genbil-ink-3)\">${(LANG_META[u.language]||LANG_META.tr).label}<\u002Ftd>\n      <td style=\"color:var(--genbil-ink-3)\">${u.date}<\u002Ftd>\n      <td><span class=\"status-chip ${u.status==='Active'?'st-completed':'st-cancelled'}\">${u.status}<\u002Fspan><\u002Ftd>\n      <td><div class=\"user-actions\">\n        <button class=\"ua-btn\" onclick=\"editUser('${u.email}')\">Edit<\u002Fbutton>\n        <button class=\"ua-btn\" onclick=\"toggleUserStatus('${u.email}')\">${u.status==='Active'?'Suspend':'Activate'}<\u002Fbutton>\n        <button class=\"ua-btn danger\" onclick=\"removeUser('${u.email}')\">Remove<\u002Fbutton>\n      <\u002Fdiv><\u002Ftd>\n    <\u002Ftr>`;\n  });\n  html += '<\u002Ftbody>';\n  document.getElementById('users-table').innerHTML = html;\n}\n\nfunction typeBadge(type) {\n  const c = type === 'System Prompt' ? { bg:'#F3E8FF', fg:'#7C3AED' } : { bg:'#E0F2FE', fg:'#0284C7' };\n  return `<span style=\"font:600 10px/1 var(--font-sans);background:${c.bg};color:${c.fg};padding:2px 8px;border-radius:999px\">${type}<\u002Fspan>`;\n}\nfunction renderAccountPromptsList() {\n  const list = document.getElementById('ap-list');\n  if (!list) return;\n  list.innerHTML = '';\n  ACCOUNT_PROMPTS.forEach((p, idx) => {\n    const evChip = (p.type === 'System Prompt' && p.eventType)\n      ? `<span style=\"font:500 10px/1 var(--font-sans);background:#F1F5F9;color:var(--genbil-ink-3);padding:2px 8px;border-radius:999px;border:1px solid var(--genbil-line)\">${p.eventType}<\u002Fspan>`\n      : '';\n    const isDisabled = p.status === 'disabled';\n    const statusChip = isDisabled\n      ? `<span style=\"font:600 10px/1 var(--font-sans);background:#F1F5F9;color:var(--genbil-ink-4);padding:2px 8px;border-radius:999px;border:1px solid var(--genbil-line)\">DISABLED<\u002Fspan>`\n      : '';\n    list.innerHTML += `<div class=\"policy-card\" style=\"${isDisabled ? 'opacity:.55' : ''}\">\n      <div class=\"policy-ic\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><path d=\"M10 1H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6L10 1z\" stroke=\"#7C3AED\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><path d=\"M10 1v5h5\" stroke=\"#7C3AED\" stroke-width=\"1.3\" stroke-linejoin=\"round\"/><\u002Fsvg><\u002Fdiv>\n      <div>\n        <div class=\"policy-name\">${p.name}<\u002Fdiv>\n        <div class=\"policy-meta\">${p.meta}<\u002Fdiv>\n        <div style=\"display:flex;gap:5px;margin-top:6px\">${typeBadge(p.type)}${evChip}${statusChip}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"policy-actions\">\n        <button class=\"ua-btn\" onclick=\"viewAccountPrompt(${idx})\">View<\u002Fbutton>\n        <button class=\"ua-btn\" onclick=\"updateAccountPrompt(${idx})\">Update<\u002Fbutton>\n        ${isDisabled\n          ? `<button class=\"ua-btn\" onclick=\"enableAccountPrompt(${idx})\">Enable<\u002Fbutton>`\n          : `<button class=\"ua-btn\" onclick=\"disableAccountPrompt(${idx})\">Disable<\u002Fbutton>`}\n        <button class=\"ua-btn danger\" onclick=\"deleteAccountPrompt(${idx})\">Delete<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  });\n}\nfunction renderAccountPromptsTab() {\n  document.getElementById('market-view').innerHTML =\n    '<div style=\"max-width:920px;display:flex;flex-direction:column;gap:16px\">' +\n      siTopTabsHTML() +\n      '<div style=\"display:flex;align-items:center;justify-content:space-between\">' +\n        '<div style=\"font:600 15px/1 var(--font-sans);color:var(--genbil-ink)\">Account Prompts <span style=\"font:400 12px/1 var(--font-sans);color:var(--genbil-ink-4)\">' + ACCOUNT_PROMPTS.length + ' item(s)<\u002Fspan><\u002Fdiv>' +\n        '<button onclick=\"addAccountPrompt()\" style=\"padding:8px 18px;border-radius:8px;border:none;background:var(--sm);color:#fff;cursor:pointer;font:600 12.5px/1 var(--font-sans)\">+ Add Prompt<\u002Fbutton>' +\n      '<\u002Fdiv>' +\n      '<div style=\"display:flex;flex-direction:column;gap:10px\" id=\"ap-list\"><\u002Fdiv>' +\n    '<\u002Fdiv>';\n  renderAccountPromptsList();\n}\n\n// ─────────────────────────────────────────\n// NAVIGATION\n// ─────────────────────────────────────────\nfunction navClick(id) {\n  activeNav = id;\n  if (id === 'dashboard') { showDashboard(); return; }\n  if (id === 'tasks') { showList('tasks'); return; }\n  if (id === 'customers') { showList('customers'); return; }\n  if (id === 'leads') { showList('leads'); return; }\n  if (id === 'opportunities') { showList('opportunities'); return; }\n  if (id === 'meetings') { showList('meetings'); return; }\n  if (id === 'competitors') { showList('competitors'); return; }\n  if (id === 'users') { showAdminView('users'); return; }\n  if (id === 'setup') { showAdminView('setup'); return; }\n  if (id === 'products') { showAdminView('products'); return; }\n  if (id === 'market-profiles') { showMarketView(); return; }\n  if (id === 'agent-activity') { showAgentActivity(); return; }\n  if (id === 'calendar') { showDashboard(); return; }\n  renderNav(roles[currentRole]);\n}\n\nfunction showDashboard() {\n  activeNav = 'dashboard';\n  document.getElementById('main-content').style.display = '';\n  document.getElementById('market-view').style.cssText = 'display:none';\n  document.getElementById('dashboard-view').style.display = '';\n  document.getElementById('list-view').classList.remove('visible');\n  document.getElementById('admin-view').classList.remove('visible');\n  document.getElementById('market-view').classList.remove('visible');\n  document.getElementById('calendar-view').style.display = 'none';\n  document.getElementById('agent-activity-view').style.display = 'none';\n  document.getElementById('topbar-title').textContent = 'Dashboard';\n  renderNav(roles[currentRole]);\n}\n\nfunction showList(type) {\n  activeNav = type;\n  document.getElementById('dashboard-view').style.display = 'none';\n  document.getElementById('main-content').style.display = '';\n  document.getElementById('list-view').classList.add('visible');\n  document.getElementById('admin-view').classList.remove('visible');\n  document.getElementById('market-view').style.display = 'none';\n  document.getElementById('calendar-view').style.display = 'none';\n  document.getElementById('agent-activity-view').style.display = 'none';\n  const titles = { tasks:'Mentor Tasks', customers:'Customers', leads:'Leads', opportunities:'Opportunities', meetings:'Meetings', competitors:'Competitors', reports:'Reports' };\n  document.getElementById('list-title').textContent = titles[type] || type;\n  document.getElementById('topbar-title').textContent = titles[type] || type;\n  if (['customers','leads','opportunities','meetings','competitors'].includes(type)) {\n    listState[type].q = ''; listState[type].page = 1;\n    renderListSearchBar(type);\n  } else {\n    const sb = document.getElementById('list-search-bar');\n    if (sb) sb.style.display = 'none';\n  }\n  const addBtn = document.getElementById('list-add-btn');\n  if (type === 'opportunities') {\n    addBtn.style.display = '';\n    addBtn.onclick = () => openOppModal(-1);\n  } else if (type === 'meetings') {\n    addBtn.style.display = '';\n    addBtn.onclick = () => openMeetingModal(-1);\n  } else if (type === 'competitors') {\n    addBtn.style.display = '';\n    addBtn.onclick = () => openCompetitorModal(-1);\n  } else if (type === 'customers') {\n    addBtn.style.display = '';\n    addBtn.onclick = () => openCustomerModal(-1, 'New');\n  } else if (type === 'leads') {\n    addBtn.style.display = '';\n    addBtn.onclick = () => openCustomerModal(-1, 'Lead');\n  } else {\n    addBtn.style.display = 'none';\n  }\n  renderListTable(type);\n  renderNav(roles[currentRole]);\n}\n\nfunction showAdminView(section) {\n  activeNav = section;\n  document.getElementById('dashboard-view').style.display = 'none';\n  document.getElementById('main-content').style.display = '';\n  document.getElementById('list-view').classList.remove('visible');\n  document.getElementById('admin-view').classList.add('visible');\n  document.getElementById('market-view').style.display = 'none';\n  document.getElementById('calendar-view').style.display = 'none';\n  document.getElementById('agent-activity-view').style.display = 'none';\n  ['users','setup','products'].forEach(s => {\n    document.getElementById('av-'+s).classList.toggle('hidden', s !== section);\n  });\n  const titles = { users:'Users & Role Management', setup:'Setup & Licence', products:'Product Catalog' };\n  document.getElementById('topbar-title').textContent = titles[section];\n  if (section === 'setup') renderWizChecklist();\n  renderNav(roles[currentRole]);\n}\n\nfunction renderListTable(type) {\n  const tbl = document.getElementById('list-table');\n  if (type === 'tasks') {\n    listState.tasks.q = listState.tasks.q || '';\n    renderListSearchBar('tasks');\n    renderTasksFiltered();\n    tbl.innerHTML = document.getElementById('tasks-table').innerHTML;\n    return;\n  }\n  if (type === 'customers') {\n    renderCustomersTable();\n  } else if (type === 'leads') {\n    renderLeadsTable();\n  } else if (type === 'opportunities') {\n    renderOpportunitiesTable();\n  } else if (type === 'meetings') {\n    renderMeetingsTable();\n  } else if (type === 'competitors') {\n    renderCompetitorsTable();\n  }\n}\n\nfunction toggleMyRecords() {\n  myRecordsOnly = !myRecordsOnly;\n  renderTopbarActions(roles[currentRole]);\n}\n\n// ─────────────────────────────────────────\n// COACHING SESSION\n// ─────────────────────────────────────────\nlet _activeTaskId = null;\nlet _sessionTimerInterval = null;\nconst SESSION_MAX_MINUTES = 5; // matches aibus_configuration.max_session_minutes\n\nfunction _startSessionTimer() {\n  _clearSessionTimer();\n  const maxSec = SESSION_MAX_MINUTES * 60;\n  let elapsed = 0;\n  const timerEl   = document.getElementById('cp-timer');\n  const timerText = document.getElementById('cp-timer-text');\n  if (timerEl) timerEl.style.display = 'flex';\n  _sessionTimerInterval = setInterval(function() {\n    elapsed++;\n    const remaining = maxSec - elapsed;\n    if (timerEl && timerText) {\n      const m = Math.floor(remaining / 60);\n      const s = remaining % 60;\n      timerText.textContent = m + ':' + String(s).padStart(2,'0');\n      timerEl.className = 'cp-timer' +\n        (remaining <= 60 && remaining > 0 ? ' warn' : '') +\n        (remaining <= 0 ? ' danger' : '');\n    }\n    if (remaining === 60) {\n      const chat = document.getElementById('cp-chat');\n      if (chat) {\n        const warn = document.createElement('div');\n        warn.style.cssText = 'display:flex;justify-content:center;margin:8px 0';\n        warn.innerHTML = '<div style=\"font:500 12px/1.4 var(--font-sans);padding:8px 16px;border-radius:8px;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A\">⏱ 1 minute remaining — the session will end automatically.<\u002Fdiv>';\n        chat.appendChild(warn);\n        chat.scrollTop = chat.scrollHeight;\n      }\n      // Always spoken aloud, even if AI replies are set to Text — a 1-minute warning is\n      // time-critical and easy to miss as silent chat text while the rep is mid-conversation.\n      gmSpeak(getCurrentUserLanguage() === 'tr'\n        ? 'Bir dakikanız kaldı, oturum otomatik olarak sona erecek.'\n        : 'You have one minute remaining — the session will end automatically.', true);\n    }\n    if (remaining <= 0) {\n      _clearSessionTimer();\n      _showSessionExpired();\n    }\n  }, 1000);\n}\n\nfunction _clearSessionTimer() {\n  if (_sessionTimerInterval) { clearInterval(_sessionTimerInterval); _sessionTimerInterval = null; }\n  const timerEl = document.getElementById('cp-timer');\n  if (timerEl) { timerEl.style.display = 'none'; timerEl.className = 'cp-timer'; }\n  const timerText = document.getElementById('cp-timer-text');\n  if (timerText) timerText.textContent = SESSION_MAX_MINUTES + ':00';\n}\n\nfunction _showSessionExpired() {\n  const panel = document.getElementById('cp-panel');\n  if (!panel) return;\n  const old = panel.querySelector('.cp-expired'); if (old) old.remove();\n  const overlay = document.createElement('div');\n  overlay.className = 'cp-expired';\n  overlay.innerHTML =\n    '<svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FCA5A5\" stroke-width=\"1.5\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polyline points=\"12 6 12 12 16 14\"/><\u002Fsvg>' +\n    '<div style=\"font:700 17px/1.3 var(--font-sans);color:#F1F5F9;text-align:center\">Session Time Limit Reached<\u002Fdiv>' +\n    '<div style=\"font:400 13px/1.6 var(--font-sans);color:#94A3B8;text-align:center;max-width:320px\">This coaching session has ended automatically after ' + SESSION_MAX_MINUTES + ' minutes. Your conversation has been saved and a summary will be generated.<\u002Fdiv>' +\n    '<button onclick=\"closeCoachingExpired()\" style=\"padding:11px 28px;border-radius:9px;border:none;background:var(--sm);color:#fff;font:600 13px/1 var(--font-sans);cursor:pointer;margin-top:4px\">Close Session<\u002Fbutton>';\n  panel.appendChild(overlay);\n}\n\nfunction closeCoachingExpired() {\n  const overlay = document.getElementById('cp-panel')?.querySelector('.cp-expired');\n  if (overlay) overlay.remove();\n  closeCoaching();\n}\nasync function openCoaching(task) {\n  // Panel meta\n  document.getElementById('cp-title').textContent = task.meeting !== '—' ? task.meeting + ' — ' + task.customer : 'Review Session — ' + task.customer;\n  _activeTaskId = task.id;\n  const snoozeRow = document.getElementById('cp-snooze-row');\n  if (snoozeRow) snoozeRow.style.display = '';\n  document.getElementById('cp-mode').textContent = task.mode === 'PRE' ? 'PRE-MEETING' : 'POST-MEETING';\n  document.getElementById('cp-mode').className = 'cp-mode-badge ' + task.modeClass;\n  document.getElementById('cp-avatar').style.display = 'none';\n  document.getElementById('cp-customer-item').style.display = '';\n  document.getElementById('cp-customer').textContent = task.customer;\n  document.getElementById('cp-owner').textContent = task.owner;\n  document.getElementById('cp-date').textContent = task.date;\n\n  // Prompt preview kapat, chat sıfırla\n  _promptPreviewOpen = false;\n  document.getElementById('cp-prompt-preview').classList.remove('open');\n  document.getElementById('cp-chat').innerHTML = '';\n\n  // Context strip: loading state\n  const strip = document.getElementById('cp-ctx-strip');\n  strip.style.display = 'flex';\n  document.getElementById('ctx-loading-state').style.display = 'flex';\n  document.getElementById('ctx-loaded-state').style.display  = 'none';\n  document.getElementById('ctx-error-state').style.display   = 'none';\n  document.getElementById('ctx-loading-text').textContent = 'Loading context… task #' + task.id + ' → Meeting → Opportunity';\n\n  // Panel aç\n  _gmEpoch++; // fresh session id — any stray reply from a previous session is discarded\n  document.getElementById('cp-overlay').classList.add('open');\n  document.getElementById('cp-panel').classList.add('open');\n  _startSessionTimer();\n\n  // Auto-start Gemini — first question spoken aloud without any button press\n  setTimeout(async () => {\n    if (!_gmReady) {\n      await connectGemini();\n      try { await navigator.mediaDevices.getUserMedia({ audio: true }); }\n      catch(e) { setCpMode('text'); setTimeout(() => document.getElementById('cp-input-text')?.focus(), 100); }\n    }\n  }, 800);\n\n  try {\n    // ── Zinciri çöz ──────────────────────────────────────────────────────────\n    const [productResult, marketResult] = await Promise.all([\n      loadProductContext(task.id),\n      getCustomerMarketInfo(task.id),\n    ]);\n    const { products, context: productContext, opportunityName } = productResult;\n    const { updates: marketUpdates, context: marketContext } = marketResult;\n\n    // ── Context strip: loaded state ──────────────────────────────────────────\n    document.getElementById('ctx-loading-state').style.display = 'none';\n    const loadedEl = document.getElementById('ctx-loaded-state');\n    loadedEl.style.display = 'flex';\n\n    // Zincir etiketi\n    const chainHTML = opportunityName\n      ? '<span style=\"color:#4ADE80\">task #' + task.id + '<\u002Fspan>'\n        + '<span style=\"color:#BBF7D0;margin:0 3px\">→<\u002Fspan>'\n        + '<span style=\"color:#166534\">' + opportunityName + '<\u002Fspan>'\n        + '<span style=\"color:#BBF7D0;margin:0 3px\">→<\u002Fspan>'\n        + '<span style=\"color:#166534\">' + (products.length ? products.length + ' product(s)' : 'no products') + '<\u002Fspan>'\n        + (marketUpdates.length ? '<span style=\"color:#BBF7D0;margin:0 4px\">·<\u002Fspan><span style=\"color:#166534\">' + marketUpdates.length + ' market update(s)<\u002Fspan>' : '')\n      : '<span style=\"color:#4ADE80\">task #' + task.id + '<\u002Fspan>'\n        + '<span style=\"color:#94A3B8;margin:0 6px\">· no opportunity linked<\u002Fspan>'\n        + (marketUpdates.length ? '<span style=\"color:#BBF7D0;margin:0 4px\">·<\u002Fspan><span style=\"color:#166534\">' + marketUpdates.length + ' market update(s)<\u002Fspan>' : '');\n    document.getElementById('ctx-chain-display').innerHTML = chainHTML;\n\n    // Ürün chip'leri\n    document.getElementById('ctx-products-row').innerHTML =\n      products.map(p => '<span class=\"ctx-chip\">' + p.code + '<\u002Fspan>').join('');\n\n    // ── Initial system prompt oluştur & önizlemeye yaz ───────────────────────\n    const eventType = task.mode === 'PRE' ? 'Pre-meeting Mentoring' : 'Post-Meeting Mentoring';\n    const mainCompetitorId = getMainCompetitorIdForTask(task);\n    const parts = assembleSystemPromptParts({\n      isGeneral: false, eventType, mainCompetitorId,\n      productContext, products, marketContext, marketUpdates,\n    });\n    renderPromptPreview(parts);\n\n    // ── First AI message — fully localised to the current user's language preference,\n    // so the canned opener never mixes languages within one sentence (see gmSpeak/STT above). ──\n    const firstName = roles[currentRole].name.split(' ')[0];\n    const uiLang    = getCurrentUserLanguage();\n    let greeting, productLine, marketLine, modeText;\n    if (uiLang === 'tr') {\n      greeting    = 'Merhaba, ' + firstName + '! ';\n      productLine = products.length\n        ? ' Bu fırsat için <strong>' + products.map(p => p.name).join('<\u002Fstrong> ve <strong>') + '<\u002Fstrong> bilgileri hazırlandı.'\n        : '';\n      marketLine = marketUpdates.length\n        ? ' <strong>' + marketUpdates.length + ' pazar güncellemesi<\u002Fstrong> yüklendi.'\n        : '';\n      modeText = task.mode === 'PRE'\n        ? '<strong>' + task.customer + '<\u002Fstrong> toplantı öncesi hazırlık oturumu başladı.' + productLine + marketLine\n        : '<strong>' + task.customer + '<\u002Fstrong> toplantı sonrası değerlendirme oturumu başladı.' + productLine + marketLine;\n    } else {\n      greeting    = 'Hello, ' + firstName + '! ';\n      productLine = products.length\n        ? ' <strong>' + products.map(p => p.name).join('<\u002Fstrong> and <strong>') + '<\u002Fstrong> information has been prepared for this opportunity.'\n        : '';\n      marketLine = marketUpdates.length\n        ? ' <strong>' + marketUpdates.length + ' market update(s)<\u002Fstrong> loaded.'\n        : '';\n      modeText = task.mode === 'PRE'\n        ? 'Your <strong>' + task.customer + '<\u002Fstrong> pre-meeting preparation session has started.' + productLine + marketLine\n        : 'Your <strong>' + task.customer + '<\u002Fstrong> post-meeting review session has started.' + productLine + marketLine;\n    }\n\n    const chat = document.getElementById('cp-chat');\n    const msg = document.createElement('div');\n    msg.className = 'chat-msg ai';\n    msg.innerHTML = '<div class=\"chat-avatar ai\">SM<\u002Fdiv><div class=\"chat-bubble\">' + greeting + modeText + '<\u002Fdiv>';\n    chat.appendChild(msg);\n\n  } catch(err) {\n    // Hata durumu — fallback prompt ile devam\n    document.getElementById('ctx-loading-state').style.display = 'none';\n    document.getElementById('ctx-error-state').style.display   = 'flex';\n    document.getElementById('ctx-error-state').textContent = 'Context load failed (' + (err.message||'unknown') + ') — continuing with default prompt.';\n\n    const chat = document.getElementById('cp-chat');\n    chat.innerHTML = '<div class=\"chat-msg ai\"><div class=\"chat-avatar ai\">SM<\u002Fdiv><div class=\"chat-bubble\">' + (getCurrentUserLanguage()==='tr' ? 'Merhaba! Oturum başladı. Bugün size nasıl yardımcı olabilirim?' : 'Hello! Session started. How can I help you today?') + '<\u002Fdiv><\u002Fdiv>';\n  }\n}\n\nfunction escHtml(s) {\n  return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n}\n\nfunction closeCoaching() {\n  _clearSessionTimer();\n  document.getElementById('cp-overlay').classList.remove('open');\n  document.getElementById('cp-panel').classList.remove('open');\n}\n\n// ── Sales Consultant: on-demand coaching chat with no task/meeting context ──\n// Uses the exact same Global Configuration System Prompt (GEMINI_SYSTEM_PROMPT) as\n// task-based sessions — connectGemini() is shared verbatim, only the panel chrome\n// and the (task-dependent) product/market context chain are skipped here.\nasync function openSalesConsultant() {\n  _activeTaskId = null;\n\n  document.getElementById('cp-title').textContent = 'Sales Consultant';\n  document.getElementById('cp-mode').textContent = 'General Sales Consultancy';\n  document.getElementById('cp-mode').className = 'cp-mode-badge mode-consultant';\n  document.getElementById('cp-avatar').style.display = 'flex';\n  // No customer/meeting in general consultancy — hide the customer meta item so the\n  // logged-in user's name isn't shown twice; keep only the owner (the rep) row.\n  document.getElementById('cp-customer-item').style.display = 'none';\n  document.getElementById('cp-owner').textContent = roles[currentRole].name;\n  document.getElementById('cp-date').textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });\n\n  const snoozeRow = document.getElementById('cp-snooze-row');\n  if (snoozeRow) snoozeRow.style.display = 'none';\n\n  _promptPreviewOpen = false;\n  document.getElementById('cp-prompt-preview').classList.remove('open');\n  document.getElementById('cp-chat').innerHTML = '';\n\n  // No task → no product/market chain to resolve; hide the context strip entirely\n  document.getElementById('cp-ctx-strip').style.display = 'none';\n\n  // Prompt preview shows exactly what the assembled system prompt will contain for a\n  // task-less General Consultation session (layers 5–6 and 8 are skipped — no customer/opportunity to resolve them from).\n  const parts = assembleSystemPromptParts({ isGeneral: true, eventType: 'General Consultancy' });\n  renderPromptPreview(parts);\n\n  _gmEpoch++; // fresh session id\n  document.getElementById('cp-overlay').classList.add('open');\n  document.getElementById('cp-panel').classList.add('open');\n  _startSessionTimer();\n\n  const uiLang = getCurrentUserLanguage();\n  const firstName = roles[currentRole].name.split(' ')[0];\n  const greeting = uiLang === 'tr'\n    ? 'Merhaba, ' + firstName + '! Ben AI Satış Danışmanınız. Belirli bir toplantıya bağlı olmadan da size koçluk yapabilirim. Başlayalım mı?'\n    : 'Hello, ' + firstName + '! I\\'m your AI Sales Consultant. I can coach you even without a specific meeting attached. Ready to begin?';\n  const chat = document.getElementById('cp-chat');\n  const msg = document.createElement('div');\n  msg.className = 'chat-msg ai';\n  msg.innerHTML = '<div class=\"chat-avatar ai\">SM<\u002Fdiv><div class=\"chat-bubble\">' + greeting + '<\u002Fdiv>';\n  chat.appendChild(msg);\n\n  setTimeout(async () => {\n    if (!_gmReady) {\n      await connectGemini();\n      try { await navigator.mediaDevices.getUserMedia({ audio: true }); }\n      catch(e) { setCpMode('text'); setTimeout(() => document.getElementById('cp-input-text')?.focus(), 100); }\n    }\n  }, 800);\n}\n\n\nfunction sendMessage() {\n  const inp = document.getElementById('cp-input-text');\n  const text = inp?.value?.trim();\n  if (!text) return;\n  inp.value = '';\n  sendMessageToGemini(text);\n}\n\nlet isRecording = false;\nlet _cpMode = 'voice';\n\nfunction setCpMode(mode) {\n  _cpMode = mode;\n  document.getElementById('cpbtn-voice').classList.toggle('active', mode === 'voice');\n  document.getElementById('cpbtn-text').classList.toggle('active', mode === 'text');\n  document.getElementById('cp-voice-area').style.display = mode === 'voice' ? 'flex' : 'none';\n  document.getElementById('cp-text-input-area').style.display = mode === 'text' ? 'flex' : 'none';\n}\n\nfunction snoozeSession(minutes) {\n  if (_activeTaskId) {\n    const idx = tasks.findIndex(t => t.id === _activeTaskId);\n    if (idx >= 0) tasks[idx].ignoredUntil = new Date(Date.now() + minutes * 60000);\n  }\n  closeCoaching();\n  const toast = document.createElement('div');\n  toast.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1E293B;color:#94A3B8;padding:11px 22px;border-radius:8px;font:500 13px/1 var(--font-sans);z-index:500;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.3);';\n  toast.textContent = 'Session snoozed for ' + (minutes < 60 ? minutes + ' minutes' : '1 hour') + '. It will reappear when the time comes.';\n  document.body.appendChild(toast);\n  setTimeout(() => toast.remove(), 3500);\n}\n\n// ─────────────────────────────────────────\n// GEMINI HTTP COACHING (REST API + Web Speech)\n// ─────────────────────────────────────────\nconst GEMINI_API_KEY   = 'YOUR_GEMINI_API_KEY';\nconst GEMINI_REST_URL  = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';\n\nconst GEMINI_SYSTEM_PROMPT = `You are a sales coach supporting a rep before and after their customer meetings.\n\nSession opening: at the very start of every meeting-based session, before asking anything else, confirm the rep is ready to talk — for example \"Are you ready to talk? Shall we begin?\" Do not ask the first real coaching question, and do not start coaching content, until the rep gives a clear positive confirmation (voice or text — \"yes\", \"ready\", \"let's go\", \"sure\", etc.). If their response is unclear, hesitant, or negative, ask what they'd prefer instead of proceeding — never assume readiness.`; // Meeting-Based Session prompt — used when a task/meeting context IS present (Start Session). The actual pre/post-meeting question script now lives as an Account System Prompt (see ACCOUNT_PROMPTS, eventType-matched), not hardcoded here.\n\n// General Consultation prompt — used when there is NO task/meeting context (Sales Consultant button).\n// Mode selection is a deterministic app-layer decision (task_id present or not), never inferred by the LLM —\n// see connectGemini() below, which picks between this and GEMINI_SYSTEM_PROMPT based on _activeTaskId.\nconst GENERAL_CONSULTATION_SYSTEM_PROMPT = `You are a sales coach available for general, on-demand consultation — this session is not tied to any specific scheduled meeting.\n\nStart by asking the seller what they need help with. Determine first:\n- First meeting\n- Follow-up meeting\n- Negotiation\n- Deal recovery\n- Account planning\n- Something else\n\nAsk ONE question at a time. Wait for the answer. If the answer is weak or vague, ask ONE follow-up to push deeper — then move on regardless. Be direct and concise.\n\nOnce the situation is clear, coach using the same underlying principles as a meeting-prep session: identify the trigger and cost of inaction, quantify the pain, validate the Champion, clarify Economic Buyer access, map internal risk, connect to the account's top priorities, and define the Next Best Action.\n\nIf the seller has no specific deal in mind, help them think through general skill areas instead — prospecting, objection handling, negotiation tactics, or account strategy — drawing on the frameworks in your knowledge base (SPIN, Challenger, SNAP, Voss / Fisher-Ury for negotiation).`;\nlet _gmReady   = false;\nlet _sttActive = false;\nlet _recognition = null;\nlet _gmEpoch = 0;          // bumped whenever the panel opens/closes — invalidates in-flight async replies\nlet _gmAbortController = null;\n\n// ── init coaching AI ──────────────────────────────────────────\nasync function connectGemini() {\n  const epoch = _gmEpoch;\n  // Use the exact prompt assembled by assembleSystemPromptParts() for this session —\n  // language directive is already baked into part 1 (Platform Identity), so it isn't appended again here.\n  const fullPrompt = (_currentSystemPromptParts.length ? _currentSystemPromptParts : [{ label:'', text: GEMINI_SYSTEM_PROMPT + languageDirective(getCurrentUserLanguage()) }])\n    .map(p => p.label + '\\n' + p.text).join('\\n\\n---\\n\\n');\n  _gmHistory = [{\n    role: 'user',\n    parts: [{ text: fullPrompt + '\\n\\nA voice coaching session is starting. Ask the opening question.' }]\n  }];\n  setWaveState('idle');\n  // First turn: get opening question\n  const reply = await gmCall();\n  if (epoch !== _gmEpoch) return; // panel was closed (or a new session started) while this was in flight\n  if (reply) {\n    addGeminiMsg('assistant', reply);\n    gmSpeak(reply);\n    _gmReady = true;\n    setWaveState('listening');\n  }\n}\n\n// ── call Gemini REST ──────────────────────────────────────────\nasync function gmCall(userText) {\n  if (userText) {\n    _gmHistory.push({ role: 'user', parts: [{ text: userText }] });\n    addGeminiMsg('user', userText);\n  }\n  const controller = new AbortController();\n  _gmAbortController = controller;\n  for (let attempt = 0; attempt < 2; attempt++) {\n    try {\n      const res = await fetch(GEMINI_REST_URL, {\n        method: 'POST',\n        headers: {\n          'Content-Type': 'application/json',\n          'x-goog-api-key': GEMINI_API_KEY\n        },\n        body: JSON.stringify({ contents: _gmHistory }),\n        signal: controller.signal\n      });\n      const data = await res.json();\n      if (data.error) {\n        if (attempt === 0) { await new Promise(r => setTimeout(r, 500)); continue; } // one quick retry — covers transient \"model overloaded\" 503s\n        addGeminiMsg('assistant', 'Hata: ' + data.error.message);\n        return null;\n      }\n      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';\n      if (text) _gmHistory.push({ role: 'model', parts: [{ text }] });\n      return text;\n    } catch(e) {\n      if (e.name === 'AbortError') return null; // panel closed — cancelled intentionally, no error toast\n      if (attempt === 0) { await new Promise(r => setTimeout(r, 500)); continue; }\n      addGeminiMsg('assistant', 'Bağlantı hatası: ' + e.message);\n      return null;\n    }\n  }\n}\n\n// ── Text-to-Speech ────────────────────────────────────────────\n// Uses the Gemini API's native TTS model (a plain HTTPS generateContent call —\n// NOT the Gemini Live WebSocket API, which this sandboxed environment cannot\n// open a persistent socket to). This returns real neural audio with selectable\n// prebuilt voices — a genuine upgrade over the browser's Web Speech API used\n// previously. Falls back to Web Speech only if the TTS call errors (e.g. rate limit).\n// A separate AI Voice/Text toggle (cp-ai-mode) controls whether replies are spoken\n// at all — when set to Text, gmSpeak() is skipped entirely and replies are chat-only.\nconst GEMINI_TTS_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent';\nconst GEMINI_VOICES = [\n  { id:'Puck',   label:'Puck — upbeat' },\n  { id:'Charon', label:'Charon — informative' },\n  { id:'Fenrir', label:'Fenrir — excitable' },\n  { id:'Orus',   label:'Orus — firm' },\n  { id:'Kore',   label:'Kore — firm' },\n  { id:'Zephyr', label:'Zephyr — bright' },\n  { id:'Leda',   label:'Leda — youthful' },\n  { id:'Aoede',  label:'Aoede — breezy' },\n];\nlet _selectedVoiceId = localStorage.getItem('sm_voice_id') || 'Puck';\nlet _aiOutputMode = localStorage.getItem('sm_ai_output_mode') || 'voice'; // 'voice' | 'text' — does the AI speak its replies aloud?\nlet _ttsAudioEl = null;\nfunction populateVoiceOptions() {\n  const sel = document.getElementById('cp-voice-select');\n  if (!sel) return;\n  sel.innerHTML = GEMINI_VOICES.map(v =>\n    '<option value=\"' + v.id + '\"' + (v.id === _selectedVoiceId ? ' selected' : '') + '>' + v.label + '<\u002Foption>'\n  ).join('');\n}\nfunction onVoiceSelectChange(id) {\n  _selectedVoiceId = id;\n  localStorage.setItem('sm_voice_id', id);\n  gmSpeak('This is what the selected voice sounds like.');\n}\npopulateVoiceOptions();\nfunction setAiOutputMode(mode) {\n  _aiOutputMode = mode;\n  localStorage.setItem('sm_ai_output_mode', mode);\n  document.getElementById('cp-ai-voice-btn')?.classList.toggle('active', mode === 'voice');\n  document.getElementById('cp-ai-text-btn')?.classList.toggle('active', mode === 'text');\n  const voiceSel = document.getElementById('cp-voice-select');\n  if (voiceSel) voiceSel.style.display = mode === 'voice' ? '' : 'none';\n  if (mode === 'text') stopSpeaking();\n}\nsetAiOutputMode(_aiOutputMode);\nfunction stopSpeaking() {\n  if (_ttsAudioEl) { _ttsAudioEl.pause(); _ttsAudioEl.currentTime = 0; }\n  if (window.speechSynthesis) window.speechSynthesis.cancel();\n}\nfunction isSpeaking() {\n  return (_ttsAudioEl && !_ttsAudioEl.paused) || !!window.speechSynthesis?.speaking;\n}\n// Wrap raw 16-bit PCM (mono) returned by the Gemini TTS API into a playable WAV Blob URL\nfunction pcmToWavUrl(base64Pcm, sampleRate) {\n  const binary = atob(base64Pcm);\n  const len = binary.length;\n  const pcmBytes = new Uint8Array(len);\n  for (let i = 0; i < len; i++) pcmBytes[i] = binary.charCodeAt(i);\n  const numChannels = 1, bitsPerSample = 16;\n  const byteRate = sampleRate * numChannels * bitsPerSample / 8;\n  const blockAlign = numChannels * bitsPerSample / 8;\n  const buffer = new ArrayBuffer(44 + pcmBytes.length);\n  const view = new DataView(buffer);\n  const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };\n  writeStr(0, 'RIFF'); view.setUint32(4, 36 + pcmBytes.length, true); writeStr(8, 'WAVE');\n  writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, numChannels, true);\n  view.setUint32(24, sampleRate, true); view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true); view.setUint16(34, bitsPerSample, true);\n  writeStr(36, 'data'); view.setUint32(40, pcmBytes.length, true);\n  new Uint8Array(buffer, 44).set(pcmBytes);\n  return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));\n}\nasync function gmSpeak(text, force) {\n  stopSpeaking();\n  if (_aiOutputMode === 'text' && !force) { setWaveState(_gmReady ? 'listening' : 'idle'); return; } // AI Voice/Text toggle set to Text — chat-only, no audio (unless force, e.g. the 1-minute session warning)\n  // This is why the voice can seem to \"change on its own\" without you touching the picker:\n  // on a transient TTS error (rate limit, network hiccup) we fall back to the browser's own\n  // Web Speech voice for that one line so the session never goes silent — that fallback voice\n  // sounds different from your selected Gemini voice. One retry below cuts how often this fires;\n  // fallbackToast() makes it visible when it still does, instead of a silent, confusing switch.\n  for (let attempt = 0; attempt < 2; attempt++) {\n    try {\n      const res = await fetch(GEMINI_TTS_URL, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': GEMINI_API_KEY },\n        body: JSON.stringify({\n          contents: [{ parts: [{ text: 'Say in a natural, conversational tone: ' + text }] }],\n          generationConfig: {\n            responseModalities: ['AUDIO'],\n            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: _selectedVoiceId } } },\n          },\n        }),\n      });\n      if (!res.ok) throw new Error('TTS HTTP ' + res.status);\n      const data = await res.json();\n      const part = data?.candidates?.[0]?.content?.parts?.[0]?.inlineData;\n      if (!part?.data) throw new Error('No audio in TTS response');\n      const rateMatch = /rate=(\\d+)/.exec(part.mimeType || '');\n      const sampleRate = rateMatch ? parseInt(rateMatch[1]) : 24000;\n      const url = pcmToWavUrl(part.data, sampleRate);\n      _ttsAudioEl = new Audio(url);\n      _ttsAudioEl.onplay  = () => setWaveState('speaking');\n      _ttsAudioEl.onended = () => { setWaveState(_gmReady ? 'listening' : 'idle'); URL.revokeObjectURL(url); };\n      await _ttsAudioEl.play();\n      return; // success — done, skip fallback\n    } catch (e) {\n      if (attempt === 0) { await new Promise(r => setTimeout(r, 400)); continue; } // one quick retry before giving up\n      // Fallback: browser Web Speech API (lower quality/different voice, but keeps the session usable)\n      fallbackVoiceToast();\n      if (!window.speechSynthesis) return;\n      const utt = new SpeechSynthesisUtterance(text);\n      utt.lang = (LANG_META[getCurrentUserLanguage()] || LANG_META.tr).bcp47;\n      utt.rate = 0.98;\n      utt.onstart = () => setWaveState('speaking');\n      utt.onend   = () => setWaveState(_gmReady ? 'listening' : 'idle');\n      window.speechSynthesis.speak(utt);\n    }\n  }\n}\nfunction fallbackVoiceToast() {\n  const chat = document.getElementById('cp-chat');\n  if (!chat) return;\n  const el = document.createElement('div');\n  el.style.cssText = 'display:flex;justify-content:center;margin:4px 0';\n  el.innerHTML = '<div style=\"font:500 11px/1.3 var(--font-sans);padding:5px 12px;border-radius:6px;background:#1E293B;color:#94A3B8;border:1px solid rgba(255,255,255,.08)\">\\u26a0 Switched to a fallback voice for this line \\u2014 the selected voice will resume next turn.<\u002Fdiv>';\n  chat.appendChild(el);\n  chat.scrollTop = chat.scrollHeight;\n}\n\n// ── Speech-to-Text (Web Speech API) ──────────────────────────\nfunction startSTT() {\n  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n  if (!SR) { addGeminiMsg('assistant', 'Tarayıcınız ses tanımayı desteklemiyor. Text moduna geçin.'); return; }\n  // Request mic permission first\n  navigator.mediaDevices.getUserMedia({ audio: true })\n    .then(() => _doSTT(SR))\n    .catch(() => {\n      addGeminiMsg('assistant', 'Mikrofon izni gerekli. Tarayıcı ayarlarından mikrofon iznini verin.');\n      setWaveState('idle');\n    });\n}\n\nfunction _doSTT(SR) {\n  _recognition = new SR();\n  _recognition.lang = (LANG_META[getCurrentUserLanguage()] || LANG_META.tr).bcp47;\n  // interimResults + continuous so the recognizer keeps listening across natural\n  // pauses (breathing, thinking) instead of cutting the sentence off at the first one.\n  _recognition.interimResults = true;\n  _recognition.continuous = true;\n  _recognition.maxAlternatives = 1;\n\n  let finalTranscript = '';\n  let silenceTimer = null;\n  const SILENCE_MS = 2200;   // auto-stop after ~2.2s of real silence (end of sentence)\n  const MAX_MS     = 45000;  // hard safety cap so a stuck mic can't listen forever\n\n  const resetSilenceTimer = () => {\n    clearTimeout(silenceTimer);\n    silenceTimer = setTimeout(() => { if (_recognition) _recognition.stop(); }, SILENCE_MS);\n  };\n  const maxTimer = setTimeout(() => { if (_recognition) _recognition.stop(); }, MAX_MS);\n  resetSilenceTimer();\n\n  _recognition.onresult = (e) => {\n    resetSilenceTimer(); // fresh speech detected — push the silence deadline back out\n    let interim = '';\n    for (let i = e.resultIndex; i < e.results.length; i++) {\n      const chunk = e.results[i][0].transcript;\n      if (e.results[i].isFinal) finalTranscript += chunk + ' ';\n      else interim += chunk;\n    }\n    const lbl = document.getElementById('cp-mic-label');\n    if (lbl) lbl.textContent = (finalTranscript + interim).trim() || 'Konuşun…';\n  };\n  _recognition.onerror = (e) => {\n    clearTimeout(silenceTimer); clearTimeout(maxTimer);\n    setWaveState('idle');\n    if (e.error === 'not-allowed') {\n      addGeminiMsg('assistant', '🎤 Mikrofon izni reddedildi. Safari: Ayarlar → Gizlilik → Mikrofon → tarayıcıya izin verin.');\n    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {\n      addGeminiMsg('assistant', 'Ses hatası: ' + e.error + '. Text modunu deneyin.');\n    }\n  };\n  _recognition.onend = async () => {\n    clearTimeout(silenceTimer); clearTimeout(maxTimer);\n    _sttActive = false;\n    const transcript = finalTranscript.trim();\n    if (!transcript) { setWaveState(_gmReady ? 'listening' : 'idle'); return; }\n    const epoch = _gmEpoch;\n    setWaveState('idle');\n    document.getElementById('cp-mic-label').textContent = 'Yanıt bekleniyor…';\n    const reply = await gmCall(transcript);\n    if (epoch !== _gmEpoch) return; // panel closed while waiting for the reply\n    if (reply) { addGeminiMsg('assistant', reply); gmSpeak(reply); }\n  };\n  _recognition.start();\n  _sttActive = true;\n  setWaveState('listening');\n}\n\nfunction stopSTT() {\n  if (_recognition) { _recognition.stop(); _recognition = null; }\n  _sttActive = false;\n}\n\n// ── Waveform helpers ──────────────────────────────────────────\nfunction setWaveState(state) {\n  const wv  = document.getElementById('cp-waveform');\n  const btn = document.getElementById('cp-mic-btn');\n  const lbl = document.getElementById('cp-mic-label');\n  if (!wv) return;\n  if (state === 'listening') {\n    wv.classList.add('active'); btn.style.background = '#DC2626';\n    if (lbl) lbl.textContent = 'Konuşun…';\n  } else if (state === 'speaking') {\n    wv.classList.add('active'); btn.style.background = '#22C55E';\n    if (lbl) lbl.textContent = 'AI konuşuyor…';\n  } else {\n    wv.classList.remove('active'); btn.style.background = '';\n    if (lbl) lbl.textContent = _gmReady ? 'Mikrofona basın' : 'Bağlanıyor…';\n  }\n}\n\n// ── Chat helper ───────────────────────────────────────────────\nfunction addGeminiMsg(role, text) {\n  if (!text.trim()) return;\n  const chat = document.getElementById('cp-chat'); if (!chat) return;\n  const msg = document.createElement('div');\n  msg.className = 'chat-msg ' + role;\n  const av = role === 'user'\n    ? '<div class=\"chat-avatar user\">' + (roles[currentRole \'\"><input type=\"checkbox\" '+(calTeamSel[m.id]?'checked':'')+' onchange=\"calTeamToggle(\\''+m.id+'\\',this.checked)\" style=\"accent-color:var(--sm)\"><div class=\"avatar-sm\" style=\"background:'+m.color+';width:20px;height:20px;font-size:9px\">'+m.initials+'<\u002Fdiv><span style=\"font:400 12.5px/1 var(--font-sans);color:var(--genbil-ink)\">'+m.name+'<\u002Fspan><\u002Flabel>').join('');\n}\nfunction calTeamSelectAll(){ CAL_TEAM.forEach(m=>calTeamSel[m.id]=true); renderCalTeamList(); const count=CAL_TEAM.length; const badge=document.getElementById('cal-team-count'); if(badge) badge.textContent=count+' selected'; const b=document.getElementById('dash-cal-body'); if(b){if(calMode==='week')renderCalWeek(b);else if(calMode==='day')renderCalDay(b);else renderCalMonth(b);} }\nfunction calTeamClearAll(){ CAL_TEAM.forEach(m=>calTeamSel[m.id]=false); renderCalTeamList(); const badge=document.getElementById('cal-team-count'); if(badge) badge.textContent='None selected'; const b=document.getElementById('dash-cal-body'); if(b){if(calMode==='week')renderCalWeek(b);else if(calMode==='day')renderCalDay(b);else renderCalMonth(b);} }\n\nfunction calDayColHTML(ds,isToday,fullW){\n  const{ms,as,ts}=eventsForDate(ds);\n  let lines='';for(let h=CAL_START;h<CAL_END;h++){lines+=`<div class=\"cal-hline\" style=\"top:${(h-CAL_START)*HOUR_H}px\"><\u002Fdiv><div class=\"cal-hline half\" style=\"top:${(h-CAL_START)*HOUR_H+HOUR_H/2}px\"><\u002Fdiv>`;}\n  const evts=[\n    ...ms.map(m=>{const top=timeToTop(m.startTime),h=dToH(m.duration),ic=m.contributors.includes(currentRole)&&m.ownerId!==currentRole;return`<div class=\"cal-evt mt\" style=\"top:${top}px;height:${h}px\" onclick=\"openCalItemModal('meeting','${m.id}')\"><div class=\"cal-evt-t\">🤝 ${m.title}${ic?' 👤':''}<\u002Fdiv>${h>32?`<div class=\"cal-evt-s\">${m.customer}<\u002Fdiv>`:''}${h>46?`<div class=\"cal-evt-s cal-evt-owner\">${m.ownerName}<\u002Fdiv>`:''}<\u002Fdiv>`;}),\n    ...as.map(a=>{const top=timeToTop(a.startTime),h=dTo
