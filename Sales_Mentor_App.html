t.getElementById('cm-t').value||m.title;m.date=document.getElementById('cm-d').value||m.date;m.startTime=document.getElementById('cm-st').value||m.startTime;m.duration=parseInt(document.getElementById('cm-dur').value)||m.duration;m.customer=document.getElementById('cm-cu').value||m.customer;m.type=ty;closeModal();renderDashboardCalendar();showToast('Meeting updated');}\nfunction cancelCalMtg(id){closeModal();showModal('Cancel Meeting','<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Cancel this meeting? This cannot be undone.<\u002Fp>'+mInput('cmt-n','Reason *','','Cancellation reason'),mBtn('Confirm Cancel',`doCalMtgCancel('${id}')`)+mBtn('Back','closeModal()',true));}\nfunction doCalMtgCancel(id){const n=document.getElementById('cmt-n')?.value?.trim();if(!n||n.length<5){showToast('Reason required (min 5 chars)',false);return;}const i=CAL_MEETINGS.findIndex(x=>x.id===id);if(i>=0)CAL_MEETINGS.splice(i,1);closeModal();renderDashboardCalendar();showToast('Meeting cancelled');}\nfunction saveCalAppt(id){const a=CAL_APPOINTMENTS.find(x=>x.id===id);if(!a)return;a.title=document.getElementById('ca-t').value||a.title;a.date=document.getElementById('ca-d').value||a.date;a.startTime=document.getElementById('ca-st').value||a.startTime;a.duration=parseInt(document.getElementById('ca-dur').value)||a.duration;a.location=document.getElementById('ca-loc').value||a.location;closeModal();renderDashboardCalendar();showToast('Appointment updated');}\nfunction cancelCalAppt(id){closeModal();const a=CAL_APPOINTMENTS.find(x=>x.id===id);if(!a)return;showModal('Cancel Appointment',`<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Cancel <b>${a.title}<\u002Fb>?<\u002Fp>`+mInput('can-n','Cancellation Notes *','','Reason'),mBtn('Confirm',`doCalApptCancel('${id}')`)+mBtn('Back','closeModal()',true));}\nfunction doCalApptCancel(id){const n=document.getElementById('can-n')?.value?.trim();if(!n||n.length<5){showToast('Notes required (min 5 chars)',false);return;}const i=CAL_APPOINTMENTS.findIndex(x=>x.id===id);if(i>=0)CAL_APPOINTMENTS.splice(i,1);closeModal();renderDashboardCalendar();showToast('Appointment cancelled');}\nfunction openNewMeetingFromCal(ds,ts){document.querySelectorAll('.cal-ctx-menu').forEach(m=>m.remove());showModal('New Meeting',`<div style=\"display:flex;flex-direction:column;gap:12px\">${mInput('nm-t','Title *','','')}${mInput('nm-c','Customer *','','')}${mSelect('nm-type','Meeting Type *',['— Select —',...MEETING_TYPES],'— Select —')}<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">${mInput('nm-d','Date *',ds||'','','date')}${mInput('nm-st','Start Time *',ts||'09:00','','time')}<\u002Fdiv>${mInput('nm-dur','Duration (min) *','60','')}<\u002Fdiv>`,mBtn('Create Meeting','saveNewCalMtg()')+mBtn('Cancel','closeModal()',true));}\nfunction saveNewCalMtg(){const t=document.getElementById('nm-t')?.value?.trim(),c=document.getElementById('nm-c')?.value?.trim(),ty=document.getElementById('nm-type')?.value,d=document.getElementById('nm-d')?.value,st=document.getElementById('nm-st')?.value,dur=parseInt(document.getElementById('nm-dur')?.value||'60');if(!t||!c||!d||!st){showToast('All fields required',false);return;}if(!ty||!MEETING_TYPES.includes(ty)){showToast('Meeting Type is required',false);return;}CAL_MEETINGS.push({id:'CM'+Date.now(),title:t,customer:c,type:ty,date:d,startTime:st,duration:dur,ownerId:currentRole,ownerName:roles[currentRole].name,contributors:[]});closeModal();renderDashboardCalendar();showToast('Meeting created');}\nfunction openNewApptFromCal(ds,ts){document.querySelectorAll('.cal-ctx-menu').forEach(m=>m.remove());showModal('New Appointment',`<div style=\"display:flex;flex-direction:column;gap:12px\">${mInput('na-t','Title *','','')}<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">${mInput('na-d','Date *',ds||'','','date')}${mInput('na-st','Start Time *',ts||'09:00','','time')}<\u002Fdiv><div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">${mInput('na-dur','Duration (min) *','60','')}${mInput('na-loc','Location *','','')}<\u002Fdiv>${mInput('na-p','Participants (optional)','','e.g. Zeynep Kaya')}<\u002Fdiv>`,mBtn('Create','saveNewCalAppt()')+mBtn('Cancel','closeModal()',true));}\nfunction saveNewCalAppt(){const t=document.getElementById('na-t')?.value?.trim(),d=document.getElementById('na-d')?.value,st=document.getElementById('na-st')?.value,dur=parseInt(document.getElementById('na-dur')?.value||'60'),loc=document.getElementById('na-loc')?.value?.trim();if(!t||!d||!st||!loc){showToast('Title, Date, Time and Location are required',false);return;}CAL_APPOINTMENTS.push({id:'CA'+Date.now(),title:t,date:d,startTime:st,duration:dur,location:loc,ownerId:currentRole,ownerName:roles[currentRole].name,participants:[]});closeModal();renderDashboardCalendar();showToast('Appointment created');}\n\n// ─────────────────────────────────────────\n// INIT\n// ─────────────────────────────────────────\nsetRole('director');\n\n// ─── Proactive auto-open: if upcoming scheduled meeting task, open panel ───\nsetTimeout(() => {\n  if (currentRole === 'admin') return;\n  const proactive = tasks.find(t =>\n    t.status === 'Scheduled' &&\n    (t.type === 'Pre-meeting Review' || t.type === 'Post-meeting Review') &&\n    !t.ignoredUntil\n  );\n  if (proactive) openCoaching(proactive);\n}, 1400);\n\n// ─────────────────────────────────────────\n// PRODUCT CATALOG\n// ─────────────────────────────────────────\n\n\nfunction populateProductGroupFilter() {\n  const sel = document.getElementById('prod-group-filter');\n  if (!sel || sel.dataset.filled) return;\n  sel.dataset.filled = '1';\n  sel.innerHTML = '<option value=\"all\">All Product Groups<\u002Foption>' +\n    PRODUCT_GROUPS.map(g => '<option value=\"' + g.id + '\">' + g.name + '<\u002Foption>').join('');\n}\nfunction onProductSearch(val) { _prodSearchQ = val.toLowerCase(); renderProducts(); }\nfunction onProductGroupFilter(val) { _prodGroupFilter = val; renderProducts(); }\n\nfunction renderProducts() {\n  populateProductGroupFilter();\n  let list = catalogProducts.slice();\n  if (_prodGroupFilter !== 'all') list = list.filter(p => p.groupId === _prodGroupFilter);\n  if (_prodSearchQ.length >= 2) list = list.filter(p =>\n    p.name.toLowerCase().includes(_prodSearchQ) || (p.brand||'').toLowerCase().includes(_prodSearchQ) || p.code.toLowerCase().includes(_prodSearchQ));\n\n  let html = `<thead><tr><th>Code<\u002Fth><th>Product Name<\u002Fth><th>Product Group<\u002Fth><th>Brand / Technology<\u002Fth><th>Description<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>`;\n  if (!list.length) {\n    html += '<tr><td colspan=\"6\" style=\"text-align:center;padding:32px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No products found.<\u002Ftd><\u002Ftr>';\n  } else {\n    list.forEach((p) => {\n      const i = catalogProducts.indexOf(p);\n      html += `<tr>\n        <td style=\"font-family:var(--font-mono);font-size:12px;color:var(--sm);white-space:nowrap\">${p.code}<\u002Ftd>\n        <td style=\"font-weight:600\">${p.name}<\u002Ftd>\n        <td><span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:#F1F5F9;color:#475569;white-space:nowrap\">${productGroupName(p.groupId)}<\u002Fspan><\u002Ftd>\n        <td style=\"color:var(--genbil-ink-3);white-space:nowrap\">${p.brand||'—'}<\u002Ftd>\n        <td style=\"color:var(--genbil-ink-3);max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${p.desc.slice(0,80)}…<\u002Ftd>\n        <td><div style=\"display:flex;gap:6px\">\n          <button class=\"ua-btn\" onclick=\"openProductModal(${i})\">Edit<\u002Fbutton>\n          <button class=\"ua-btn danger\" onclick=\"deleteProduct(${i})\">Delete<\u002Fbutton>\n        <\u002Fdiv><\u002Ftd>\n      <\u002Ftr>`;\n    });\n  }\n  html += '<\u002Ftbody>';\n  document.getElementById('products-table').innerHTML = html;\n  document.getElementById('product-count').textContent = catalogProducts.length;\n}\n\n\n\n\n// ─────────────────────────────────────────\n// MODAL SYSTEM\n// ─────────────────────────────────────────\nfunction showModal(title, bodyHTML, footHTML) {\n  document.getElementById('modal-title').textContent = title;\n  document.getElementById('modal-body').innerHTML = bodyHTML;\n  document.getElementById('modal-foot').innerHTML = footHTML;\n  const m = document.getElementById('app-modal');\n  m.style.display = 'flex';\n}\nfunction closeModal() {\n  document.getElementById('app-modal').style.display = 'none';\n}\n\n// ─── CANCEL TASK ───────────────────────────────────────────────\nlet _cancelTaskId = null;\nfunction openCancelModal(taskId) {\n  _cancelTaskId = taskId;\n  const task = tasks.find(t => t.id === taskId);\n  const body = `\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px 14px;font:500 13px/1.5 var(--font-sans);color:#991B1B;\">\n        <strong>This action is permanent.<\u002Fstrong> The task will be removed from your task list and cannot be restarted.\n      <\u002Fdiv>\n      <div style=\"font:500 13px/1.4 var(--font-sans);color:var(--genbil-ink);\">${task.type} &mdash; <strong>${task.meeting}<\u002Fstrong><\u002Fdiv>\n      <div>\n        <label style=\"display:block;font:600 12px/1 var(--font-sans);color:var(--genbil-ink-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;\">Cancellation Reason <span style=\"color:#EF4444\">*<\u002Fspan><\u002Flabel>\n        <textarea id=\"cancel-reason-input\" placeholder=\"Please describe why this task is being cancelled...\" style=\"width:100%;height:90px;padding:10px 12px;border:1.5px solid var(--genbil-line);border-radius:8px;font:400 13px/1.5 var(--font-sans);color:var(--genbil-ink);resize:vertical;outline:none;box-sizing:border-box;\" oninput=\"var btn=document.getElementById('cancel-confirm-btn');btn.disabled=this.value.trim().length<5;btn.style.opacity=this.value.trim().length>=5?'1':'0.45';\"><\u002Ftextarea>\n        <div style=\"font:400 11px/1 var(--font-sans);color:var(--genbil-ink-4);margin-top:4px;\">Minimum 5 characters required<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  const foot = `\n    <button onclick=\"closeModal()\" style=\"padding:8px 16px;border-radius:7px;border:1px solid var(--genbil-line);background:transparent;font:600 13px/1 var(--font-sans);cursor:pointer;color:var(--genbil-ink-2);\">Keep Task<\u002Fbutton>\n    <button id=\"cancel-confirm-btn\" onclick=\"confirmCancelTask()\" disabled style=\"padding:8px 16px;border-radius:7px;border:none;background:#EF4444;color:#fff;font:600 13px/1 var(--font-sans);cursor:pointer;opacity:0.45;\">Cancel Task<\u002Fbutton>`;\n  showModal('Cancel Task', body, foot);\n}\n\nfunction confirmCancelTask() {\n  const reason = document.getElementById('cancel-reason-input').value.trim();\n  if (reason.length < 5) return;\n  const idx = tasks.findIndex(t => t.id === _cancelTaskId);\n  if (idx >= 0) {\n    tasks[idx].status = 'Cancelled';\n    tasks[idx].stClass = 'st-cancelled';\n    tasks[idx].cancellationReason = reason;\n  }\n  closeModal();\n  const active = tasks.filter(t => t.status !== 'Cancelled');\n  const newCount = active.length;\n  document.getElementById('task-count').textContent = newCount;\n  document.getElementById('w-tasks-val').textContent = newCount;\n  renderTasksTable(newCount);\n}\n\nfunction mInput(id, label, value, placeholder, type) {\n  return `<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">${label}<\u002Flabel>\n    <input id=\"${id}\" type=\"${type||'text'}\" value=\"${value||''}\" placeholder=\"${placeholder||''}\"\n      style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none;color:var(--genbil-ink);background:#fff\"><\u002Fdiv>`;\n}\nfunction mSelect(id, label, options, selected, onchange) {\n  const opts = options.map(o => `<option ${o===selected?'selected':''}>${o}<\u002Foption>`).join('');\n  return `<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">${label}<\u002Flabel>\n    <select id=\"${id}\" ${onchange ? `onchange=\"${onchange}\"` : ''} style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none;background:#fff\">${opts}<\u002Fselect><\u002Fdiv>`;\n}\nfunction mBtn(label, onclick, secondary) {\n  return `<button onclick=\"${onclick}\" style=\"padding:9px 20px;border-radius:8px;border:${secondary?'1px solid var(--genbil-line-2)':'none'};background:${secondary?'transparent':'var(--sm)'};color:${secondary?'var(--genbil-ink-2)':'#fff'};cursor:pointer;font:600 13px/1 var(--font-sans);\">${label}<\u002Fbutton>`;\n}\n// Read-only display field (locked). Renders a real input so callers can still read\n// its .value, styled to look non-editable, with a small lock affordance.\nfunction mLocked(id, label, value, note) {\n  return `<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">${label}<\u002Flabel>\n    <div style=\"position:relative\">\n      <input id=\"${id}\" type=\"text\" value=\"${value||''}\" readonly tabindex=\"-1\"\n        style=\"width:100%;padding:9px 34px 9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:500 13px/1 var(--font-sans);outline:none;color:var(--genbil-ink-3);background:var(--genbil-paper-2);cursor:not-allowed\">\n      <svg style=\"position:absolute;right:11px;top:50%;transform:translateY(-50%);opacity:.5\" width=\"13\" height=\"13\" viewBox=\"0 0 15 15\" fill=\"none\"><rect x=\"3\" y=\"6.5\" width=\"9\" height=\"6.5\" rx=\"1.3\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M5 6.5V4.5a2.5 2.5 0 015 0v2\" stroke=\"currentColor\" stroke-width=\"1.3\"/><\u002Fsvg>\n    <\u002Fdiv>${note ? `<div style=\"font:400 11px/1.4 var(--font-sans);color:var(--genbil-ink-4);margin-top:4px\">${note}<\u002Fdiv>` : ''}<\u002Fdiv>`;\n}\n\n// ═══════════════════════════════════════════════════════════\n// NOTES — attachable to Customer / Opportunity / Meeting\n// aibus_notes: exactly one of customer_id / opportunity_id / meeting_id is set.\n// Strictly scoped: a note shows only on the record it is linked to.\n// ═══════════════════════════════════════════════════════════\nconst NOTE_CATEGORIES = [\n  { id:'general',      label:'General',      bg:'#F1F5F9', color:'#475569' },\n  { id:'call',         label:'Call',         bg:'#DBEAFE', color:'#1D4ED8' },\n  { id:'meeting_prep', label:'Meeting Prep', bg:'#EDE9FE', color:'#6D28D9' },\n  { id:'risk',         label:'Risk',         bg:'#FEE2E2', color:'#991B1B' },\n  { id:'follow_up',    label:'Follow-up',    bg:'#FEF3C7', color:'#92400E' },\n  { id:'competitive',  label:'Competitive',  bg:'#FCE7F3', color:'#9D174D' },\n];\nfunction noteCat(id){ return NOTE_CATEGORIES.find(c=>c.id===id) || NOTE_CATEGORIES[0]; }\n\nconst NOTE_ENTITY = {\n  customer:    { label:'Customer',    fk:'customer_id',    resolve:id => (CUSTOMERS_DATA.find(c=>c.id===id)||{}).name },\n  opportunity: { label:'Opportunity', fk:'opportunity_id', resolve:id => (OPPORTUNITIES.find(o=>o.id===id)||{}).name },\n  meeting:     { label:'Meeting',     fk:'meeting_id',     resolve:id => (MEETINGS_DATA.find(m=>m.id===id)||{}).title },\n};\n\nlet NOTES = [\n  { note_id:'NOTE-001', seq:1, entity_type:'customer', entity_id:'CUS-001', title:'Primary decision-maker identified', category:'general',\n    content:'New **Operations Director** (started March 2026) is the economic buyer. Mandate: line-automation + a 10% efficiency gain.\\n\\nBuild the business case around uptime and OEE.',\n    source:'manual', author_name:'Ahmet Yılmaz', author_initials:'AY', author_color:'#3B82F6', created_at:'24 Jun 2026 · 09:12', updated_at:null },\n  { note_id:'NOTE-002', seq:2, entity_type:'opportunity', entity_id:'OPP-001', title:'Budget confirmed for Q3', category:'follow_up',\n    content:'Finance signed off on the ₺850K envelope.\\n\\n- Submit formal proposal before **15 Jul**\\n- Loop in the technical team for the demo',\n    source:'manual', author_name:'Ahmet Yılmaz', author_initials:'AY', author_color:'#3B82F6', created_at:'25 Jun 2026 · 16:40', updated_at:null },\n  { note_id:'NOTE-003', seq:3, entity_type:'opportunity', entity_id:'OPP-001', title:'Competitor undercutting on price', category:'competitive',\n    content:'Projet Elektronik quoted ~12% lower, but with a shorter warranty. Emphasise our **30-month coverage** and uptime SLA when we present.',\n    source:'manual', author_name:'Zeynep Kaya', author_initials:'ZK', author_color:'#22C55E', created_at:'25 Jun 2026 · 17:05', updated_at:null },\n  { note_id:'NOTE-004', seq:4, entity_type:'meeting', entity_id:'MTG-001', title:'Pre-meeting prep', category:'meeting_prep',\n    content:'Bring the OEE calculator. Customer flagged downtime on **Line 2** last call — lead with the uptime story, not features.',\n    source:'manual', author_name:'Ahmet Yılmaz', author_initials:'AY', author_color:'#3B82F6', created_at:'26 Jun 2026 · 08:05', updated_at:null },\n  { note_id:'NOTE-005', seq:5, entity_type:'meeting', entity_id:'MTG-001', title:'Auto-captured: key discussion points', category:'call',\n    content:'## Summary\\nRep confirmed two ageing coders on the confectionery lines and growing maintenance cost.\\n\\n## Follow-up\\n- Send proposal\\n- Schedule technical demo',\n    source:'agent', author_name:'Sales Mentor Agent', author_initials:'AI', author_color:'#7C3AED', created_at:'26 Jun 2026 · 15:02', updated_at:null },\n];\nlet _noteSeq = 100;\nlet _noteCounter = 6;\nlet _noteComposer = null;   // { et, eid, editId }  when composer visible\nlet _noteConfirmDel = null; // note_id awaiting delete confirmation\nlet _notesCtx = null;       // { et, eid } currently rendered panel\n\nfunction currentNoteUser(){ const r = roles[currentRole] || {}; return { name:r.name||'User', initials:r.initials||'U', color:r.avatarBg||'#64748B' }; }\nfunction notesCountFor(et, eid){ return NOTES.filter(n => n.entity_type===et && n.entity_id===eid).length; }\nfunction noteCanEdit(n){ return n.source==='manual' && n.author_name===currentNoteUser().name; }\nfunction noteCanDelete(n){ return currentRole==='admin' || n.author_name===currentNoteUser().name; }\nfunction fmtNoteNow(){\n  const d = new Date();\n  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];\n  const p = x => String(x).padStart(2,'0');\n  return p(d.getDate())+' '+mo+' '+d.getFullYear()+' · '+p(d.getHours())+':'+p(d.getMinutes());\n}\nfunction mdLite(s){\n  let h = (s||'').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n  h = h.split('\\n').map(line => {\n    if (/^#{1,3}\\s+/.test(line)) return '<div style=\"font:700 12.5px/1.4 var(--font-sans);color:var(--genbil-ink);margin-top:6px\">'+line.replace(/^#{1,3}\\s+/,'')+'<\u002Fdiv>';\n    if (/^[-*]\\s+/.test(line))   return '<div style=\"padding-left:14px;position:relative\">&bull;&nbsp;'+line.replace(/^[-*]\\s+/,'')+'<\u002Fdiv>';\n    return line;\n  }).join('\\n');\n  h = h.replace(/\\*\\*([^*]+)\\*\\*/g,'<strong>$1<\u002Fstrong>').replace(/`([^`]+)`/g,'<code style=\"font-family:var(--font-mono);font-size:11.5px;background:var(--genbil-paper-2);padding:1px 4px;border-radius:3px\">$1<\u002Fcode>');\n  return h.replace(/\\n/g,'<br>');\n}\n\n// Tab shell wrapping a record modal body with Details / Notes tabs.\nfunction withNotesTabs(entityType, entityId, detailsHTML){\n  if (!entityId) return detailsHTML; // unsaved record — no notes yet\n  const count = notesCountFor(entityType, entityId);\n  return '<div>'\n    + '<div style=\"display:flex;gap:2px;border-bottom:1px solid var(--genbil-line);margin:0 0 16px\">'\n      + '<button class=\"note-tab-btn active\" data-tab=\"details\" onclick=\"switchNoteTab(\\'details\\')\">Details<\u002Fbutton>'\n      + '<button class=\"note-tab-btn\" data-tab=\"notes\" onclick=\"switchNoteTab(\\'notes\\')\">Notes <span id=\"note-tab-badge\" style=\"font:600 10px/1 var(--font-sans);background:var(--genbil-paper-3);color:var(--genbil-ink-3);padding:2px 7px;border-radius:999px;margin-left:2px\">'+count+'<\u002Fspan><\u002Fbutton>'\n    + '<\u002Fdiv>'\n    + '<div id=\"note-tab-details\">'+detailsHTML+'<\u002Fdiv>'\n    + '<div id=\"note-tab-notes\" style=\"display:none\">'+renderNotesPanel(entityType, entityId)+'<\u002Fdiv>'\n  + '<\u002Fdiv>';\n}\nfunction switchNoteTab(tab){\n  const d = document.getElementById('note-tab-details'), n = document.getElementById('note-tab-notes');\n  if (!d || !n) return;\n  d.style.display = tab==='notes' ? 'none' : 'block';\n  n.style.display = tab==='notes' ? 'block' : 'none';\n  document.querySelectorAll('.note-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));\n}\n\nfunction renderNotesPanel(et, eid){\n  _notesCtx = { et, eid }; _noteComposer = null; _noteConfirmDel = null;\n  return '<div id=\"notes-panel-inner\">'+notesPanelInner(et, eid)+'<\u002Fdiv>';\n}\nfunction refreshNotesPanel(){\n  const el = document.getElementById('notes-panel-inner');\n  if (el && _notesCtx) el.innerHTML = notesPanelInner(_notesCtx.et, _notesCtx.eid);\n  const badge = document.getElementById('note-tab-badge');\n  if (badge && _notesCtx) badge.textContent = notesCountFor(_notesCtx.et, _notesCtx.eid);\n}\n\nfunction notesPanelInner(et, eid){\n  const meta = NOTE_ENTITY[et];\n  const list = NOTES.filter(n => n.entity_type===et && n.entity_id===eid).sort((a,b)=> b.seq - a.seq);\n  const header = '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">'\n    + '<div style=\"font:400 11.5px/1.4 var(--font-sans);color:var(--genbil-ink-4)\">'\n      + '<strong style=\"color:var(--genbil-ink-2);font-weight:600\">'+list.length+' note'+(list.length===1?'':'s')+'<\u002Fstrong> on this '+meta.label.toLowerCase()\n    + '<\u002Fdiv>'\n    + (_noteComposer ? '' : '<button class=\"ua-btn primary\" onclick=\"openNoteComposer(\\''+et+'\\',\\''+eid+'\\')\">+ Add Note<\u002Fbutton>')\n  + '<\u002Fdiv>';\n  const composer = _noteComposer ? noteComposerHTML() : '';\n  const body = list.length\n    ? '<div style=\"display:flex;flex-direction:column;gap:10px\">'+list.map(noteCardHTML).join('')+'<\u002Fdiv>'\n    : (_noteComposer ? '' : '<div style=\"text-align:center;padding:26px 16px;color:var(--genbil-ink-4);font:400 12.5px/1.5 var(--font-sans);border:1px dashed var(--genbil-line);border-radius:9px\">No notes yet.<br>Add the first note for this '+meta.label.toLowerCase()+'.<\u002Fdiv>');\n  return header + composer + body;\n}\n\nfunction noteCardHTML(n){\n  const cat = noteCat(n.category);\n  const isAgent = n.source==='agent';\n  const confirming = _noteConfirmDel === n.note_id;\n  const actions = (!_noteComposer && !confirming)\n    ? '<div style=\"display:flex;gap:2px;flex-shrink:0\">'\n        + (noteCanEdit(n) ? '<button class=\"note-ic-btn\" title=\"Edit\" onclick=\"editNote(\\''+n.note_id+'\\')\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"/><path d=\"M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z\"/><\u002Fsvg><\u002Fbutton>' : '')\n        + (noteCanDelete(n) ? '<button class=\"note-ic-btn\" title=\"Delete\" onclick=\"askDeleteNote(\\''+n.note_id+'\\')\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6\"/><path d=\"M10 11v6\"/><path d=\"M14 11v6\"/><\u002Fsvg><\u002Fbutton>' : '')\n      + '<\u002Fdiv>'\n    : '';\n  const confirmBar = confirming\n    ? '<div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;border-radius:7px;background:#FEF2F2;border:1px solid #FECACA\">'\n      + '<span style=\"flex:1;font:500 11.5px/1.4 var(--font-sans);color:#991B1B\">Delete this note? This cannot be undone.<\u002Fspan>'\n      + '<button class=\"ua-btn danger\" onclick=\"confirmDeleteNote(\\''+n.note_id+'\\')\">Delete<\u002Fbutton>'\n      + '<button class=\"ua-btn\" onclick=\"cancelDeleteNote()\">Keep<\u002Fbutton>'\n    + '<\u002Fdiv>'\n    : '';\n  const avatar = isAgent\n    ? '<div style=\"width:18px;height:18px;border-radius:5px;background:var(--sm-tint);color:var(--sm);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"4\" y=\"8\" width=\"16\" height=\"12\" rx=\"2\"/><path d=\"M12 8V4M8 2h8\"/><circle cx=\"9\" cy=\"14\" r=\"1\" fill=\"currentColor\"/><circle cx=\"15\" cy=\"14\" r=\"1\" fill=\"currentColor\"/><\u002Fsvg><\u002Fdiv>'\n    : '<div class=\"avatar-sm\" style=\"background:'+n.author_color+';width:18px;height:18px;font-size:8px\">'+n.author_initials+'<\u002Fdiv>';\n  return '<div style=\"border:1px solid var(--genbil-line);border-radius:9px;padding:12px 14px;background:#fff\">'\n    + '<div style=\"display:flex;align-items:flex-start;gap:8px;margin-bottom:7px\">'\n      + '<span style=\"font:600 9.5px/1 var(--font-sans);letter-spacing:.03em;text-transform:uppercase;padding:3px 7px;border-radius:4px;background:'+cat.bg+';color:'+cat.color+';flex-shrink:0;margin-top:1px\">'+cat.label+'<\u002Fspan>'\n      + '<div style=\"font:700 13px/1.35 var(--font-sans);color:var(--genbil-ink);flex:1;min-width:0\">'+n.title+(isAgent?' <span style=\"font:600 9px/1 var(--font-sans);vertical-align:middle;padding:2px 6px;border-radius:4px;background:var(--sm-tint);color:var(--sm);margin-left:2px\">AI<\u002Fspan>':'')+'<\u002Fdiv>'\n      + actions\n    + '<\u002Fdiv>'\n    + '<div style=\"font:400 12px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">'+mdLite(n.content)+'<\u002Fdiv>'\n    + '<div style=\"display:flex;align-items:center;gap:7px;margin-top:9px;font:400 10.5px/1 var(--font-sans);color:var(--genbil-ink-4)\">'\n      + avatar + '<span>'+n.author_name+'<\u002Fspan><span>·<\u002Fspan><span>'+n.created_at+'<\u002Fspan>'\n      + (n.updated_at ? '<span>·<\u002Fspan><span style=\"font-style:italic\">edited<\u002Fspan>' : '')\n    + '<\u002Fdiv>'\n    + confirmBar\n  + '<\u002Fdiv>';\n}\n\nfunction noteComposerHTML(){\n  const editing = _noteComposer.editId ? NOTES.find(n=>n.note_id===_noteComposer.editId) : null;\n  const title = editing ? editing.title : '';\n  const content = editing ? editing.content : '';\n  const catId = editing ? editing.category : 'general';\n  const opts = NOTE_CATEGORIES.map(c => '<option value=\"'+c.id+'\"'+(c.id===catId?' selected':'')+'>'+c.label+'<\u002Foption>').join('');\n  return '<div style=\"border:1.5px solid var(--sm-tint2);border-radius:10px;padding:14px;background:var(--sm-tint);margin-bottom:14px\">'\n    + '<div style=\"font:700 12px/1 var(--font-sans);color:var(--sm-deep);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px\">'+(editing?'Edit Note':'New Note')+'<\u002Fdiv>'\n    + '<div style=\"display:flex;flex-direction:column;gap:10px\">'\n      + '<div style=\"display:grid;grid-template-columns:1fr 150px;gap:10px\">'\n        + '<div><label style=\"font:600 11px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:5px\">Title *<\u002Flabel>'\n          + '<input id=\"note-c-title\" value=\"'+title.replace(/\"/g,'&quot;')+'\" placeholder=\"Short summary\" style=\"width:100%;padding:8px 11px;border:1.5px solid var(--genbil-line);border-radius:7px;font:500 13px/1 var(--font-sans);outline:none;background:#fff\"><\u002Fdiv>'\n        + '<div><label style=\"font:600 11px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:5px\">Category<\u002Flabel>'\n          + '<select id=\"note-c-cat\" style=\"width:100%;padding:8px 10px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none;background:#fff\">'+opts+'<\u002Fselect><\u002Fdiv>'\n      + '<\u002Fdiv>'\n      + '<div><label style=\"font:600 11px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:5px\">Note (Markdown) *<\u002Flabel>'\n        + '<textarea id=\"note-c-body\" rows=\"5\" maxlength=\"2000\" oninput=\"document.getElementById(\\'note-c-count\\').textContent=this.value.length\" placeholder=\"Write your note… **bold**, # headings and - lists are supported.\" style=\"width:100%;padding:9px 11px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 12.5px/1.55 var(--font-sans);outline:none;resize:vertical;background:#fff\">'+content.replace(/<\u002Fg,'&lt;')+'<\u002Ftextarea>'\n        + '<div style=\"text-align:right;font:400 10.5px/1 var(--font-sans);color:var(--genbil-ink-4);margin-top:4px\"><span id=\"note-c-count\">'+content.length+'<\u002Fspan> / 2000<\u002Fdiv>'\n      + '<\u002Fdiv>'\n      + '<div style=\"display:flex;justify-content:flex-end;gap:8px\">'\n        + '<button class=\"ua-btn\" onclick=\"cancelNoteComposer()\">Cancel<\u002Fbutton>'\n        + '<button class=\"ua-btn primary\" onclick=\"saveNote()\">'+(editing?'Save Changes':'Add Note')+'<\u002Fbutton>'\n      + '<\u002Fdiv>'\n    + '<\u002Fdiv>'\n  + '<\u002Fdiv>';\n}\n\nfunction openNoteComposer(et, eid){ _noteComposer = { et, eid, editId:null }; _noteConfirmDel = null; refreshNotesPanel(); }\nfunction editNote(id){ const n = NOTES.find(x=>x.note_id===id); if(!n) return; _noteComposer = { et:n.entity_type, eid:n.entity_id, editId:id }; _noteConfirmDel = null; refreshNotesPanel(); }\nfunction cancelNoteComposer(){ _noteComposer = null; refreshNotesPanel(); }\nfunction askDeleteNote(id){ _noteConfirmDel = id; refreshNotesPanel(); }\nfunction cancelDeleteNote(){ _noteConfirmDel = null; refreshNotesPanel(); }\nfunction confirmDeleteNote(id){\n  const i = NOTES.findIndex(n=>n.note_id===id);\n  if (i>=0) NOTES.splice(i,1);\n  _noteConfirmDel = null;\n  refreshNotesPanel();\n  refreshNoteRowButtons();\n  showToast('Note deleted');\n}\nfunction saveNote(){\n  const title = (document.getElementById('note-c-title')?.value||'').trim();\n  const content = (document.getElementById('note-c-body')?.value||'').trim();\n  const category = document.getElementById('note-c-cat')?.value || 'general';\n  if (!title) { showToast('Title is required', false); return; }\n  if (!content) { showToast('Note content is required', false); return; }\n  const { editId, et, eid } = _noteComposer;\n  if (editId) {\n    const n = NOTES.find(x=>x.note_id===editId);\n    if (n) { n.title=title; n.content=content; n.category=category; n.updated_at=fmtNoteNow(); }\n    showToast('Note updated');\n  } else {\n    const u = currentNoteUser();\n    _noteCounter++;\n    NOTES.push({ note_id:'NOTE-'+String(_noteCounter).padStart(3,'0'), seq:_noteSeq++, entity_type:et, entity_id:eid,\n      title, content, category, source:'manual', author_name:u.name, author_initials:u.initials, author_color:u.color,\n      created_at:fmtNoteNow(), updated_at:null });\n    showToast('Note added');\n  }\n  _noteComposer = null;\n  refreshNotesPanel();\n  refreshNoteRowButtons();\n}\n\n// Open a record modal directly on its Notes tab (from the list row).\nfunction openNotesFor(entityType, idx){\n  if (entityType==='meeting') openMeetingModal(idx);\n  else if (entityType==='customer') openCustomerModal(idx);\n  else if (entityType==='opportunity') openOppModal(idx);\n  switchNoteTab('notes');\n}\n// Re-render whichever list is visible so the Notes (N) counts refresh.\nfunction refreshNoteRowButtons(){\n  if (activeNav==='meetings') renderMeetingsTable();\n  else if (activeNav==='customers') renderCustomersTable();\n  else if (activeNav==='leads') renderLeadsTable();\n  else if (activeNav==='opportunities') renderOpportunitiesTable();\n}\n\n// Icon-only row buttons (used across all list screens).\nconst NOTE_ICON_SVG = '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/><line x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"/><line x1=\"9\" y1=\"17\" x2=\"13\" y2=\"17\"/><\u002Fsvg>';\nconst PEOPLE_ICON_SVG = '<svg width=\"17\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"15.6\" cy=\"8\" r=\"2.7\"/><path d=\"M11.2 20v-5a4.4 4.4 0 018.8 0v5z\"/><circle cx=\"8\" cy=\"7\" r=\"3\"/><path d=\"M2.6 20l2.1-7.1a3.3 3.3 0 016.6 0L13.4 20z\"/><\u002Fsvg>';\nfunction noteBtn(entityType, idx, count){\n  return '<button class=\"ua-btn ua-icon\" title=\"Notes ('+count+')\" onclick=\"openNotesFor(\\''+entityType+'\\', '+idx+')\">'+NOTE_ICON_SVG+'<span>'+count+'<\u002Fspan><\u002Fbutton>';\n}\nfunction participantsBtn(idx){\n  return '<button class=\"ua-btn ua-icon\" title=\"Participants\" onclick=\"manageMeetingParticipants('+idx+')\">'+PEOPLE_ICON_SVG+'<\u002Fbutton>';\n}\n\n// ─────────────────────────────────────────\nfunction showToast(msg, ok) {\n  const t = document.createElement('div');\n  t.style.cssText = 'position:fixed;bottom:28px;right:28px;z-index:999;background:' + (ok===false?'#991B1B':'#166534') + ';color:#fff;border-radius:10px;padding:12px 18px;font:500 13px/1 var(--font-sans);box-shadow:0 8px 24px rgba(0,0,0,.2);animation:fade-in .25s ease-out;';\n  t.textContent = msg;\n  document.body.appendChild(t);\n  setTimeout(() => t.remove(), 2800);\n}\n\n// ─────────────────────────────────────────\n// USERS & ROLES\n// ─────────────────────────────────────────\nfunction getRoleColor(role) {\n  return role==='Sales Director'?'#3B82F6':role==='App-Admin'?'#7C3AED':'#22C55E';\n}\nfunction editUser(email) {\n  const u = users.find(x => x.email===email);\n  if (!u) return;\n  showModal('Edit User — ' + email,\n    '<div style=\"display:flex;flex-direction:column;gap:12px\">' +\n      mSelect('edit-user-role', 'Role', ['Sales Member','Sales Director','App-Admin'], u.role) +\n      mSelect('edit-user-lang', 'Language', ['Turkish','English'], (LANG_META[u.language]||LANG_META.tr).label) +\n    '<\u002Fdiv>',\n    mBtn('Save Changes', \"saveUser('\"+email+\"')\") + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction saveUser(email) {\n  const u = users.find(x => x.email===email);\n  if (u) {\n    u.role = document.getElementById('edit-user-role').value;\n    u.roleColor = getRoleColor(u.role);\n    u.language = document.getElementById('edit-user-lang').value === 'English' ? 'en' : 'tr';\n  }\n  renderUsersTable(); closeModal(); showToast('User updated');\n}\nfunction toggleUserStatus(email) {\n  const u = users.find(x => x.email===email);\n  if (u) u.status = u.status==='Active' ? 'Suspended' : 'Active';\n  renderUsersTable(); showToast(u ? (u.status==='Active'?'User activated':'User suspended') : '');\n}\nfunction removeUser(email) {\n  const u = users.find(x => x.email===email);\n  showModal('Remove User',\n    '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Are you sure you want to remove <strong>' + email + '<\u002Fstrong>? This action cannot be undone.<\u002Fp>',\n    mBtn('Remove',\"confirmRemoveUser('\"+email+\"')\", false) + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction confirmRemoveUser(email) {\n  const idx = users.findIndex(x => x.email===email);\n  if (idx!==-1) users.splice(idx,1);\n  renderUsersTable(); closeModal(); showToast('User removed');\n}\nfunction sendInvite() {\n  const emailInput = document.getElementById('invite-email-input') || document.querySelector('.invite-input');\n  const roleSelect = document.querySelector('.role-select');\n  const langSelect = document.querySelector('.lang-select');\n  const emails = emailInput.value.split(';').map(e=>e.trim()).filter(Boolean);\n  if (!emails.length) { showToast('Enter at least one email address', false); return; }\n  emails.forEach(email => {\n    if (!users.find(u=>u.email===email)) {\n      const parts = email.split('@')[0].split('.');\n      const name = parts.map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' ');\n      users.push({ name, email, role:roleSelect.value, roleColor:getRoleColor(roleSelect.value), status:'Invited', initials:email.slice(0,2).toUpperCase(), color:'#94A3B8', date:new Date().toISOString().slice(0,10), language: (langSelect && langSelect.value) || 'tr' });\n    }\n  });\n  emailInput.value = '';\n  renderUsersTable(); document.getElementById('users-table').parentElement.querySelector('.count').textContent = users.length;\n  showToast('Invitation sent to ' + emails.length + ' user(s)');\n}\n\n// ─────────────────────────────────────────\n// ACCOUNT PROMPTS (Sales Intelligence → Account Prompts tab)\n// ─────────────────────────────────────────\nfunction viewAccountPrompt(idx) {\n  const p = ACCOUNT_PROMPTS[idx];\n  const evTag = (p.type === 'System Prompt' && p.eventType)\n    ? '<span style=\"margin-left:6px;font:500 11.5px/1 var(--font-sans);color:var(--genbil-ink-3)\">' + p.eventType + '<\u002Fspan>' : '';\n  const body = '<div style=\"margin-bottom:10px\">' + typeBadge(p.type) + evTag + '<\u002Fdiv>' +\n    (p.content\n      ? '<pre style=\"white-space:pre-wrap;font:400 12px/1.6 var(--font-mono);color:var(--genbil-ink-2);max-height:60vh;overflow-y:auto;margin:0;padding:14px 16px;background:#F8FAFC;border:1px solid var(--genbil-paper-3);border-radius:8px\">' + escHtml(p.content) + '<\u002Fpre>'\n      : '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-4)\">No content yet.<\u002Fp>');\n  showModal(p.name, body, mBtn('Close','closeModal()',true));\n}\nfunction toggleApEventType(typeSelectId, wrapId) {\n  const type = document.getElementById(typeSelectId).value;\n  const wrap = document.getElementById(wrapId);\n  if (wrap) wrap.style.display = type === 'System Prompt' ? '' : 'none';\n}\nconst AP_EVENT_TYPES = ['Pre-meeting Mentoring','Post-Meeting Mentoring','General Consultancy'];\nfunction addAccountPrompt() {\n  showModal('Add Account Prompt',\n    mInput('ap-name','Name *','','e.g. Negotiation Playbook') +\n    mSelect('ap-type','Type *',['System Prompt','Supporting Instruction'],'System Prompt',\"toggleApEventType('ap-type','ap-eventtype-wrap')\") +\n    '<div id=\"ap-eventtype-wrap\">' + mSelect('ap-eventtype','Event Type *',AP_EVENT_TYPES,'Pre-meeting Mentoring') + '<\u002Fdiv>' +\n    '<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">Content (Markdown) *<\u002Flabel>' +\n    '<textarea id=\"ap-content\" rows=\"10\" placeholder=\"# Prompt content…\" style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 12.5px/1.5 var(--font-mono);outline:none;resize:vertical\"><\u002Ftextarea><\u002Fdiv>',\n    mBtn('Add','saveAccountPrompt()') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction saveAccountPrompt() {\n  const name = document.getElementById('ap-name').value.trim();\n  const type = document.getElementById('ap-type').value;\n  const content = document.getElementById('ap-content').value;\n  if (!name) { showToast('Prompt name is required', false); return; }\n  let eventType = null;\n  if (type === 'System Prompt') {\n    eventType = document.getElementById('ap-eventtype').value;\n    if (!eventType) { showToast('Event Type is required for System Prompt', false); return; }\n  }\n  const kb = content.trim().length ? Math.max(1, Math.ceil(content.length/1024)) : 0;\n  ACCOUNT_PROMPTS.push({ name, type, eventType, status:'active', meta:'Uploaded ' + new Date().toLocaleDateString('en-GB') + ' · Markdown · ' + kb + ' KB · Active', content });\n  renderAccountPromptsList(); closeModal(); showToast('Account prompt added');\n}\nfunction updateAccountPrompt(idx) {\n  const p = ACCOUNT_PROMPTS[idx];\n  const wrapDisplay = p.type === 'System Prompt' ? '' : 'display:none;';\n  showModal('Update Account Prompt',\n    mInput('edit-ap-name','Name',p.name,'') +\n    mSelect('edit-ap-type','Type',['System Prompt','Supporting Instruction'], p.type,\n      \"toggleApEventType('edit-ap-type','edit-ap-eventtype-wrap')\") +\n    '<div id=\"edit-ap-eventtype-wrap\" style=\"' + wrapDisplay + '\">' + mSelect('edit-ap-eventtype','Event Type *',AP_EVENT_TYPES, p.eventType || 'Pre-meeting Mentoring') + '<\u002Fdiv>' +\n    '<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">Content (Markdown)<\u002Flabel>' +\n    '<textarea id=\"edit-ap-content\" rows=\"10\" style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 12.5px/1.5 var(--font-mono);outline:none;resize:vertical\">' + escHtml(p.content||'') + '<\u002Ftextarea><\u002Fdiv>',\n    mBtn('Save','saveUpdatedAccountPrompt('+idx+')') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction saveUpdatedAccountPrompt(idx) {\n  const name = document.getElementById('edit-ap-name').value.trim();\n  if (!name) { showToast('Name required', false); return; }\n  const type = document.getElementById('edit-ap-type').value;\n  let eventType = null;\n  if (type === 'System Prompt') {\n    eventType = document.getElementById('edit-ap-eventtype').value;\n    if (!eventType) { showToast('Event Type is required for System Prompt', false); return; }\n  }\n  const content = document.getElementById('edit-ap-content').value;\n  const kb = content.trim().length ? Math.max(1, Math.ceil(content.length/1024)) : 0;\n  ACCOUNT_PROMPTS[idx].name = name;\n  ACCOUNT_PROMPTS[idx].type = type;\n  ACCOUNT_PROMPTS[idx].eventType = eventType;\n  ACCOUNT_PROMPTS[idx].content = content;\n  ACCOUNT_PROMPTS[idx].meta = 'Uploaded ' + new Date().toLocaleDateString('en-GB') + ' · Markdown · ' + kb + ' KB · Active';\n  renderAccountPromptsList(); closeModal(); showToast('Account prompt updated');\n}\nfunction deleteAccountPrompt(idx) {\n  showModal('Delete Account Prompt',\n    '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Delete <strong>' + ACCOUNT_PROMPTS[idx].name + '<\u002Fstrong>? This cannot be undone.<\u002Fp>',\n    mBtn('Delete','confirmDeleteAccountPrompt('+idx+')') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction confirmDeleteAccountPrompt(idx) {\n  ACCOUNT_PROMPTS.splice(idx,1); renderAccountPromptsList(); closeModal(); showToast('Account prompt deleted');\n}\nfunction disableAccountPrompt(idx) {\n  showModal('Disable Account Prompt',\n    '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Disable <strong>' + ACCOUNT_PROMPTS[idx].name + '<\u002Fstrong>? It will no longer be injected into agent sessions until re-enabled.<\u002Fp>',\n    mBtn('Disable','doDisableAccountPrompt('+idx+')') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction doDisableAccountPrompt(idx) {\n  ACCOUNT_PROMPTS[idx].status = 'disabled';\n  closeModal(); showToast('Account prompt disabled'); renderAccountPromptsList();\n}\nfunction enableAccountPrompt(idx) {\n  ACCOUNT_PROMPTS[idx].status = 'active';\n  showToast('Account prompt re-enabled'); renderAccountPromptsList();\n}\n\n// ─────────────────────────────────────────\n// PRODUCT CATALOG\n// ─────────────────────────────────────────\nlet _editingProductIdx = -1;\nfunction openProductModal(idx) {\n  _editingProductIdx = (idx !== undefined) ? idx : -1;\n  const p = _editingProductIdx >= 0 ? catalogProducts[_editingProductIdx] : { code:'', name:'', groupId:PRODUCT_GROUPS[0].id, brand:'', desc:'' };\n  showModal(_editingProductIdx >= 0 ? 'Edit Product' : 'Add Product',\n    '<div style=\"display:grid;grid-template-columns:1fr 2fr;gap:12px\">' +\n      mInput('prod-code','Product Code *',p.code,'CIJ-01') +\n      mInput('prod-name','Product Name *',p.name,'Leibinger JET2neo') +\n    '<\u002Fdiv>' +\n    '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">' +\n      mSelect('prod-group','Product Group *',PRODUCT_GROUPS.map(g=>g.name),productGroupName(p.groupId)) +\n      mInput('prod-brand','Brand / Technology',p.brand||'','Leibinger / CIJ') +\n    '<\u002Fdiv>' +\n    '<div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">Description<\u002Flabel>' +\n    '<textarea id=\"prod-desc\" rows=\"4\" style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1.5 var(--font-sans);outline:none;resize:vertical\">' + (p.desc||'') + '<\u002Ftextarea><\u002Fdiv>',\n    mBtn(_editingProductIdx >= 0 ? 'Save' : 'Add Product','saveProduct()') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction saveProduct() {\n  const code = document.getElementById('prod-code').value.trim();\n  const name = document.getElementById('prod-name').value.trim();\n  if (!code || !name) { showToast('Code and name are required', false); return; }\n  const groupName = document.getElementById('prod-group').value;\n  const groupId = (PRODUCT_GROUPS.find(g => g.name === groupName) || PRODUCT_GROUPS[0]).id;\n  const p = { code, name, groupId, brand:document.getElementById('prod-brand').value.trim(), desc:document.getElementById('prod-desc').value.trim(), updated:new Date().toISOString().slice(0,10) };\n  if (_editingProductIdx >= 0) catalogProducts[_editingProductIdx] = p;\n  else catalogProducts.push(p);\n  renderProducts(); closeModal(); showToast(_editingProductIdx >= 0 ? 'Product updated' : 'Product added');\n}\nfunction deleteProduct(idx) {\n  showModal('Delete Product',\n    '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Delete <strong>' + catalogProducts[idx].name + '<\u002Fstrong>? This cannot be undone.<\u002Fp>',\n    mBtn('Delete','confirmDeleteProduct('+idx+')') + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction confirmDeleteProduct(idx) {\n  catalogProducts.splice(idx,1); renderProducts(); closeModal(); showToast('Product deleted');\n}\n\n// ─────────────────────────────────────────\n// REMOVE OLD openAgentChat / closeAgentChat\n// ─────────────────────────────────────────\n\n// ─────────────────────────────────────────\n// MEETINGS\n// ─────────────────────────────────────────\nconst TEAM_MEMBERS = [\n  { id:'director', name:'Ahmet Yılmaz', initials:'AY', color:'#3B82F6' },\n  { id:'member',   name:'Zeynep Kaya',  initials:'ZK', color:'#22C55E' },\n];\n\nconst MEETINGS_DATA = [\n  { id:'MTG-001', title:'Production Line Coding Review', customer:'Eti', customerId:'CUS-001',\n    type:'Routine Meeting',\n    opportunity:'Production Line Coding Upgrade', opportunityId:'OPP-001',\n    date:'2026-06-26', startTime:'14:00', durationMinutes:60,\n    details:'Review coder replacement plan and pricing across two packaging lines.',\n    crmId:'SF-MTG-001', status:'scheduled', cancellationReason:'',\n    ownerId:'director', ownerName:'Ahmet Yılmaz', ownerInitials:'AY', ownerColor:'#3B82F6',\n    participants:['member'] },\n  { id:'MTG-002', title:'Carton Line Automation Demo', customer:'Ülker', customerId:'CUS-002',\n    type:'Introductory Meeting',\n    opportunity:'Carton Line Automation', opportunityId:'OPP-002',\n    date:'2026-06-25', startTime:'10:30', durationMinutes:60,\n    details:'Full print & apply and carton coding demonstration for the technical team.',\n    crmId:'SF-MTG-002', status:'scheduled', cancellationReason:'',\n    ownerId:'member', ownerName:'Zeynep Kaya', ownerInitials:'ZK', ownerColor:'#22C55E',\n    participants:[] },\n  { id:'MTG-003', title:'Tyre Marking Contract Renewal', customer:'Brisa', customerId:'CUS-003',\n    type:'Follow-up Meeting',\n    opportunity:'Tyre Sidewall Marking Project', opportunityId:'OPP-003',\n    date:'2026-06-26', startTime:'16:00', durationMinutes:60,\n    details:'Contract renewal discussion with procurement team.',\n    crmId:'SF-MTG-003', status:'scheduled', cancellationReason:'',\n    ownerId:'member', ownerName:'Zeynep Kaya', ownerInitials:'ZK', ownerColor:'#22C55E',\n    participants:['director'] },\n  { id:'MTG-004', title:'Panel Coding Partnership Discussion', customer:'AGT', customerId:'CUS-004',\n    type:'Introductory Meeting',\n    opportunity:'', opportunityId:'',\n    date:'2026-07-05', startTime:'11:00', durationMinutes:45,\n    details:'Initial partnership scoping session.',\n    crmId:'', status:'cancelled', cancellationReason:'Customer requested postponement.',\n    ownerId:'director', ownerName:'Ahmet Yılmaz', ownerInitials:'AY', ownerColor:'#3B82F6',\n    participants:[] },\n];\n\nfunction mtgCanEdit(m) {\n  return currentRole === 'director' || m.ownerId === 'member';\n}\n\nconst MEETING_TYPES = ['Introductory Meeting','Follow-up Meeting','Routine Meeting'];\nfunction mtgTypeChip(t) {\n  const c = { 'Introductory Meeting':['#DBEAFE','#1E40AF'], 'Follow-up Meeting':['#FEF3C7','#92400E'], 'Routine Meeting':['#F1F5F9','#475569'] }[t] || ['#F1F5F9','#475569'];\n  return '<span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:' + c[0] + ';color:' + c[1] + ';white-space:nowrap\">' + (t || '—') + '<\u002Fspan>';\n}\n\nfunction renderMeetingsTable() {\n  const tbl = document.getElementById('list-table');\n  const st  = listState.meetings;\n  let list = MEETINGS_DATA.filter(m => currentRole === 'member'\n    ? (m.ownerId === 'member' || m.participants.includes('member'))\n    : (!myRecordsOnly || m.ownerId === 'director' || m.participants.includes('director')));\n  if (st.filter === 'open')   list = list.filter(m => m.status === 'scheduled');\n  if (st.filter === 'closed') list = list.filter(m => m.status === 'cancelled');\n  const q = (st.q||'').toLowerCase();\n  if (q.length >= 3) list = list.filter(m => m.title.toLowerCase().includes(q) || m.customer.toLowerCase().includes(q));\n  const total = list.length;\n  list = list.slice((st.page-1)*PAGE_SIZE, st.page*PAGE_SIZE);\n  const old = tbl.parentElement.querySelector('.list-pager'); if (old) old.remove();\n  if (!list.length) {\n    tbl.innerHTML = '<tbody><tr><td colspan=\"9\" style=\"text-align:center;padding:32px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No meetings found.<\u002Ftd><\u002Ftr><\u002Ftbody>';\n    renderPager('meetings', total, tbl, renderMeetingsTable); return;\n  }\n  const mtgStatusChip = s => s === 'scheduled'\n    ? '<span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:#DCFCE7;color:#166534\">Scheduled<\u002Fspan>'\n    : '<span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:#FEE2E2;color:#991B1B\">Cancelled<\u002Fspan>';\n\n  tbl.innerHTML = '<thead><tr><th>Title<\u002Fth><th>Customer<\u002Fth><th>Type<\u002Fth><th>Date &amp; Time<\u002Fth><th>Duration<\u002Fth><th>Owner<\u002Fth><th>Status<\u002Fth><th>Participants<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead><tbody>' +\n    list.map(m => {\n      const realIdx = MEETINGS_DATA.indexOf(m);\n      const isContrib = m.participants.includes(currentRole) && m.ownerId !== currentRole;\n      const canEdit = mtgCanEdit(m) && m.status === 'scheduled';\n      const canCancel = mtgCanEdit(m) && m.status === 'scheduled';\n      const canPart = mtgCanEdit(m) && m.status === 'scheduled';\n      const participantAvatars = m.participants.map(pid => {\n        const tm = TEAM_MEMBERS.find(t => t.id === pid);\n        return tm ? '<div class=\"avatar-sm\" style=\"background:' + tm.color + ';width:22px;height:22px;font-size:9px\" title=\"' + tm.name + '\">' + tm.initials + '<\u002Fdiv>' : '';\n      }).join('');\n      return '<tr style=\"opacity:' + (m.status === 'cancelled' ? '.55' : '1') + '\">' +\n        '<td style=\"font-weight:600\">' + m.title + (isContrib ? ' <span style=\"font:600 9px/1 var(--font-sans);padding:1px 6px;border-radius:999px;background:#F1F5F9;color:#64748B\">👤<\u002Fspan>' : '') + '<\u002Ftd>' +\n        '<td> ">${o.currency}<\u002Ftd>\n        <td>${productsCell}<\u002Ftd>\n        <td>${compCell}<\u002Ftd>\n        <td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"avatar-sm\" style=\"background:${o.ownerColor}\">${o.ownerInitials}<\u002Fdiv>${o.ownerName}<\u002Fdiv><\u002Ftd>\n        <td><div style=\"display:flex;gap:6px\"><button class=\"ua-btn\" onclick=\"openOppModal(${realIdx})\">Edit<\u002Fbutton>${noteBtn('opportunity', realIdx, notesCountFor('opportunity', o.id))}<\u002Fdiv><\u002Ftd>\n      <\u002Ftr>`;\n    }).join('') + '<\u002Ftbody>';\n}\n\nfunction openOppModal(idx, lockedCustomer) {\n  const isNew = idx < 0;\n  const o = isNew ? { id:'', name:'', customer: lockedCustomer || CUSTOMERS_DATA[0].name, stage:'Prospecting', value:'', currency:'TRY', info:'', crmId:'', productIds:[], mainCompetitorId:null } : OPPORTUNITIES[idx];\n  const customers = CUSTOMERS_DATA.map(c => c.name);\n  const competitorNames = ['— None —', ...COMPETITORS_DATA.map(c => c.name)];\n  const selectedCompetitorName = (COMPETITORS_DATA.find(c => c.id === o.mainCompetitorId) || {}).name || '— None —';\n  const selectedIds = new Set(o.productIds || []);\n  const groupedProductsHtml = PRODUCT_GROUPS.map(g => {\n    const items = catalogProducts.filter(p => p.groupId === g.id);\n    if (!items.length) return '';\n    return '<div class=\"opp-prod-group\" style=\"margin-bottom:8px\">' +\n      '<div style=\"font:600 11px/1 var(--font-sans);color:var(--genbil-ink-3);text-transform:uppercase;letter-spacing:.03em;padding:6px 2px 4px\">' + g.name + '<\u002Fdiv>' +\n      items.map(p =>\n        '<label class=\"opp-prod-row\" data-search=\"' + (p.name + ' ' + (p.brand||'')).toLowerCase() + '\" style=\"display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;font:400 12.5px/1.3 var(--font-sans)\">' +\n          '<input type=\"checkbox\" class=\"opp-prod-cb\" value=\"' + p.code + '\"' + (selectedIds.has(p.code)?' checked':'') + '>' +\n          '<span style=\"font-family:var(--font-mono);font-size:11px;color:var(--sm)\">' + p.code + '<\u002Fspan>' +\n          '<span>' + p.name + '<\u002Fspan>' +\n          '<span style=\"color:var(--genbil-ink-4);font-size:11px;margin-left:auto\">' + (p.brand||'') + '<\u002Fspan>' +\n        '<\u002Flabel>'\n      ).join('') +\n    '<\u002Fdiv>';\n  }).join('');\n  showModal(isNew ? 'New Opportunity' : 'Edit Opportunity',\n    withNotesTabs('opportunity', isNew ? null : o.id,\n    `<div style=\"display:flex;flex-direction:column;gap:12px\">\n      ${mInput('opp-name','Opportunity Name *', o.name, '')}\n      ${lockedCustomer\n        ? mLocked('opp-customer','Customer *', lockedCustomer, 'Pre-filled from the ' + (leadName(lockedCustomer) ? 'lead' : 'customer') + ' record and locked for this opportunity.')\n        : mSelect('opp-customer','Customer *', customers, o.customer)}\n      ${mSelect('opp-stage','Stage *', STAGES, o.stage)}\n      ${mSelect('opp-main-competitor','Main Competitor', competitorNames, selectedCompetitorName)}\n      <div style=\"display:grid;grid-template-columns:2fr 1fr;gap:10px\">\n        ${mInput('opp-value','Deal Value *', o.value, '0')}\n        ${mSelect('opp-currency','Currency', ['TRY','EUR','USD'], o.currency)}\n      <\u002Fdiv>\n      <div>\n        <label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">Products (0–N)<\u002Flabel>\n        <input type=\"text\" placeholder=\"Filter products…\" oninput=\"filterOppProductRows(this.value)\" style=\"width:100%;padding:7px 10px;margin-bottom:6px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 12.5px/1 var(--font-sans);outline:none\">\n        <div id=\"opp-products-list\" style=\"max-height:220px;overflow-y:auto;border:1.5px solid var(--genbil-line);border-radius:7px;padding:6px 8px\">${groupedProductsHtml}<\u002Fdiv>\n      <\u002Fdiv>\n      <div><label style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-2);display:block;margin-bottom:6px\">Notes / Context<\u002Flabel>\n        <textarea id=\"opp-info\" rows=\"3\" style=\"width:100%;padding:9px 12px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1.5 var(--font-sans);outline:none;resize:vertical\">${o.info||''}<\u002Ftextarea>\n      <\u002Fdiv>\n      ${mInput('opp-crm','CRM ID (optional)', o.crmId||'', 'SF-00000')}\n    <\u002Fdiv>`),\n    mBtn(isNew ? 'Create' : 'Save', `saveOpp(${idx})`) + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction filterOppProductRows(q) {\n  q = q.toLowerCase();\n  document.querySelectorAll('#opp-products-list .opp-prod-row').forEach(row => {\n    row.style.display = !q || row.dataset.search.includes(q) ? 'flex' : 'none';\n  });\n  document.querySelectorAll('#opp-products-list .opp-prod-group').forEach(grp => {\n    const anyVisible = [...grp.querySelectorAll('.opp-prod-row')].some(r => r.style.display !== 'none');\n    grp.style.display = anyVisible ? '' : 'none';\n  });\n}\n\nfunction saveOpp(idx) {\n  const name  = document.getElementById('opp-name')?.value?.trim();\n  const cust  = document.getElementById('opp-customer')?.value;\n  const stage = document.getElementById('opp-stage')?.value;\n  const val   = parseFloat(document.getElementById('opp-value')?.value || '0');\n  const cur   = document.getElementById('opp-currency')?.value;\n  const info  = document.getElementById('opp-info')?.value?.trim();\n  const crmId = document.getElementById('opp-crm')?.value?.trim();\n  const compName = document.getElementById('opp-main-competitor')?.value;\n  const mainCompetitorId = (COMPETITORS_DATA.find(c => c.name === compName) || {}).id || null;\n  if (!name) { showToast('Opportunity Name is required', false); return; }\n  const productIds = [...document.querySelectorAll('.opp-prod-cb:checked')].map(cb => cb.value);\n  const custMap = {}; CUSTOMERS_DATA.forEach(c => custMap[c.name] = c.id);\n  const ownerMeta = currentRole === 'director'\n    ? { ownerId:'director', ownerName:'Ahmet Yılmaz', ownerInitials:'AY', ownerColor:'#3B82F6' }\n    : { ownerId:'member',   ownerName:'Zeynep Kaya',  ownerInitials:'ZK', ownerColor:'#22C55E' };\n  if (idx < 0) {\n    OPPORTUNITIES.unshift({ id:'OPP-'+String(OPPORTUNITIES.length+1).padStart(3,'0'), name, customer:cust, customerId:custMap[cust]||'', stage, value:val, currency:cur, info, crmId, productIds, mainCompetitorId, ...ownerMeta });\n  } else {\n    Object.assign(OPPORTUNITIES[idx], { name, customer:cust, customerId:custMap[cust]||'', stage, value:val, currency:cur, info, crmId, productIds, mainCompetitorId });\n  }\n\n  // On creation, bump the customer's opportunity count and auto-convert Lead → New.\n  let converted = null;\n  if (idx < 0) {\n    const c = CUSTOMERS_DATA.find(x => x.name === cust);\n    if (c) {\n      c.opportunities = (c.opportunities || 0) + 1;\n      if (c.type === 'Lead') { c.type = 'New'; converted = c.name; }\n    }\n  }\n\n  closeModal();\n  if (converted) {\n    showToast('Opportunity created · ' + converted + ' converted Lead → New');\n  } else {\n    showToast(idx < 0 ? 'Opportunity created' : 'Opportunity updated');\n  }\n  renderNav(roles[currentRole]);\n  if (document.getElementById('list-view').classList.contains('visible')) {\n    if (activeNav === 'leads') renderLeadsTable();\n    else if (activeNav === 'customers') renderCustomersTable();\n    else renderOpportunitiesTable();\n  }\n}\n\n// True when the given customer name currently belongs to a Lead-type record.\nfunction leadName(name) {\n  const c = CUSTOMERS_DATA.find(x => x.name === name);\n  return !!(c && c.type === 'Lead');\n}\n\n// ─────────────────────────────────────────\n// LIST SEARCH / FILTER / PAGING\n// ─────────────────────────────────────────\nfunction renderListSearchBar(type) {\n  const sb = document.getElementById('list-search-bar');\n  if (!sb) return;\n  sb.style.display = 'flex';\n  const st = listState[type];\n  const searchPh = type === 'customers' ? 'Search by name or number…'\n    : type === 'leads' ? 'Search by name or number…'\n    : type === 'opportunities' ? 'Search by name or customer…'\n    : type === 'tasks' ? 'Search by meeting or customer…'\n    : type === 'competitors' ? 'Search by name or industry…'\n    : 'Search by title or customer…';\n  const filterOpts = type === 'customers'\n    ? [['all','All'],['enabled','Enabled'],['disabled','Disabled']]\n    : type === 'leads'\n    ? [['all','All'],['mine','My Leads']]\n    : type === 'competitors'\n    ? [['all','All'],['Local','Local'],['Global','Global'],['Multi-national','Multi-national']]\n    : [['all','All'],['open','Open'],['closed','Closed']];\n  sb.innerHTML =\n    '<div style=\"position:relative;flex:1;min-width:180px;max-width:340px\">' +\n      '<svg style=\"position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none\" width=\"13\" height=\"13\" viewBox=\"0 0 15 15\" fill=\"none\"><circle cx=\"6.5\" cy=\"6.5\" r=\"4.5\" stroke=\"currentColor\" stroke-width=\"1.3\"/><path d=\"M10 10l3 3\" stroke=\"currentColor\" stroke-width=\"1.3\" stroke-linecap=\"round\"/><\u002Fsvg>' +\n      '<input id=\"list-sq\" type=\"text\" value=\"' + st.q + '\" placeholder=\"' + searchPh + ' (min. 3 chars)\" ' +\n        'oninput=\"onListSearch(\\'' + type + '\\',this.value)\" ' +\n        'style=\"width:100%;padding:7px 10px 7px 30px;border:1.5px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none\">' +\n      '<span id=\"list-sq-hint\" style=\"display:none;position:absolute;left:0;top:calc(100%+3px);font:400 11px/1 var(--font-sans);color:#F59E0B;white-space:nowrap\">Type at least 3 characters…<\u002Fspan>' +\n    '<\u002Fdiv>' +\n    '<div style=\"display:flex;gap:0;border:1px solid var(--genbil-line);border-radius:7px;overflow:hidden\">' +\n      filterOpts.map(([v,l]) =>\n        '<button onclick=\"onListFilter(\\'' + type + '\\',\\'' + v + '\\')\" ' +\n          'style=\"padding:7px 14px;border:none;font:' + (st.filter===v?'600':'400') + ' 12px/1 var(--font-sans);' +\n          'background:' + (st.filter===v?'var(--sm)':'transparent') + ';' +\n          'color:' + (st.filter===v?'#fff':'var(--genbil-ink-3)') + ';cursor:pointer\">' + l + '<\u002Fbutton>'\n      ).join('<span style=\"width:1px;background:var(--genbil-line)\"><\u002Fspan>') +\n    '<\u002Fdiv>';\n}\n\nfunction onListSearch(type, val) {\n  const hint = document.getElementById('list-sq-hint');\n  if (val.length > 0 && val.length < 3) {\n    if (hint) hint.style.display = 'block';\n    return;\n  }\n  if (hint) hint.style.display = 'none';\n  listState[type].q = val; listState[type].page = 1;\n  if (type === 'customers') renderCustomersTable();\n  else if (type === 'leads') renderLeadsTable();\n  else if (type === 'opportunities') renderOpportunitiesTable();\n  else if (type === 'competitors') renderCompetitorsTable();\n  else if (type === 'tasks') { renderTasksFiltered(); document.getElementById('list-table').innerHTML = document.getElementById('tasks-table').innerHTML; }\n  else renderMeetingsTable();\n}\n\nfunction onListFilter(type, val) {\n  listState[type].filter = val; listState[type].page = 1;\n  renderListSearchBar(type);\n  if (type === 'customers') renderCustomersTable();\n  else if (type === 'leads') renderLeadsTable();\n  else if (type === 'opportunities') renderOpportunitiesTable();\n  else if (type === 'competitors') renderCompetitorsTable();\n  else if (type === 'tasks') { renderTasksFiltered(); document.getElementById('list-table').innerHTML = document.getElementById('tasks-table').innerHTML; }\n  else renderMeetingsTable();\n}\n\nfunction renderPager(type, total, tbl, renderFn) {\n  const st = listState[type];\n  const pages = Math.ceil(total / PAGE_SIZE);\n  if (pages <= 1) return;\n  let pg = '<div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;font:400 12px/1 var(--font-sans);color:var(--genbil-ink-3)\">' +\n    '<span>Showing ' + ((st.page-1)*PAGE_SIZE+1) + '–' + Math.min(st.page*PAGE_SIZE,total) + ' of ' + total + '<\u002Fspan>' +\n    '<div style=\"display:flex;gap:4px\">';\n  for (let i = 1; i <= pages; i++) {\n    pg += '<button onclick=\"listGoPage(\\'' + type + '\\',' + i + ')\" style=\"padding:4px 10px;border-radius:5px;border:1px solid var(--genbil-line);font:' +\n      (i===st.page?'700':'400') + ' 11.5px/1 var(--font-sans);background:' + (i===st.page?'var(--sm)':'#fff') + ';color:' + (i===st.page?'#fff':'var(--genbil-ink-3)') + ';cursor:pointer\">' + i + '<\u002Fbutton>';\n  }\n  pg += '<\u002Fdiv><\u002Fdiv>';\n  const pagerEl = document.createElement('div');\n  pagerEl.innerHTML = pg;\n  tbl.parentElement.appendChild(pagerEl);\n}\n\nfunction listGoPage(type, p) {\n  listState[type].page = p;\n  if (type === 'customers') renderCustomersTable();\n  else if (type === 'leads') renderLeadsTable();\n  else if (type === 'opportunities') renderOpportunitiesTable();\n  else if (type === 'competitors') renderCompetitorsTable();\n  else renderMeetingsTable();\n}\n\nfunction renderCustomersTable() {\n  const tbl = document.getElementById('list-table');\n  const st  = listState.customers;\n  // Customers list shows New + Existing only — Leads live in their own view.\n  let list = CUSTOMERS_DATA.filter(c => c.type !== 'Lead');\n  if (st.filter === 'enabled')  list = list.filter(c => c.is_active);\n  if (st.filter === 'disabled') list = list.filter(c => !c.is_active);\n  const q = st.q.toLowerCase();\n  if (q.length >= 3) list = list.filter(c => c.name.toLowerCase().includes(q) || c.number.toLowerCase().includes(q));\n  const total = list.length;\n  const page  = list.slice((st.page-1)*PAGE_SIZE, st.page*PAGE_SIZE);\n\n  // Remove old pager\n  const old = tbl.parentElement.querySelector('.list-pager');\n  if (old) old.remove();\n\n  if (!page.length) {\n    tbl.innerHTML = '<tbody><tr><td colspan=\"9\" style=\"text-align:center;padding:32px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No customers found.<\u002Ftd><\u002Ftr><\u002Ftbody>';\n    return;\n  }\n  const activeChip = '<span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:#DCFCE7;color:#166534\">Enabled<\u002Fspan>';\n  const inactiveChip = '<span style=\"font:600 10px/1 var(--font-sans);padding:2px 9px;border-radius:999px;background:#FEE2E2;color:#991B1B\">Disabled<\u002Fspan>';\n  tbl.innerHTML = '<thead><tr><th>Customer<\u002Fth><th>Number<\u002Fth><th>Type<\u002Fth><th>Industry<\u002Fth><th>Status<\u002Fth><th>Owner<\u002Fth><th style=\"text-align:center\">Opps<\u002Fth><th style=\"text-align:center\">Meetings<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead><tbody>' +\n    page.map(c => {\n      const realIdx = CUSTOMERS_DATA.indexOf(c);\n      return '<tr>' +\n        '<td style=\"font-weight:600\">' + c.name + '<\u002Ftd>' +\n        '<td style=\"font:400 12px/1 var(--font-mono);color:var(--genbil-ink-4)\">' + c.number + '<\u002Ftd>' +\n        '<td>' + custTypeChip(c.type) + '<\u002Ftd>' +\n        '<td>' + c.industry + '<\u002Ftd>' +\n        '<td>' + (c.is_active ? activeChip : inactiveChip) + '<\u002Ftd>' +\n        '<td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"avatar-sm\" style=\"background:' + c.ownerColor + '\">' + c.ownerInitials + '<\u002Fdiv>' + c.ownerName + '<\u002Fdiv><\u002Ftd>' +\n        '<td style=\"text-align:center\">' + c.opportunities + '<\u002Ftd>' +\n        '<td style=\"text-align:center\">' + c.meetings + '<\u002Ftd>' +\n        '<td><div style=\"display:flex;gap:6px\">' +\n          '<button class=\"ua-btn\" onclick=\"openCustomerModal(' + realIdx + ')\">Edit<\u002Fbutton>' +\n          noteBtn('customer', realIdx, notesCountFor('customer', c.id)) +\n          '<button class=\"ua-btn primary\" onclick=\"openOppModalForCustomer(' + realIdx + ')\">+ Opportunity<\u002Fbutton>' +\n        '<\u002Fdiv><\u002Ftd>' +\n      '<\u002Ftr>';\n    }).join('') + '<\u002Ftbody>';\n  renderPager('customers', total, tbl, renderCustomersTable);\n}\n\nfunction renderLeadsTable() {\n  const tbl = document.getElementById('list-table');\n  const st  = listState.leads;\n  let list = CUSTOMERS_DATA.filter(c => c.type === 'Lead');\n  if (st.filter === 'mine') {\n    const myInit = currentRole === 'member' ? 'ZK' : 'AY';\n    list = list.filter(c => c.ownerInitials === myInit);\n  }\n  const q = st.q.toLowerCase();\n  if (q.length >= 3) list = list.filter(c => c.name.toLowerCase().includes(q) || c.number.toLowerCase().includes(q));\n  const total = list.length;\n  const page  = list.slice((st.page-1)*PAGE_SIZE, st.page*PAGE_SIZE);\n\n  const old = tbl.parentElement.querySelector('.list-pager');\n  if (old) old.remove();\n\n  if (!page.length) {\n    tbl.innerHTML = '<tbody><tr><td colspan=\"6\" style=\"text-align:center;padding:32px;color:var(--genbil-ink-4);font:400 13px/1 var(--font-sans)\">No leads found. New prospects you add appear here until their first opportunity is created.<\u002Ftd><\u002Ftr><\u002Ftbody>';\n    return;\n  }\n  tbl.innerHTML = '<thead><tr><th>Lead<\u002Fth><th>Number<\u002Fth><th>Industry<\u002Fth><th>Owner<\u002Fth><th>Type<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead><tbody>' +\n    page.map(c => {\n      const realIdx = CUSTOMERS_DATA.indexOf(c);\n      return '<tr>' +\n        '<td style=\"font-weight:600\">' + c.name + '<\u002Ftd>' +\n        '<td style=\"font:400 12px/1 var(--font-mono);color:var(--genbil-ink-4)\">' + c.number + '<\u002Ftd>' +\n        '<td>' + c.industry + '<\u002Ftd>' +\n        '<td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"avatar-sm\" style=\"background:' + c.ownerColor + '\">' + c.ownerInitials + '<\u002Fdiv>' + c.ownerName + '<\u002Fdiv><\u002Ftd>' +\n        '<td>' + custTypeChip(c.type) + '<\u002Ftd>' +\n        '<td><div style=\"display:flex;gap:6px\">' +\n          '<button class=\"ua-btn\" onclick=\"openCustomerModal(' + realIdx + ')\">Edit<\u002Fbutton>' +\n          noteBtn('customer', realIdx, notesCountFor('customer', c.id)) +\n          '<button class=\"ua-btn primary\" onclick=\"openOppModalForCustomer(' + realIdx + ')\">+ Opportunity<\u002Fbutton>' +\n        '<\u002Fdiv><\u002Ftd>' +\n      '<\u002Ftr>';\n    }).join('') + '<\u002Ftbody>';\n  renderPager('leads', total, tbl, renderLeadsTable);\n}\n\n// ── Customer / Lead create + edit ──────────────────────────────\nconst CUST_OWNERS = [\n  { name:'Ahmet Yılmaz', initials:'AY', color:'#3B82F6' },\n  { name:'Zeynep Kaya',  initials:'ZK', color:'#22C55E' },\n  { name:'Mehmet Çelik', initials:'MÇ', color:'#F59E0B' },\n];\nfunction openCustomerModal(idx, presetType) {\n  const isNew = idx < 0;\n  const c = isNew\n    ? { name:'', number:'(auto-generated)', industry:'', type:presetType || 'New', is_active:true, ownerName:CUST_OWNERS[0].name }\n    : CUSTOMERS_DATA[idx];\n  const ownerNames = CUST_OWNERS.map(o => o.name);\n  const numberField = isNew\n    ? mLocked('cust-number', 'Customer Number', 'Assigned automatically on save')\n    : mLocked('cust-number', 'Customer Number', c.number);\n  const title = isNew ? (presetType === 'Lead' ? 'New Lead' : 'New Customer') : (c.type === 'Lead' ? 'Edit Lead' : 'Edit Customer');\n  showModal(title,\n    withNotesTabs('customer', isNew ? null : c.id,\n    `<div style=\"display:flex;flex-direction:column;gap:12px\">\n      ${mInput('cust-name','Company Name *', c.name, 'e.g. Şölen')}\n      ${numberField}\n      ${mInput('cust-industry','Industry *', c.industry, 'e.g. Food & Beverage')}\n      ${mSelect('cust-type','Type *', ['Lead','New','Existing'], c.type)}\n      ${mSelect('cust-owner','Owner', ownerNames, c.ownerName)}\n      ${mSelect('cust-status','Status', ['Enabled','Disabled'], c.is_active ? 'Enabled' : 'Disabled')}\n      <div style=\"background:var(--sm-tint);border-radius:8px;padding:9px 12px;font:400 11.5px/1.5 var(--font-sans);color:var(--sm-deep)\">\n        A <strong>Lead<\u002Fstrong> becomes <strong>New<\u002Fstrong> automatically once its first opportunity is created.\n      <\u002Fdiv>\n    <\u002Fdiv>`),\n    mBtn(isNew ? 'Create' : 'Save', `saveCustomer(${idx})`) + mBtn('Cancel','closeModal()',true)\n  );\n}\nfunction saveCustomer(idx) {\n  const name = document.getElementById('cust-name')?.value?.trim();\n  const industry = document.getElementById('cust-industry')?.value?.trim();\n  const type = document.getElementById('cust-type')?.value;\n  const ownerName = document.getElementById('cust-owner')?.value;\n  const is_active = document.getElementById('cust-status')?.value === 'Enabled';\n  if (!name) { showToast('Company Name is required', false); return; }\n  if (!industry) { showToast('Industry is required', false); return; }\n  const owner = CUST_OWNERS.find(o => o.name === ownerName) || CUST_OWNERS[0];\n  if (idx < 0) {\n    const num = 'CUS-' + String(CUSTOMERS_DATA.length + 1).padStart(3, '0');\n    CUSTOMERS_DATA.push({ id:num, name, number:num, industry, type, is_active,\n      ownerName:owner.name, ownerInitials:owner.initials, ownerColor:owner.color, opportunities:0, meetings:0 });\n  } else {\n    Object.assign(CUSTOMERS_DATA[idx], { name, industry, type, is_active,\n      ownerName:owner.name, ownerInitials:owner.initials, ownerColor:owner.color });\n  }\n  closeModal();\n  showToast(idx < 0 ? (type === 'Lead' ? 'Lead created' : 'Customer created') : 'Saved');\n  renderNav(roles[currentRole]);\n  if (activeNav === 'leads') renderLeadsTable();\n  else if (activeNav === 'customers') renderCustomersTable();\n}\n\n// Open the New Opportunity modal with the customer locked to a specific record.\nfunction openOppModalForCustomer(custIdx) {\n  const c = CUSTOMERS_DATA[custIdx];\n  if (c) openOppModal(-1, c.name);\n}\n\n\n\n// ─────────────────────────────────────────\n// MARKET INTELLIGENCE\n// ─────────────────────────────────────────\nlet mktActiveTab = 'context';\nlet siMainTab = 'customer'; // top-level Sales Intelligence tab: 'customer' | 'competitor'\nlet cmpActiveTab = 'context';\nlet _cmpS
