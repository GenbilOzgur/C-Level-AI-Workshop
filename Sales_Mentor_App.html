  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8B;\n  --genbil-ink-4:    #94A3B8;\n\n  /* ─── Color: paper ─── */\n  --genbil-paper:    #FFFFFF;\n  --genbil-paper-2:  #F8FAFC;\n  --genbil-paper-3:  #EEF2F7;\n  --genbil-line:     #E2E8F0;\n  --genbil-line-2:   #CBD5E1;\n\n  /* ─── Color: Microsoft platform blue (product UI primary) ─── */\n  --ms-blue:         #0078D4;\n  --ms-blue-deep:    #005A9E;\n  --ms-blue-darker:  #004578;\n  --ms-blue-tint:    #DEECF9;\n  --ms-blue-tint-2:  #C7E0F4;\n\n  /* ─── Color: Genbil cyan (marketing accent) ─── */\n  --genbil-cyan:     #00B4D8;\n  --genbil-cyan-deep:#0096B7;\n  --genbil-cyan-tint:#E0F7FB;\n\n  /* ─── Color: status (Fluent) ─── */\n  --success:         #107C10;\n  --success-tint:    #DFF6DD;\n  --warn:            #FFAA44;\n  --warn-deep:       #C2900D;\n  --warn-tint:       #FFF4CE;\n  --danger:          #A4262C;\n  --danger-tint:     #FDE7E9;\n\n  /* ─── Color: data viz (Power BI–ish, used in HumanSoft dashboards) ─── */\n  --viz-1: #0078D4;\n  --viz-2: #00B4D8;\n  --viz-3: #5C2D91;\n  --viz-4: #E3008C;\n  --viz-5: #00B294;\n  --viz-6: #FFAA44;\n\n  /* ─── Type: families ─── */\n  --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-product: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;\n  --font-mono:    'Cascadia Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* ─── Type: scale (--lh = line-height, --tr = letter-spacing/tracking) ─── */\n  --fs-display:   72px;  --lh-display:   1.04; /* @kind font */  --tr-display: -0.02em; /* @kind font */\n  --fs-h1:        48px;  --lh-h1:        1.10; /* @kind font */  --tr-h1:      -0.02em; /* @kind font */\n  --fs-h2:        36px;  --lh-h2:        1.16; /* @kind font */  --tr-h2:      -0.01em; /* @kind font */\n  --fs-h3:        28px;  --lh-h3:        1.22; /* @kind font */  --tr-h3:      -0.01em; /* @kind font */\n  --fs-h4:        22px;  --lh-h4:        1.28; /* @kind font */  --tr-h4:      0; /* @kind font */\n  --fs-h5:        18px;  --lh-h5:        1.34; /* @kind font */  --tr-h5:      0; /* @kind font */\n  --fs-body:      16px;  --lh-body:      1.55; /* @kind font */  --tr-body:    0; /* @kind font */\n  --fs-body-sm:   14px;  --lh-body-sm:   1.50; /* @kind font */  --tr-body-sm: 0; /* @kind font */\n  --fs-caption:   12px;  --lh-caption:   1.45; /* @kind font */  --tr-caption: +0.02em; /* @kind font */\n  --fs-eyebrow:   12px;  --lh-eyebrow:   1.20; /* @kind font */  --tr-eyebrow: +0.12em; /* @kind font */ /* uppercase */\n\n  /* ─── Spacing — 8pt grid ─── */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  24px;\n  --space-6:  32px;\n  --space-7:  40px;\n  --space-8:  48px;\n  --space-9:  64px;\n  --space-10: 80px;\n  --space-11: 96px;\n  --space-12: 128px;\n\n  /* ─── Radius ─── */\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-pill: 999px;\n\n  /* ─── Shadow / elevation ─── */\n  --shadow-1: 0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);\n  --shadow-2: 0 4px 12px rgba(15,23,42,.08), 0 1px 3px rgba(15,23,42,.04);\n  --shadow-3: 0 12px 32px rgba(15,23,42,.12), 0 4px 8px rgba(15,23,42,.06);\n  --focus-ring: 0 0 0 2px var(--genbil-paper), 0 0 0 4px var(--ms-blue);\n\n  /* ─── Motion ─── */\n  --motion-fast: 120ms; /* @kind other */\n  --motion-base: 180ms; /* @kind other */\n  --motion-slow: 320ms; /* @kind other */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-std:    cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n\n  /* ─── Layout ─── */\n  --maxw-marketing: 1200px; /* @kind spacing */\n  --rail-width:     240px; /* @kind spacing */\n  --commandbar-h:   44px; /* @kind spacing */\n}\n\n/* ─── Semantic element defaults ─── */\n\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--genbil-ink);\n  background: var(--genbil-paper);\n  margin: 0;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 { font: 700 var(--fs-h1)/var(--lh-h1) var(--font-sans); letter-spacing: var(--tr-h1); margin: 0; }\nh2, .h2 { font: 700 var(--fs-h2)/var(--lh-h2) var(--font-sans); letter-spacing: var(--tr-h2); margin: 0; }\nh3, .h3 { font: 600 var(--fs-h3)/var(--lh-h3) var(--font-sans); letter-spacing: var(--tr-h3); margin: 0; }\nh4, .h4 { font: 600 var(--fs-h4)/var(--lh-h4) var(--font-sans); margin: 0; }\nh5, .h5 { font: 600 var(--fs-h5)/var(--lh-h5) var(--font-sans); margin: 0; }\n\n.display { font: 800 var(--fs-display)/var(--lh-display) var(--font-sans); letter-spacing: var(--tr-display); }\n.eyebrow {\n  font: 600 var(--fs-eyebrow)/var(--lh-eyebrow) var(--font-sans);\n  text-transform: uppercase;\n  letter-spacing: var(--tr-eyebrow);\n  color: var(--genbil-cyan-deep);\n}\n.body-sm { font-size: var(--fs-body-sm); line-height: var(--lh-body-sm); }\n.caption { font-size: var(--fs-caption); line-height: var(--lh-caption); color: var(--genbil-ink-3); }\ncode, .mono { font-family: var(--font-mono); font-size: 0.9em; }\n\na { color: var(--ms-blue); text-decoration: none; }\na:hover { color: var(--ms-blue-deep); text-decoration: underline; }\n\nhr { border: 0; border-top: 1px solid var(--genbil-line); margin: var(--space-6) 0; }\n\n/* ─── Product surface (Fluent) override ─── */\n\n[data-surface=\"product\"] {\n  font-family: var(--font-product);\n  --fs-h1: 28px;\n  --fs-h2: 20px;\n  --fs-h3: 16px;\n  --fs-body: 14px;\n  --fs-body-sm: 12px;\n  --radius-lg: 8px;\n  --radius-md: 4px;\n  --radius-sm: 2px;\n}\n[data-surface=\"product\"] h1 { font: 600 var(--fs-h1)/1.2 var(--font-product); }\n[data-surface=\"product\"] h2 { font: 600 var(--fs-h2)/1.3 var(--font-product); }\n[data-surface=\"product\"] h3 { font: 600 var(--fs-h3)/1.4 var(--font-product); }\n\n/* ─── Reusable button primitives ─── */\n\n.btn {\n  display: inline-flex; align-items: center; gap: var(--space-2);\n  padding: 10px 20px;\n  border: 1px solid transparent;\n  border-radius: var(--radius-pill);\n  font: 600 var(--fs-body-sm)/1 var(--font-sans);\n  cursor: pointer;\n  transition: background var(--motion-fast) var(--ease-std), color var(--motion-fast) var(--ease-std), border-color var(--motion-fast) var(--ease-std);\n  white-space: nowrap;\n}\n.btn-primary { background: var(--ms-blue); color: #fff; }\n.btn-primary:hover { background: var(--ms-blue-deep); }\n.btn-primary:active { background: var(--ms-blue-darker); }\n\n.btn-cyan { background: var(--genbil-cyan); color: #fff; }\n.btn-cyan:hover { background: var(--genbil-cyan-deep); }\n\n.btn-ghost { background: transparent; color: var(--genbil-ink); border-color: var(--genbil-line-2); }\n.btn-ghost:hover { background: var(--genbil-paper-3); }\n\n.btn-link { padding: 0; background: transparent; color: var(--ms-blue); border-radius: 0; }\n.btn-link:hover { color: var(--ms-blue-deep); text-decoration: underline; }\n\n[data-surface=\"product\"] .btn { border-radius: var(--radius-sm); padding: 6px 14px; font-size: var(--fs-body-sm); }\n<\u002Fstyle>\n\n\n\n<style>\n:root {\n  --sm: #7C3AED; --sm-deep: #5B21B6; --sm-mid: #a78bfa; --sm-tint: #EDE9FE;\n  --sidebar-w: 236px;\n}\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { height: 100%; overflow: auto; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; background: #F1F5F9; color: var(--genbil-ink); font-size: 14px; }\n\n/* ── SHELL ─────────────────────────────────── */\n.shell { display: flex; min-height: 100vh; height: 100%; }\n\n/* ── SIDEBAR ────────────────────────────────── */\n.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: #fff; border-right: 1px solid var(--genbil-line); display: flex; flex-direction: column; overflow: hidden; z-index: 10; }\n.sb-logo { padding: 14px 16px 10px; border-bottom: 1px solid var(--genbil-paper-3); display: flex; align-items: center; gap: 8px; font: 700 14px/1 var(--font-sans); color: var(--genbil-ink); text-decoration: none; }\n.sb-logo svg { width: 22px; height: 22px; flex-shrink: 0; }\n.sb-logo .accent { color: var(--sm); }\n\n/* Role switcher */\n.role-switcher { padding: 10px 10px 8px; border-bottom: 1px solid var(--genbil-paper-3); }\n.role-switcher-label { font: 600 10px/1 var(--font-sans); letter-spacing: .1em; text-transform: uppercase; color: var(--genbil-ink-4); margin-bottom: 6px; padding-left: 2px; }\n.role-tabs { display: flex; flex-direction: column; gap: 2px; }\n.role-tab { padding: 7px 10px; border-radius: 7px; cursor: pointer; font: 500 12.5px/1.2 var(--font-sans); color: var(--genbil-ink-3); border: none; background: transparent; text-align: left; display: flex; align-items: center; gap: 8px; transition: background 120ms, color 120ms; width: 100%; }\n.role-tab:hover { background: var(--genbil-paper-2); }\n.role-tab.active { background: var(--sm-tint); color: var(--sm); font-weight: 600; }\n.role-tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }\n\n/* Nav */\n.sb-nav { flex: 1; overflow-y: auto; padding: 10px 8px; }\n.nav-section-label { font: 600 10px/1 var(--font-sans); letter-spacing: .1em; text-transform: uppercase; color: var(--genbil-ink-4); padding: 10px 8px 6px; }\n.nav-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 7px; cursor: pointer; font: 500 13px/1.2 var(--font-sans); color: var(--genbil-ink-2); border: none; background: transparent; width: 100%; text-align: left; transition: background 120ms, color 120ms; margin-bottom: 1px; }\n.nav-item:hover { background: var(--genbil-paper-2); }\n.nav-item.active { background: var(--sm-tint); color: var(--sm); font-weight: 600; }\n.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; color: currentColor; opacity: .7; }\n.nav-item.active svg { opacity: 1; }\n.nav-badge { margin-left: auto; font: 600 10px/1 var(--font-sans); padding: 2px 7px; border-radius: 999px; background: var(--sm-tint); color: var(--sm); }\n.nav-badge.red { background: rgba(239,68,68,.1); color: #DC2626; }\n\n.sb-user { padding: 12px 14px; border-top: 1px solid var(--genbil-paper-3); display: flex; align-items: center; gap: 9px; }\n.sb-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font: 700 12px/1 var(--font-sans); flex-shrink: 0; color: #fff; }\n.sb-user-info { flex: 1; min-width: 0; }\n.sb-user-name { font: 600 12.5px/1 var(--font-sans); color: var(--genbil-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.sb-user-role { font: 400 11px/1 var(--font-sans); color: var(--genbil-ink-4); margin-top: 2px; }\n\n/* ── MAIN ──────────────────────────────────── */\n.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }\n\n.topbar { height: 52px; background: #fff; border-bottom: 1px solid var(--genbil-line); display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0; }\n.topbar-title { font: 700 16px/1 var(--font-sans); color: var(--genbil-ink); }\n.topbar-sub { font: 400 13px/1 var(--font-sans); color: var(--genbil-ink-4); }\n.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }\n.toggle-pill { display: flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--genbil-line-2); background: transparent; cursor: pointer; font: 500 12.5px/1 var(--font-sans); color: var(--genbil-ink-3); transition: all 120ms; user-select: none; }\n.toggle-pill.on { background: var(--sm-tint); border-color: var(--sm); color: var(--sm); }\n.toggle-knob { width: 28px; height: 16px; border-radius: 999px; background: var(--genbil-line-2); position: relative; transition: background 120ms; flex-shrink: 0; }\n.toggle-pill.on .toggle-knob { background: var(--sm); }\n.toggle-knob::after { content: \"\"; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform 120ms; }\n.toggle-pill.on .toggle-knob::after { transform: translateX(12px); }\n.tb-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: 1.5px solid var(--genbil-line); background: transparent; font: 500 12.5px/1 var(--font-sans); color: var(--genbil-ink-2); cursor: pointer; transition: background 120ms; }\n.tb-btn:hover { background: var(--genbil-paper-2); }\n.tb-btn.primary { background: var(--sm); color: #fff; border-color: var(--sm); }\n.tb-btn.primary:hover { background: var(--sm-deep); }\n\n/* ── CONTENT ────────────────────────────────── */\n.content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }\n\n/* greeting */\n.greeting { display: flex; align-items: flex-end; justify-content: space-between; }\n.greeting-text h1 { font: 700 22px/1.2 var(--font-sans); color: var(--genbil-ink); letter-spacing: -.01em; }\n.greeting-text p { font: 400 13px/1 var(--font-sans); color: var(--genbil-ink-4); margin-top: 4px; }\n.role-chip { padding: 4px 12px; border-radius: 999px; font: 600 11.5px/1 var(--font-sans); letter-spacing: .04em; text-transform: uppercase; }\n\n/* widgets */\n.widgets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }\n.widget { background: #fff; border: 1.5px solid var(--genbil-line); border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: border-color 140ms, box-shadow 140ms, transform 100ms; position: relative; overflow: hidden; }\n.widget:hover { border-color: var(--sm); box-shadow: 0 4px 16px rgba(124,58,237,.1); transform: translateY(-1px); }\n.widget.active-widget { border-color: var(--sm); background: var(--sm-tint); }\n.widget::before { content: \"\"; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 12px 12px 0 0; }\n.widget.w-customers::before { background: #3B82F6; }\n.widget.w-opps::before    { background: #F59E0B; }\n.widget.w-meetings::before{ background: #22C55E; }\n.widget.w-tasks::before   { background: var(--sm); }\n.widget-label { font: 500 11.5px/1 var(--font-sans); letter-spacing: .04em; text-transform: uppercase; color: var(--genbil-ink-4); margin-bottom: 10px; }\n.widget-val { font: 700 32px/1 var(--font-sans); letter-spacing: -.02em; color: var(--genbil-ink); margin-bottom: 4px; }\n.widget-sub { font: 400 12px/1 var(--font-sans); color: var(--genbil-ink-4); }\n.widget-icon { position: absolute; top: 18px; right: 16px; opacity: .12; }\n\n/* section card */\n.sec-card { background: #fff; border: 1px solid var(--genbil-line); border-radius: 12px; overflow: hidden; }\n.sec-card-head { padding: 14px 20px; border-bottom: 1px solid var(--genbil-paper-3); display: flex; align-items: center; justify-content: space-between; }\n.sec-card-title { font: 600 14px/1 var(--font-sans); color: var(--genbil-ink); display: flex; align-items: center; gap: 8px; }\n.sec-card-title .count { font: 600 11px/1 var(--font-sans); padding: 2px 8px; border-radius: 999px; background: var(--sm-tint); color: var(--sm); }\n\n/* table */\n.sm-table { width: 100%; border-collapse: collapse; }\n.sm-table th { font: 600 11px/1 var(--font-sans); letter-spacing: .06em; text-transform: uppercase; color: var(--genbil-ink-4); padding: 10px 16px; text-align: left; background: var(--genbil-paper-2); border-bottom: 1px solid var(--genbil-line); white-space: nowrap; }\n.sm-table td { padding: 13px 16px; border-bottom: 1px solid var(--genbil-paper-3); font: 400 13px/1.3 var(--font-sans); color: var(--genbil-ink); vertical-align: middle; }\n.sm-table tr:last-child td { border-bottom: none; }\n.sm-table tr:hover td { background: var(--genbil-paper-2); }\n.task-type { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font: 600 11px/1 var(--font-sans); letter-spacing: .02em; }\n.tt-pre  { background: #EFF6FF; color: #1D4ED8; }\n.tt-post { background: #F0FDF4; color: #166534; }\n.tt yle=\"font-family:var(--font-mono);font-size:12px\">\n                <button class=\"tb-btn primary\">Update Token<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── APP MODAL ── -->\n<div id=\"app-modal\" style=\"display:none;position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:24px;\">\n  <div id=\"app-modal-overlay\" style=\"position:absolute;inset:0;background:rgba(15,23,42,.45);\" onclick=\"closeModal()\"><\u002Fdiv>\n  <div style=\"position:relative;background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(15,23,42,.18);\">\n    <div id=\"modal-head\" style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--genbil-line);font:600 15px/1 var(--font-sans);color:var(--genbil-ink);\">\n      <span id=\"modal-title\">Title<\u002Fspan>\n      <button onclick=\"closeModal()\" style=\"width:28px;height:28px;border-radius:6px;border:1px solid var(--genbil-line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M1 1l10 10M11 1L1 11\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"modal-body\" style=\"padding:20px 22px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2);\"><\u002Fdiv>\n    <div id=\"modal-foot\" style=\"padding:14px 22px;border-top:1px solid var(--genbil-line);display:flex;justify-content:flex-end;gap:10px;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── MARKET VIEW ── -->\n<div id=\"market-view\" class=\"list-view\"><\u002Fdiv>\n\n<!-- ── CALENDAR VIEW ── -->\n<div id=\"calendar-view\" style=\"display:none;flex-direction:column;gap:16px;\"><\u002Fdiv>\n\n<!-- ── AGENT ACTIVITY VIEW ── -->\n<div id=\"agent-activity-view\" style=\"display:none;\"><\u002Fdiv>\n\n<!-- ── COACHING PANEL ── -->\n<div class=\"coaching-overlay\" id=\"cp-overlay\" onclick=\"closeCoaching()\"><\u002Fdiv>\n<div class=\"coaching-panel\" id=\"cp-panel\">\n\n  <div class=\"cp-header\">\n    <div class=\"cp-header-top\">\n      <button class=\"cp-close\" onclick=\"closeCoaching()\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M1 1l10 10M11 1L1 11\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"cp-avatar\" id=\"cp-avatar\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 14s1.5 2 4 2 4-2 4-2\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"9\" cy=\"10\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"15\" cy=\"10\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"cp-meeting-title\" id=\"cp-title\">Production Line Coding Review — Eti<\u002Fdiv>\n      <div class=\"cp-timer\" id=\"cp-timer\" style=\"display:none\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg><span id=\"cp-timer-text\">5:00<\u002Fspan><\u002Fdiv>\n      <span class=\"cp-mode-badge mode-pre\" id=\"cp-mode\">PRE-MEETING<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;margin-top:2px;\">\n      <span style=\"font:500 10.5px/1 var(--font-sans);color:rgba(255,255,255,.35)\">AI replies:<\u002Fspan>\n      <div class=\"cp-mode-pill\">\n        <button class=\"cp-mode-btn active\" id=\"cp-ai-voice-btn\" onclick=\"setAiOutputMode('voice')\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 22 22\" fill=\"currentColor\"><rect x=\"8\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 11a6 6 0 0012 0\" stroke=\"currentColor\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Voice\n        <\u002Fbutton>\n        <button class=\"cp-mode-btn\" id=\"cp-ai-text-btn\" onclick=\"setAiOutputMode('text')\">\n          <svg width=\"11\" height=\"11\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M2 4h12M2 8h8M2 12h5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Text\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <select id=\"cp-voice-select\" onchange=\"onVoiceSelectChange(this.value)\" style=\"padding:5px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:#1E293B;color:#CBD5E1;font:400 11.5px/1 var(--font-sans);outline:none\">\n        <option value=\"\">Loading voices…<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div class=\"cp-meta-row\">\n      <div class=\"cp-meta-item\">\n        <svg viewBox=\"0 0 14 14\" fill=\"none\"><rect x=\"1\" y=\"2\" width=\"12\" height=\"11\" rx=\"1.5\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Frect><path d=\"M1 6h12M5 1v2M9 1v2\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <span id=\"cp-date\">26 June 2026 · 14:00<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cp-meta-item\" id=\"cp-customer-item\">\n        <svg viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"5\" r=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.2\"><\u002Fcircle><path d=\"M3 13c0-2.2 1.8-4 4-4s4 1.8 4 4\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n        <span id=\"cp-customer\">Eti<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cp-meta-item\">\n        <svg viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M7 7a3 3 0 100-6 3 3 0 000 6zm-4 6c0-2.2 1.8-4 4-4s4 1.8 4 4\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n        <span id=\"cp-owner\">Ahmet Yilmaz<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cp-snooze-row\" id=\"cp-snooze-row\">\n      <span class=\"cp-snooze-label\">Snooze session:<\u002Fspan>\n      <button class=\"cp-snooze-btn\" onclick=\"snoozeSession(15)\">15 min<\u002Fbutton>\n      <button class=\"cp-snooze-btn\" onclick=\"snoozeSession(30)\">30 min<\u002Fbutton>\n      <button class=\"cp-snooze-btn\" onclick=\"snoozeSession(60)\">1 hour<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"cp-ctx-strip\" id=\"cp-ctx-strip\" style=\"display:none\">\n    <div class=\"ctx-loading\" id=\"ctx-loading-state\">\n      <div class=\"ctx-spinner\"><\u002Fdiv>\n      <span id=\"ctx-loading-text\">Loading context…<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"ctx-loaded\" id=\"ctx-loaded-state\" style=\"display:none\">\n      <div class=\"ctx-chain\" id=\"ctx-chain-display\"><\u002Fdiv>\n      <div id=\"ctx-products-row\" style=\"display:flex;gap:5px;flex-wrap:wrap;margin-left:4px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ctx-error\" id=\"ctx-error-state\" style=\"display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"cp-prompt-preview\" id=\"cp-prompt-preview\">\n    <div class=\"cpp-inner\">\n      <div class=\"cpp-label\">Initial System Prompt — preview<\u002Fdiv>\n      <pre class=\"cpp-code\" id=\"cpp-code\"><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"cp-chat\" id=\"cp-chat\"><\u002Fdiv>\n\n  <div class=\"cp-bottom\">\n    <div class=\"cp-mode-toggle\">\n      <div class=\"cp-mode-pill\">\n        <button class=\"cp-mode-btn active\" id=\"cpbtn-voice\" onclick=\"setCpMode('voice')\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 22 22\" fill=\"currentColor\"><rect x=\"8\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 11a6 6 0 0012 0\" stroke=\"currentColor\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><line x1=\"11\" y1=\"17\" x2=\"11\" y2=\"20\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          Voice\n        <\u002Fbutton>\n        <button class=\"cp-mode-btn\" id=\"cpbtn-text\" onclick=\"setCpMode('text')\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M2 4h12M2 8h8M2 12h5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Text\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cp-voice-area\" id=\"cp-voice-area\">\n      <div class=\"cp-waveform\" id=\"cp-waveform\">\n        <div class=\"cp-waveform-bar\" style=\"height:5px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:10px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:5px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:20px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:8px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:5px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:14px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:5px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:20px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:8px\"><\u002Fdiv>\n        <div class=\"cp-waveform-bar\" style=\"height:5px\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"cp-mic-btn\" id=\"cp-mic-btn\" onclick=\"toggleVoice()\">\n        <svg viewBox=\"0 0 22 22\" width=\"26\" height=\"26\" fill=\"white\"><rect x=\"8\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 11a6 6 0 0012 0\" stroke=\"white\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><line x1=\"11\" y1=\"17\" x2=\"11\" y2=\"20\" stroke=\"white\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n      <\u002Fbutton>\n      <span class=\"cp-mic-label\" id=\"cp-mic-label\">Tap to speak<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cp-text-area\" id=\"cp-text-input-area\" style=\"display:none\">\n      <textarea class=\"cp-text-input\" id=\"cp-input-text\" rows=\"2\" placeholder=\"Type a message…\" onkeydown=\"handleKey(event)\"><\u002Ftextarea>\n      <button class=\"cp-send\" onclick=\"sendMessage()\">\n        <svg viewBox=\"0 0 16 16\" width=\"15\" height=\"15\" fill=\"none\"><path d=\"M14 2L2 8l4 2m8-8l-6 12-2-4m8-8L6 10\" stroke=\"white\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<script>\n// ─────────────────────────────────────────────────────────────────────────────\n// PRODUCT CONTEXT LOADER\n// Zincir: task_id → Meeting → Opportunity → Products\n// Döndürür: { products[], context (markdown), opportunityName }\n// context → initial system prompt'a enjekte edilir\n// ─────────────────────────────────────────────────────────────────────────────\n\n// Mirrors the SaaS Admin → Sales Intelligence → Platform Sales Policies list (methodology docs applied to ALL tenants).\n// Only active policies are injected; inactive ones (e.g. Challenger, currently off) are skipped.\nconst PLATFORM_SALES_POLICIES = [\n  { name:'MEDDIC Sales Methodology', active:true, content:`A qualification framework for complex B2B sales.\n- **M — Metrics:** get a quantifiable business outcome, not a vague \"efficiency improvement.\"\n- **E — Economic Buyer:** confirm the rep has met, or has a credible path to, budget authority.\n- **D — Decision Criteria:** list the customer's formal/informal evaluation criteria explicitly.\n- **D — Decision Process:** get concrete steps, approvers and dates — a vague process is a red flag.\n- **I — Identify Pain:** surface the operational/financial pain in the customer's own words.\n- **C — Champion:** confirm someone inside the account is selling on Teknosin's behalf when the rep isn't in the room.` },\n  { name:'SPIN Selling Principles', active:true, content:`A questioning framework (Situation, Problem, Implication, Need-Payoff) for larger, considered sales.\n- **Situation:** facts about current setup — use sparingly, it adds no perceived value.\n- **Problem:** surface dissatisfaction in the customer's own words.\n- **Implication:** explore the cost/risk of leaving the problem unsolved — this is what makes the pain bigger than the price.\n- **Need-Payoff:** get the customer to state the value of solving it themselves — far more persuasive than the rep stating it.` },\n];\nfunction getPlatformSalesPoliciesText() {\n  const active = PLATFORM_SALES_POLICIES.filter(p => p.active);\n  if (!active.length) return null;\n  return active.map(p => '### ' + p.name + '\\n' + p.content).join('\\n\\n---\\n\\n');\n}\n\n// Simüle edilmiş DB — production'da her biri ayrı bir API/DB çağrısı\nconst MOCK_DB = {\n  tasks: {\n    1: { id:1, meetingId:'mtg-001' },\n    2: { id:2, meetingId:'mtg-002' },\n    3: { id:3, meetingId:'mtg-003' },\n    4: { id:4, meetingId:'mtg-004' },\n    5: { id:5, meetingId:'mtg-005' },\n  },\n  meetings: {\n    'mtg-001': { id:'mtg-001', opportunityId:'opp-001' },\n    'mtg-002': { id:'mtg-002', opportunityId:'opp-002' },\n    'mtg-003': { id:'mtg-003', opportunityId:'opp-003' },\n    'mtg-004': { id:'mtg-004', opportunityId:null },\n    'mtg-005': { id:'mtg-005', opportunityId:'opp-003' },\n  },\n  opportunities: {\n    'opp-001': { id:'opp-001', name:'Production Line Coding Upgrade', productIds:['CIJ-01','TTO-01'] },\n    'opp-002': { id:'opp-002', name:'Carton Line Automation',         productIds:['PA-01','PZ-01'] },\n    'opp-003': { id:'opp-003', name:'Tyre Sidewall Marking Project',  productIds:['MMI-01','FL-01'] },\n  },\n  market_updates: {\n    'cust-acme': [\n      { id:'mu1', title:'Q1 2026 Market Update', type:'financial',\n        valid_from:'2026-01-01', valid_until:'2026-09-30', is_active:true,\n        content:'## Market Update\\nSector-wide investment in packaging-line automation grew steadily in Q1, ahead of the broader industrial average.\\n\\n## Operations Change\\nA new Operations Director was appointed in March 2026 — efficiency-focused profile.\\n\\n## Strategy Note\\nLead with ROI and uptime metrics. Speak in numbers.' },\n      { id:'mu2', title:'Competitive Analysis: Projet Elektronik', type:'competitive',\n        valid_from:'2026-03-15', valid_until:null, is_active:true,\n        content:'## Projet Elektronik Q2 Move\\nAnnounced an aggressive service-contract renewal push, leaning on Markem-Imaje brand strength.\\n\\n## Our Position\\n- Emphasise faster local support and multi-brand flexibility\\n- Share references from similar production lines' },\n    ],\n    'cust-globex': [\n      { id:'mu3', title:'Strategic Direction Update', type:'strategic',\n        valid_from:'2026-05-01', valid_until:null, is_active:true,\n        content:'## 2026 Priorities\\nAccelerating automation investment across production lines. Procurement committee has secured budget authority.' },\n    ],\n  },\n  products: {\n    'CIJ-01': { id:'CIJ-01', code:'CIJ-01', name:'Leibinger JET2neo',\n      description:'## Product Summary\\nStandard small character inkjet coding machine — stainless steel cabinet, 3-year warranty.\\n\\n## Key Features\\n- Reliable continuous inkjet (CIJ) coding for packaging lines\\n- Low maintenance, long service intervals\\n- Wide ink/solvent compatibility\\n\\n## Common Objections\\n**\"We already have a coder\"** → compare total cost of ownership and uptime.\\n**\"Switching cost?\"** → typically installed and running within a day, minimal line downtime.' },\n    'TTO-01': { id:'TTO-01', code:'TTO-01', name:'C.Valentin Flexicode',\n      description:'## Product Summary\\nBasic thermal transfer coding (TTO) machine for flexible packaging film.\\n\\n## Key Features\\n- Crisp, high-contrast codes on film and laminates\\n- Simple ribbon-based operation\\n- Compact footprint, easy line integration' },\n    'PA-01': { id:'PA-01', code:'PA-01', name:'Teknoprint YYS',\n      description:'## Product Summary\\nWipe-on type automatic print & apply labelling system for cartons.\\n\\n## Key Features\\n- High-speed automatic label application\\n- Reduces manual labelling labour\\n- Integrates with existing carton lines' },\n    'PZ-01': { id:'PZ-01', code:'PZ-01', name:'Teknoprint NC-128',\n      description:'## Product Summary\\nHigh-resolution piezo inkjet carton coding machine.\\n\\n## Key Features\\n- Sharp, high-resolution codes and graphics on cartons\\n- Non-contact printing, no plates required' },\n    'MMI-01': { id:'MMI-01', code:'MMI-01', name:'Sic Marking E10 i53',\n      description:'## Product Summary\\nIntegrated dot-peen metal marking machine for permanent traceability codes.\\n\\n## Key Features\\n- Deep, tamper-resistant dot-peen marks\\n- Integrates directly into the production line\\n- Suited to metal and rubber-adjacent components' },\n    'FL-01': { id:'FL-01', code:'FL-01', name:'Teknoprint Fiber Laser',\n      description:'## Product Summary\\nFiber laser marking machine for permanent, high-contrast codes.\\n\\n## Key Features\\n- Permanent marks with no consumables\\n- High-speed marking suited to high-volume lines\\n- Low running cost per mark' },\n  },\n};\n\n// Her adımı simüle edilmiş gecikmeyle çöz\nfunction mockFetch(data, delay) {\n  const ms = delay || (80 + Math.random() * 60);\n  return new Promise((resolve, reject) =>\n    setTimeout(() => data ? resolve(data) : reject(new Error('Not found')), ms)\n  );\n}\n\n// Ürünleri birleştirerek markdown context string'i üret\nfunction buildProductContext(products) {\n  if (!products.length) return null;\n  const header = '## Product Information Related to This Meeting\\n\\nProducts linked to this opportunity are listed below. Use them as context during coaching:\\n\\n';\n  const body   = products.map(p => '### ' + p.name + ' (' + p.code + ')\\n' + p.description).join('\\n\\n---\\n\\n');\n  return header + body;\n}\n\n// Ana fonksiyon: task_id → product context\nasync function loadProductContext(taskId) {\n  // Adım 1: task_id → task kaydı\n  const task        = await mockFetch(MOCK_DB.tasks[taskId]);\n\n  // Adım 2: task.meetingId → meeting kaydı\n  const meeting     = await mockFetch(MOCK_DB.meetings[task.meetingId]);\n\n  // Fırsatsız task (Customer Review gibi)\n  if (!meeting.opportunityId) return { products:[], context:null, opportunityName:null };\n\n  // Adım 3: meeting.opportunityId → opportunity kaydı\n  const opportunity = await mockFetch(MOCK_DB.opportunities[meeting.opportunityId]);\n\n  // Adım 4: opportunity.productIds → ürün detayları (paralel)\n  const products    = await Promise.all(\n    opportunity.productIds.map(id => mockFetch(MOCK_DB.products[id]))\n  );\n\n  return {\n    products,\n    context: buildProductContext(products),\n    opportunityName: opportunity.name,\n  };\n}\n\n// Müşteri pazar bilgilerini çöz\nconst CUSTOMER_MARKET_MAP = {\n  1: 'cust-acme', 2: 'cust-acme', 3: 'cust-acme', // Acme task'ları\n  4: 'cust-acme',\n  5: 'cust-globex',\n};\n\nasync function getCustomerMarketInfo(taskId) {\n  const custKey = CUSTOMER_MARKET_MAP[taskId];\n  if (!custKey) return { updates: [], context: null };\n  const today = new Date().toISOString().slice(0, 10);\n  const allUpdates = await mockFetch(MOCK_DB.market_updates[custKey] || []);\n  // Yalnızca aktif ve valid_until geçmemiş kayıtları filtrele\n  const active = allUpdates.filter(u =>\n    u.is_active && (!u.valid_until || u.valid_until >= today)\n  );\n  if (!active.length) return { updates: [], context: null };\n  const header = '## Müşteri Pazar Bağlamı\\n\\nAşağıdaki pazar bilgileri güncel ve doğrulanmıştır. Konuşma sırasında bağlam olarak kullan:\\n\\n';\n  const body = active.map(u => '### ' + u.title + '\\n' + u.content).join('\\n\\n---\\n\\n');\n  return { updates: active, context: header + body };\n}\n\n// (buildInitialSystemPrompt removed — superseded by assembleSystemPromptParts() below, which assembles all 8 prompt layers in the agreed order and is used by both openCoaching() and openSalesConsultant())\n\nlet _promptPreviewOpen = false;\nfunction togglePromptPreview() {\n  _promptPreviewOpen = !_promptPreviewOpen;\n  document.getElementById('cp-prompt-preview').classList.toggle('open', _promptPreviewOpen);\n  document.getElementById('ctx-prompt-btn').textContent = _promptPreviewOpen ? 'Prompt ↑' : 'Prompt ↓';\n}\n\n// ─────────────────────────────────────────\n// Per-list search/filter/page state\nconst listState = {\n  customers:     { q:'', filter:'enabled', page:1 },\n  leads:         { q:'', filter:'all',     page:1 },\n  opportunities: { q:'', filter:'open',    page:1 },\n  meetings:      { q:'', filter:'open',    page:1 },\n  tasks:         { q:'', filter:'open',    page:1 },\n  competitors:   { q:'', filter:'all',     page:1 },\n};\nconst PAGE_SIZE = 50;\n\n// DATA\n// ─────────────────────────────────────────\nconst roles = {\n  director: {\n    name: 'Ahmet Yılmaz', label: 'Sales Director', avatarBg: '#3B82F6', initials: 'AY',\n    chipBg: '#EFF6FF', chipColor: '#1D4ED8',\n    greeting: 'Good morning, Ahmet 👋',\n    greetingSub: 'Thursday, 26 June 2026 · 3 meetings scheduled today',\n    widgets: { customers: 20, opps: 20, meetings: 7, tasks: 5 },\n    widgetSubs: { customers: '+3 this month', opps: '₺4.2M total value', meetings: '3 today', tasks: '2 pre-meeting today' },\n    showToggle: true,\n    nav: [\n      { label: 'Main', items: [\n        { id: 'dashboard', icon: 'grid', label: 'Dashboard', active: true },\n        { id: 'leads', icon: 'lead', lab
