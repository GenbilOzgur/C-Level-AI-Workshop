);background:#fff;cursor:pointer;font:500 11px/1 var(--font-sans);color:var(--genbil-ink-2)\">Edit<\u002Fbutton>' : '') +\n        (canAdmin && st === 'active' ? '<button onclick=\"disableMktUpdate(\\'' + custId + '\\',\\'' + u.id + '\\')\" style=\"padding:4px 9px;border-radius:5px;border:1px solid var(--genbil-line);background:#fff;cursor:pointer;font:500 11px/1 var(--font-sans);color:#64748B\">Disable<\u002Fbutton>' : '') +\n        (canAdmin && st === 'disabled' ? '<button onclick=\"enableMktUpdate(\\'' + custId + '\\',\\'' + u.id + '\\')\" style=\"padding:4px 9px;border-radius:5px;border:none;background:#22C55E;color:#fff;cursor:pointer;font:500 11px/1 var(--font-sans)\">Enable<\u002Fbutton>' : '') +\n      '<\u002Fdiv><\u002Ftd>' +\n    '<\u002Ftr>';\n  }).join('');\n\n  return approvalBanner +\n    '<table class=\"sm-table\"><thead><tr><th>Title<\u002Fth><th>Type<\u002Fth><th>Valid From<\u002Fth><th>Valid Until<\u002Fth><th>Status<\u002Fth><th>Created By<\u002Fth><th>Actions<\u002Fth><\u002Ftr><\u002Fthead>' +\n    '<tbody>' + rows + '<\u002Ftbody><\u002Ftable>';\n}\n\nfunction saveMktContext(custId) {\n  const p = MARKET_PROFILES[custId]; if (!p) return;\n  p.industry_overview   = document.getElementById('mktc-industry_overview')?.value   || p.industry_overview;\n  p.company_profile     = document.getElementById('mktc-company_profile')?.value     || p.company_profile;\n  p.company_culture     = document.getElementById('mktc-company_culture')?.value     || p.company_culture;\n  p.competitive_position= document.getElementById('mktc-competitive_position')?.value|| p.competitive_position;\n  p.valid_from  = document.getElementById('mktc-vf')?.value  || p.valid_from;\n  p.valid_until = document.getElementById('mktc-vu')?.value  || p.valid_until;\n  p.modified_by = roles[currentRole].name; p.modified_at = '2026-06-30';\n  if (p.status === 'draft') p.status = 'active';\n  showToast('Customer market context saved'); renderMarketIntelligence(custId);\n}\nfunction disableMktContext(custId) {\n  showModal('Disable Customer Market Context',\n    '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Disable this customer market context? It will no longer be injected into agent sessions.<\u002Fp>',\n    mBtn('Disable', 'doDisableMktContext(\\'' + custId + '\\')') + mBtn('Cancel', 'closeModal()', true));\n}\nfunction doDisableMktContext(custId) { if(MARKET_PROFILES[custId]) MARKET_PROFILES[custId].status='disabled'; closeModal(); showToast('Customer market context disabled'); renderMarketIntelligence(custId); }\nfunction enableMktContext(custId) { if(MARKET_PROFILES[custId]) MARKET_PROFILES[custId].status='active'; showToast('Customer market context re-enabled'); renderMarketIntelligence(custId); }\n\nfunction openAddUpdateModal(custId) {\n  const isMember = currentRole === 'member';\n  showModal('Add Customer Market Update',\n    '<div style=\"display:flex;flex-direction:column;gap:12px\">' +\n      mInput('mu-title','Title *','','') +\n      '<div><label style=\"font:500 12px/1 var(--font-sans);color:var(--genbil-ink-3);display:block;margin-bottom:5px\">Update Type *<\u002Flabel><select id=\"mu-type\" style=\"width:100%;padding:8px 10px;border:1px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none\"><option value=\"news\">News<\u002Foption><option value=\"financial\">Financial<\u002Foption><option value=\"competitive\">Competitive<\u002Foption><option value=\"strategic\">Strategic<\u002Foption><\u002Fselect><\u002Fdiv>' +\n      '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">' + mInput('mu-vf','Valid From *','2026-06-30','','date') + mInput('mu-vu','Valid Until (open if blank)','','','date') + '<\u002Fdiv>' +\n      '<div><label style=\"font:500 12px/1 var(--font-sans);color:var(--genbil-ink-3);display:block;margin-bottom:5px\">Content * (Markdown)<\u002Flabel><textarea id=\"mu-content\" rows=\"5\" placeholder=\"## Summary…\" style=\"width:100%;border:1px solid var(--genbil-line);border-radius:7px;padding:9px 10px;font:400 12px/1.6 var(--font-mono);outline:none;resize:vertical\"><\u002Ftextarea><\u002Fdiv>' +\n      (isMember ? '<div style=\"padding:8px 12px;background:#FFFBEB;border-radius:6px;font:400 11.5px/1.5 var(--font-sans);color:#92400E\">⚠️ Your update will be saved as <b>Draft<\u002Fb> and requires approval before activation.<\u002Fdiv>' : '') +\n    '<\u002Fdiv>',\n    mBtn('Save', 'saveNewUpdate(\\'' + custId + '\\')') + mBtn('Cancel', 'closeModal()', true));\n}\nfunction saveNewUpdate(custId) {\n  const title = document.getElementById('mu-title')?.value?.trim();\n  const type  = document.getElementById('mu-type')?.value;\n  const vf    = document.getElementById('mu-vf')?.value;\n  const vu    = document.getElementById('mu-vu')?.value;\n  const cont  = document.getElementById('mu-content')?.value?.trim();\n  if (!title || !vf || !cont) { showToast('Title, Valid From and Content are required', false); return; }\n  if (!MARKET_UPDATES[custId]) MARKET_UPDATES[custId] = [];\n  MARKET_UPDATES[custId].unshift({ id:'MU'+Date.now(), title, type, content:cont,\n    valid_from:vf, valid_until:vu||null,\n    status: currentRole==='member' ? 'draft' : 'active',\n    ai_generated:false, created_by:roles[currentRole].name, created_at:'2026-06-30' });\n  closeModal();\n  showToast(currentRole==='member' ? 'Update saved as Draft — awaiting approval' : 'Update added');\n  renderMarketIntelligence(custId);\n}\nfunction openEditUpdateModal(custId, updateId) {\n  const u = (MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;}); if(!u) return;\n  showModal('Edit Update',\n    '<div style=\"display:flex;flex-direction:column;gap:12px\">' +\n      mInput('eu-title','Title *',u.title,'') +\n      '<div><label style=\"font:500 12px/1 var(--font-sans);color:var(--genbil-ink-3);display:block;margin-bottom:5px\">Update Type *<\u002Flabel><select id=\"eu-type\" style=\"width:100%;padding:8px 10px;border:1px solid var(--genbil-line);border-radius:7px;font:400 13px/1 var(--font-sans);outline:none\">' +\n        ['news','financial','competitive','strategic'].map(function(t){return '<option value=\"'+t+'\"'+(t===u.type?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'<\u002Foption>';}).join('') +\n      '<\u002Fselect><\u002Fdiv>' +\n      '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">' + mInput('eu-vf','Valid From *',u.valid_from||'','','date') + mInput('eu-vu','Valid Until',u.valid_until||'','','date') + '<\u002Fdiv>' +\n      '<div><label style=\"font:500 12px/1 var(--font-sans);color:var(--genbil-ink-3);display:block;margin-bottom:5px\">Content (Markdown)<\u002Flabel><textarea id=\"eu-content\" rows=\"5\" style=\"width:100%;border:1px solid var(--genbil-line);border-radius:7px;padding:9px 10px;font:400 12px/1.6 var(--font-mono);outline:none;resize:vertical\">' + (u.content||'') + '<\u002Ftextarea><\u002Fdiv>' +\n    '<\u002Fdiv>',\n    mBtn('Save',\"saveEditUpdate('\" + custId + \"','\" + updateId + \"')\") + mBtn('Cancel','closeModal()',true));\n}\nfunction saveEditUpdate(custId, updateId) {\n  const u = (MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;}); if(!u) return;\n  u.title   = document.getElementById('eu-title')?.value?.trim()  || u.title;\n  u.type    = document.getElementById('eu-type')?.value           || u.type;\n  u.valid_from  = document.getElementById('eu-vf')?.value         || u.valid_from;\n  u.valid_until = document.getElementById('eu-vu')?.value         || null;\n  u.content = document.getElementById('eu-content')?.value        || u.content;\n  closeModal(); showToast('Update saved'); renderMarketIntelligence(custId);\n}\nfunction disableMktUpdate(custId, updateId) {\n  const u = (MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;}); if(!u) return;\n  showModal('Disable Update', '<p style=\"font:400 13px/1.6 var(--font-sans);color:var(--genbil-ink-2)\">Disable \"<b>' + u.title + '<\u002Fb>\"? It will no longer be injected into sessions.<\u002Fp>',\n    mBtn('Disable',\"doDisableMktUpdate('\" + custId + \"','\" + updateId + \"')\") + mBtn('Cancel','closeModal()',true));\n}\nfunction doDisableMktUpdate(custId,updateId){const u=(MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;});if(u)u.status='disabled';closeModal();showToast('Update disabled');renderMarketIntelligence(custId);}\nfunction enableMktUpdate(custId,updateId){const u=(MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;});if(u)u.status='active';showToast('Update re-enabled');renderMarketIntelligence(custId);}\nfunction approveMktUpdate(custId,updateId){const u=(MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;});if(u)u.status='active';showToast('Update approved and activated');renderMarketIntelligence(custId);}\nfunction rejectMktUpdate(custId,updateId){const u=(MARKET_UPDATES[custId]||[]).find(function(x){return x.id===updateId;});if(u)u.status='rejected';showToast('Update rejected');renderMarketIntelligence(custId);}\n\n// ─────────────────────────────────────────\n// COMPETITOR INTELLIGENCE\n// ─────────────────────────────────────────\nconst COMPETITOR_PROFILES = {\n  'COMP-001': {\n    overview: '## Overview\\nProjet Elektronik — Turkey distributor for Markem-Imaje (Dover Corporation) since 2009, 30+ years of industry experience. Highly established, benefits from strong global brand recognition.\\n\\n## Target Customer Profile\\nMultinational food / beverage / pharma manufacturers; large-scale factories with corporate procurement processes.',\n    strengths_weaknesses: '## Strengths\\n- Global brand credibility and multinational reference base under the Dover Corporation umbrella\\n- Large installed base in Turkey — serving close to 3,000 manufacturing companies and 4,000+ devices\\n- Integrated hardware + software offering via the CoLOS product tracking / management software\\n- Institutional reputation assets such as the European Excellence Award\\n\\n## Weaknesses\\n- Single-brand dependency (Markem-Imaje) — lacks Teknosin\\'s multi-brand flexibility\\n- Corporate structure may limit price flexibility and decision speed in the SME segment\\n- Narrow brand portfolio — cannot match Teknosin\\'s variety for niche applications (e.g. metal-marking diversity)',\n    positioning: '## How We Win — Sales Battlecard\\nAgainst Markem-Imaje\\'s brand prestige, emphasise Teknosin\\'s multi-brand flexibility (choosing the best-fit technology per application) and faster local decision-making. Lead with a \"solution engineering tailored to the need\" narrative rather than a price comparison.\\n\\nThreat level: HIGH.',\n    status: 'active', valid_from: '2026-01-01', valid_until: '2026-12-31',\n    modified_by: 'Ahmet Yılmaz', modified_at: '2026-07-01'\n  },\n  'COMP-002': {\n    overview: '## Overview\\nLevent Makina — multi-brand distributor with 20+ years of industry experience.\\n\\n## Target Customer Profile\\nMeat / dairy producers, cosmetics & personal-care packaging, medical product manufacturers.',\n    strengths_weaknesses: '## Strengths\\n- Sole authorized distributor for 7 different brands — broad product range\\n- Strong after-sales commitments such as a 30-month warranty\\n- In-house software development capability (customisation for system integration)\\n- Active, visible presence at industry trade shows (Avrasya Ambalaj)\\n\\n## Weaknesses\\n- Brand portfolio lacks the well-known German/Swedish engineering brands Teknosin represents (Leibinger, Mectec)\\n- Relatively less depth in heavy-industry applications such as fibre laser and metal marking',\n    positioning: '## How We Win — Sales Battlecard\\nAgainst Levent Makina\\'s emphasis on in-house software development, highlight Teknosin\\'s German/Swedish engineering-brand credibility (Leibinger, Mectec) and expertise in automatic print & apply systems.\\n\\nThreat level: HIGH.',\n    status: 'active', valid_from: '2026-02-01', valid_until: '2026-11-01',\n    modified_by: 'Ahmet Yılmaz', modified_at: '2026-07-01'\n  },\n  'COMP-003': {\n    overview: '## Overview\\nAltar Endüstri Ürünleri — Hitachi CIJ/TIJ-focused distributor with an automation and Industry 4.0 emphasis; long-standing distributorship history built on strong corporate values.\\n\\n## Target Customer Profile\\nMid-to-large manufacturing facilities transitioning to automation and pursuing a digital-transformation agenda.',\n    strengths_weaknesses: '## Strengths\\n- Forward-looking positioning built on an automation / Industry 4.0 narrative (ANSER NexGen)\\n- Digital-transformation story via ERP integration and remote-controllable printers\\n- B2B trust built on corporate ethics / values messaging\\n\\n## Weaknesses\\n- Limited brand variety outside Hitachi — relatively weak in laser marking and thermal transfer\\n- Narrower metal/plastic marking solution range than Teknosin offers',\n    positioning: '## How We Win — Sales Battlecard\\nAgainst Altar\\'s automation / Industry 4.0 narrative, emphasise Teknosin\\'s multi-brand flexibility and ability to select the right technology per application; gently remind the prospect of the risk of single-brand dependency.\\n\\nThreat level: LOW-MEDIUM.',\n    status: 'active', valid_from: '2026-01-01', valid_until: '2026-12-31',\n    modified_by: 'Ahmet Yılmaz', modified_at: '2026-07-01'\n  },\n};\n\nconst COMPETITOR_UPDATES = {\n  'COMP-001': [\n    { id:'CU1', title:'Projet Elektronik — Markem-Imaje Distributorship Renewed', type:'competitive',\n      content:'## Update\\nProjet Elektronik renewed its distributor agreement with Markem-Imaje (Dover Corporation) for Turkey, reinforcing their global-brand positioning.\\n\\n## Response\\nCounter with modern AI-driven capabilities and faster implementation — do not compete on brand legacy alone.',\n      valid_from:'2026-03-15', valid_until:null,\n      status:'active', ai_generated:true, created_by:'AI Agent', created_at:'2026-03-20' },\n  ],\n  'COMP-002': [],\n  'COMP-003': [],\n};\n\n// ─────────────────────────────────────────\n// PROMPT ASSEMBLY — Account System Prompt / Supporting Instructions / Competitor Intelligence\n// (used by openCoaching() and openSalesConsultant() to build the full, ordered system prompt)\n// ─────────────────────────────────────────\nfunction getAccountSystemPromptText(eventType) {\n  const matches = ACCOUNT_PROMPTS.filter(p => p.type === 'System Prompt' && p.eventType === eventType && p.status !== 'disabled');\n  if (!matches.length) return null;\n  return matches.map(p => '### ' + p.name + '\\n' + p.content).join('\\n\\n---\\n\\n');\n}\nfunction getAccountSupportingInstructionsText() {\n  const matches = ACCOUNT_PROMPTS.filter(p => p.type === 'Supporting Instruction' && p.status !== 'disabled');\n  if (!matches.length) return null;\n  return matches.map(p => '### ' + p.name + '\\n' + p.content).join('\\n\\n---\\n\\n');\n}\n// Single competitor's Context + active Updates, formatted for injection\nfunction buildCompetitorContext(compId) {\n  const profile = COMPETITOR_PROFILES[compId];\n  if (!profile || profile.status === 'disabled') return null;\n  const name = (COMPETITORS_DATA.find(c => c.id === compId) || {}).name || compId;\n  const today = new Date().toISOString().slice(0, 10);\n  const updates = (COMPETITOR_UPDATES[compId] || []).filter(u => u.status === 'active' && (!u.valid_until || u.valid_until >= today));\n  let text = '### ' + name + '\\n' + profile.overview + '\\n\\n' + profile.strengths_weaknesses + '\\n\\n' + profile.positioning;\n  if (updates.length) {\n    text += '\\n\\n#### Recent Updates\\n' + updates.map(u => '**' + u.title + '**\\n' + u.content).join('\\n\\n');\n  }\n  return text;\n}\n// Meeting mode: only the opportunity's Main Competitor (if set). General mode: all competitors, since\n// there is no specific deal to scope to — see TAD §4.1.4.1 Competitor Intelligence Injection callout.\nfunction buildCompetitorBlock(mainCompetitorId, isGeneral) {\n  if (isGeneral) {\n    const blocks = COMPETITORS_DATA.map(c => buildCompetitorContext(c.id)).filter(Boolean);\n    return blocks.length ? blocks.join('\\n\\n---\\n\\n') : null;\n  }\n  if (!mainCompetitorId) return null;\n  return buildCompetitorContext(mainCompetitorId);\n}\n// Resolve the opportunity's mainCompetitorId for a Mentor Task, via its customer's opportunity record\nfunction getMainCompetitorIdForTask(task) {\n  const opp = OPPORTUNITIES.find(o => o.customer === task.customer);\n  return opp ? opp.mainCompetitorId : null;\n}\nlet _currentSystemPromptParts = [];\n// Assembles all prompt layers in the agreed order (see TAD §4.1.4.1):\n// 1 Platform Identity → 2 Platform Sales Policies → 3 Account System Prompt (eventType-matched)\n// → 4 Account Supporting Instructions → 5+6 Customer Market Context/Updates → 7 Competitor Intelligence → 8 Product Context\nfunction assembleSystemPromptParts({ isGeneral, eventType, mainCompetitorId, productContext, products, marketContext, marketUpdates }) {\n  const parts = [];\n  const identityLabel = isGeneral ? '# [1 — PLATFORM IDENTITY — General Consultation Prompt]' : '# [1 — PLATFORM IDENTITY — Meeting-Based Session Prompt]';\n  const identityText  = (isGeneral ? GENERAL_CONSULTATION_SYSTEM_PROMPT : GEMINI_SYSTEM_PROMPT) + languageDirective(getCurrentUserLanguage());\n  parts.push({ label: identityLabel, text: identityText });\n\n  const policies = getPlatformSalesPoliciesText();\n  if (policies) parts.push({ label: '# [2 — PLATFORM SALES POLICIES]', text: policies });\n\n  const asp = getAccountSystemPromptText(eventType);\n  if (asp) parts.push({ label: '# [3 — ACCOUNT SYSTEM PROMPT — ' + eventType + ']', text: asp });\n\n  const asi = getAccountSupportingInstructionsText();\n  if (asi) parts.push({ label: '# [4 — ACCOUNT SUPPORTING INSTRUCTIONS]', text: asi });\n\n  if (!isGeneral) {\n    if (marketContext) parts.push({ label: '# [5\\u20136 — CUSTOMER MARKET CONTEXT & UPDATES — ' + marketUpdates.length + ' update(s)]', text: marketContext });\n    const compBlock = buildCompetitorBlock(mainCompetitorId, false);\n    if (compBlock) parts.push({ label: '# [7 — COMPETITOR INTELLIGENCE — Main Competitor for This Deal]', text: compBlock });\n    if (productContext) parts.push({ label: '# [8 — PRODUCT CONTEXT — ' + products.map(p=>p.code).join(', ') + ']', text: productContext });\n  } else {\n    const compBlock = buildCompetitorBlock(null, true);\n    if (compBlock) parts.push({ label: '# [7 — COMPETITOR INTELLIGENCE — All Competitors, No Deal Scope]', text: compBlock });\n  }\n  _currentSystemPromptParts = parts;\n  return parts;\n}\nfunction renderPromptPreview(parts) {\n  document.getElementById('cpp-code').innerHTML = parts.map(p =>\n    '<span class=\"cpp-hl\">' + p.label + '<\u002Fspan>\\n' + escHtml(p.text)\n  ).join('\\n\\n<span style=\"color:#334155\">---<\u002Fspan>\\n\\n');\n}\n\nfunction filterCmpCompetitors(q) {\n  _cmpSearchQ = q;\n  const hint = document.getElementById('cmp-sh');\n  const sel  = document.getElementById('cmp-sel');\n  if (!hint || !sel) return;\n  if (q.length > 0 && q.length < 3) { hint.textContent = 'Type at least 3 characters…'; hint.style.display = 'block'; return; }\n  hint.style.display = 'none';\n  const filtered = q.length >= 3 ? COMPETITORS_DATA.filter(c => c.name.toLowerCase().includes(q.toLowerCase())) : COMPETITORS_DATA;\n  const prev = sel.value;\n  sel.innerHTML = filtered.length\n    ? filtered.map(c => '<option value=\"' + c.id + '\"' + (c.id===prev?' selected':'') + '>' + c.name + '<\u002Foption>').join('')\n    : '<option value=\"\">No competitors found<\u002Foption>';\n  if (filtered.length) renderCompetitorIntelligence(sel.value || filtered[0].id);\n}\n\nfunction renderCompetitorIntelligence(compId) {\n  compId = compId || document.getElementById('cmp-sel')?.value || COMPETITORS_DATA[0]?.id;\n  if (!compId) {\n    document.getElementById('market-view').innerHTML = '<div style=\"max-width:920px\">' + siTopTabsHTML() + '<div style=\ i?'true':'false')+')\"'\n    + ' ondragover=\"event.preventDefault();this.style.borderColor=\\'var(--sm)\\';this.style.background=\\'var(--sm-tint)\\'\"'\n    + ' ondragleave=\"this.style.borderColor=\\'var(--genbil-line-2)\\';this.style.background=\\'var(--genbil-paper-2)\\'\"'\n    + ' ondrop=\"event.preventDefault();this.style.borderColor=\\'var(--genbil-line-2)\\';this.style.background=\\'var(--genbil-paper-2)\\';wizAddFiles(\\''+key+'\\',event.dataTransfer.files)\"'\n    + ' style=\"border:1.5px dashed var(--genbil-line-2);background:var(--genbil-paper-2);border-radius:10px;padding:'+pad+';text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:'+dir+';align-items:center;justify-content:center;gap:'+(compact?12:8)+'px;\">'\n    + '<div style=\"width:'+isz+'px;height:'+isz+'px;border-radius:50%;background:var(--sm-tint);color:var(--sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">'+sIcon('upload',compact?15:18)+'<\u002Fdiv>'\n    + '<div style=\"text-align:'+(compact?'left':'center')+';\"><div style=\"font:500 13px/1.3 var(--font-sans);color:var(--genbil-ink-2);\">Drag &amp; drop or <span style=\"color:var(--sm);font-weight:600;\">browse files<\u002Fspan><\u002Fdiv>'\n    + '<div style=\"font:400 11px/1.3 var(--font-sans);color:var(--genbil-ink-4);margin-top:2px;\">'+formats.join(' · ')+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n}\nfunction wizFileCard(f, kind, removeCall) {\n  const done = f.parsed;\n  const sub = done\n    ? (sIcon('check',11) + ' ' + (kind==='markdown' ? 'converted to Markdown' : kind==='users' ? f.count+' users detected' : f.count+' records detected') + ' · ' + f.ext)\n    : ('<span style=\"display:inline-flex;animation:sw-spin 1s linear infinite;\">'+sIcon('loader',11)+'<\u002Fspan> Parsing…');\n  return '<div style=\"display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px;border:1px solid '+(done?'#BBF7D0':'var(--genbil-line)')+';background:'+(done?'#F0FDF4':'#fff')+';\">'\n    + '<div style=\"color:'+(done?'#166534':'var(--genbil-ink-4)')+';flex-shrink:0;\">'+sIcon('file',18)+'<\u002Fdiv>'\n    + '<div style=\"flex:1;min-width:0;\"><div style=\"font:600 12.5px/1.2 var(--font-sans);color:var(--genbil-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">'+f.name+'<\u002Fdiv>'\n    + '<div style=\"font:400 11px/1.3 var(--font-sans);color:'+(done?'#166534':'var(--genbil-ink-4)')+';margin-top:2px;display:flex;align-items:center;gap:5px;\">'+sub+'<\u002Fdiv><\u002Fdiv>'\n    + '<button onclick=\"'+removeCall+'\" title=\"Remove\" style=\"border:none;background:none;cursor:pointer;color:var(--genbil-ink-4);padding:4px;display:flex;\">'+sIcon('x',14)+'<\u002Fbutton><\u002Fdiv>';\n}\nfunction wizChips(cols) {\n  return '<div style=\"display:flex;flex-wrap:wrap;gap:6px;\">'+cols.map(function(c){\n    return '<span style=\"font:500 11px/1 var(--font-mono);color:var(--genbil-ink-2);background:var(--genbil-paper-3);border:1px solid var(--genbil-line);padding:5px 9px;border-radius:5px;\">'+c+'<\u002Fspan>';\n  }).join('')+'<\u002Fdiv>';\n}\nfunction wizIntro(icon, title, desc) {\n  return '<div style=\"display:flex;align-items:flex-start;gap:13px;margin-bottom:20px;\">'\n    + '<div style=\"width:40px;height:40px;border-radius:10px;background:var(--sm-tint);color:var(--sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">'+sIcon(icon,19)+'<\u002Fdiv>'\n    + '<div><h3 style=\"font:600 16px/1.2 var(--font-sans);color:var(--genbil-ink);margin:2px 0 4px;\">'+title+'<\u002Fh3>'\n    + '<p style=\"font:400 12.5px/1.5 var(--font-sans);color:var(--genbil-ink-3);margin:0;max-width:520px;\">'+desc+'<\u002Fp><\u002Fdiv><\u002Fdiv>';\n}\nfunction wizSubLabel(text, hint) {\n  return '<div style=\"margin-bottom:8px;\"><div style=\"font:600 11px/1 var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:var(--genbil-ink-3);\">'+text+'<\u002Fdiv>'\n    + (hint?'<div style=\"font:400 11px/1.4 var(--font-sans);color:var(--genbil-ink-4);margin-top:3px;\">'+hint+'<\u002Fdiv>':'')+'<\u002Fdiv>';\n}\nfunction wizBanner(text) {\n  return '<div style=\"display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:8px;background:var(--sm-tint);border:1px solid var(--sm-tint2);\">'\n    + '<div style=\"color:var(--sm-deep);flex-shrink:0;margin-top:1px;\">'+sIcon('spark',14)+'<\u002Fdiv>'\n    + '<div style=\"font:400 12px/1.5 var(--font-sans);color:var(--sm-deep);\">'+text+'<\u002Fdiv><\u002Fdiv>';\n}\nfunction wizInput(val, ph, oninput, mono) {\n  return '<input value=\"'+(val||'').replace(/\"/g,'&quot;')+'\" placeholder=\"'+ph+'\" oninput=\"'+oninput+'\" style=\"width:100%;border:1px solid var(--genbil-line-2);border-radius:6px;padding:8px 10px;font:400 13px/1 '+(mono?'var(--font-mono)':'var(--font-sans)')+';outline:none;background:#fff;'+(mono?'font-size:12px;':'')+'\">';\n}\n\nfunction wizStepProducts() {\n  const d = SW.products;\n  return '<div>' + wizIntro('package','Product Catalog','Upload your product list. When you proceed, we\\'ll parse the document and populate the Product Catalog automatically.')\n    + wizSubLabel('Expected columns','Each row must include the following columns.')\n    + wizChips(['Code','Product Name','Product Group','Grade / Technology','Description'])\n    + '<div style=\"height:18px;\"><\u002Fdiv>'\n    + (d.file ? wizFileCard(d.file,'records','wizRemoveProducts()') : wizDropzone('products','.csv,.xlsx,.xls,.pdf',['CSV','Excel','PDF'],false,false))\n    + '<\u002Fdiv>';\n}\nfunction wizStepUsers() {\n  const d = SW.users;\n  return '<div>' + wizIntro('users','Invite Users','Upload your user list. Each row becomes a user account and receives an invitation email when you proceed.')\n    + wizSubLabel('Expected columns','Each row must include the following columns.')\n    + wizChips(['User Name','Email','Role','Language','Sales Role Type'])\n    + '<div style=\"height:18px;\"><\u002Fdiv>'\n    + (d.file ? wizFileCard(d.file,'users','wizRemoveUsers()') : wizDropzone('users','.csv,.xlsx,.xls,.md',['Excel','CSV','Markdown'],false,false))\n    + (d.file ? '<div style=\"margin-top:12px;\">'+wizBanner('Invitation emails will be sent to every detected address the moment you complete setup.')+'<\u002Fdiv>' : '')\n    + '<\u002Fdiv>';\n}\nfunction wizCustomerBlock(c, i) {\n  const canRemove = SW.intel.customers.length > 1;\n  let docs = '';\n  INTEL_SECTIONS.forEach(function(s){\n    docs += '<div><div style=\"font:500 11px/1 var(--font-sans);color:var(--genbil-ink-2);margin-bottom:5px;\">'+s.label+'<\u002Fdiv>'\n      + (c.docs[s.key] ? wizFileCard(c.docs[s.key],'markdown','wizRemoveIntelDoc('+i+',\\''+s.key+'\\')') : wizDropzone('intel:'+i+':'+s.key,'.pdf,.doc,.docx,.md',['PDF','Word','Markdown'],false,true))\n      + '<\u002Fdiv>';\n  });\n  return '<div style=\"border:1px solid var(--genbil-line);border-radius:10px;padding:16px 18px;background:#fff;\">'\n    + '<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">'\n    + '<div style=\"font:600 12px/1 var(--font-sans);color:var(--genbil-ink-3);letter-spacing:.04em;text-transform:uppercase;\">Customer '+(i+1)+'<\u002Fdiv>'\n    + (canRemove ? '<button onclick=\"wizRemoveCustomer('+i+')\" style=\"border:none;background:none;cursor:pointer;color:var(--genbil-ink-4);display:flex;align-items:center;gap:4px;font:500 11px/1 var(--font-sans);\">'+sIcon('trash',13)+' Remove<\u002Fbutton>' : '')\n    + '<\u002Fdiv>'\n    + '<div style=\"display:grid;grid-template-columns:1.4fr 1fr 1.2fr;gap:10px;margin-bottom:14px;\">'\n    + '<div><div style=\"font:500 11px/1 var(--font-sans);color:var(--genbil-ink-2);margin-bottom:5px;\">Customer name<\u002Fdiv>'+wizInput(c.name,'Acme Manufacturing','wizSetCustomer('+i+',\\'name\\',this.value)',false)+'<\u002Fdiv>'\n    + '<div><div style=\"font:500 11px/1 var(--font-sans);color:var(--genbil-ink-2);margin-bottom:5px;\">Customer number<\u002Fdiv>'+wizInput(c.number,'CUST-00184','wizSetCustomer('+i+',\\'number\\',this.value)',true)+'<\u002Fdiv>'\n    + '<div><div style=\"font:500 11px/1 var(--font-sans);color:var(--genbil-ink-2);margin-bottom:5px;\">Industry<\u002Fdiv>'+wizInput(c.industry,'Automotive','wizSetCustomer('+i+',\\'industry\\',this.value)',false)+'<\u002Fdiv>'\n    + '<\u002Fdiv>'\n    + '<div style=\"display:flex;flex-direction:column;gap:8px;\">'+docs+'<\u002Fdiv><\u002Fdiv>';\n}\nfunction wizStepIntel() {\n  let blocks = SW.intel.customers.map(function(c,i){ return wizCustomerBlock(c,i); }).join('');\n  return '<div>' + wizIntro('building','Sales Intelligence','Add each customer and upload the documents describing their market, profile, and culture. We\\'ll build a knowledge base per customer.')\n    + '<div style=\"margin-bottom:14px;\">'+wizBanner('Every uploaded document is converted to Markdown and attached to that customer\\'s intelligence profile.')+'<\u002Fdiv>'\n    + '<div style=\"display:flex;flex-direction:column;gap:14px;\">'+blocks+'<\u002Fdiv>'\n    + '<button onclick=\"wizAddCustomer()\" style=\"margin-top:14px;display:flex;align-items:center;gap:7px;width:100%;justify-content:center;padding:11px;border-radius:8px;border:1.5px dashed var(--genbil-line-2);background:transparent;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:var(--sm);\">'+sIcon('plus',14)+' Add another customer<\u002Fbutton>'\n    + '<\u002Fdiv>';\n}\nfunction wizPromptGroup(title, hint, kind, files) {\n  let list = '';\n  if (files.length) {\n    list = '<div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:10px;\">'\n      + files.map(function(f,i){ return wizFileCard(f,'markdown','wizRemovePrompt(\\''+kind+'\\','+i+')'); }).join('') + '<\u002Fdiv>';\n  }\n  return '<div style=\"border:1px solid var(--genbil-line);border-radius:10px;padding:16px 18px;background:#fff;\">'\n    + '<div style=\"margin-bottom:10px;\"><div style=\"font:600 13px/1.2 var(--font-sans);color:var(--genbil-ink);\">'+title+'<\u002Fdiv>'\n    + '<div style=\"font:400 11.5px/1.4 var(--font-sans);color:var(--genbil-ink-4);margin-top:2px;\">'+hint+'<\u002Fdiv><\u002Fdiv>'\n    + list + wizDropzone('prompt:'+kind,'.pdf,.doc,.docx,.md',['PDF','Word','Markdown'],true,true) + '<\u002Fdiv>';\n}\nfunction wizStepPrompts() {\n  return '<div>' + wizIntro('terminal','Account Prompts','Upload the instruction and system-prompt documents for this account. You can add as many as you need.')\n    + '<div style=\"margin-bottom:14px;\">'+wizBanner('All documents are converted to Markdown and stored as the account\\'s prompt context. You\\'ll be notified once conversion completes.')+'<\u002Fdiv>'\n    + '<div style=\"display:flex;flex-direction:column;gap:14px;\">'\n    + wizPromptGroup('Supporting Instructions','Guidance, playbooks, and reference material appended to the account context.','supporting',SW.prompts.supporting)\n    + wizPromptGroup('System Prompt','Core behavioral instructions that define how the account\\'s mentor operates.','system',SW.prompts.system)\n    + '<\u002Fdiv><\u002Fdiv>';\n}\n\nfunction wizSummary() {\n  const custDocs = SW.intel.customers.reduce(function(n,c){ return n + INTEL_SECTIONS.filter(function(s){return c.docs[s.key];}).length; }, 0);\n  return {\n    products: SW.products.file ? (SW.products.file.count || wizRand(18,46)) : 0,\n    users: SW.users.file ? (SW.users.file.count || wizRand(6,24)) : 0,\n    customers: SW.intel.customers.filter(function(c){ return c.name.trim(); }).length,\n    custDocs: custDocs,\n    prompts: SW.prompts.supporting.length + SW.prompts.system.length,\n  };\n}\n\nfunction wizStepSaving() {\n  let rows = SW.log.map(function(op){\n    return '<div style=\"display:flex;align-items:center;gap:10px;font:400 12.5px/1.3 var(--font-sans);color:var(--genbil-ink-2);\"><span style=\"color:#166534;display:flex;\">'+sIcon('check',14)+'<\u002Fspan> '+op+'<\u002Fdiv>';\n  }).join('');\n  return '<div style=\"padding-top:8px;\">' + wizIntro('loader','Saving your configuration','We\\'re writing everything to the system. This won\\'t take long.')\n    + '<div style=\"display:flex;flex-direction:column;gap:9px;margin-top:6px;\">'+rows\n    + '<div style=\"display:flex;align-items:center;gap:10px;font:400 12.5px/1.3 var(--font-sans);color:var(--genbil-ink-4);\"><span style=\"display:inline-flex;animation:sw-spin 1s linear infinite;\">'+sIcon('loader',14)+'<\u002Fspan> Working…<\u002Fdiv>'\n    + '<\u002Fdiv><\u002Fdiv>';\n}\nfunction wizStepDone() {\n  const s = wizSummary();\n  const cards = [\n    { n:s.products, l:'Products in catalog', ic:'package' },\n    { n:s.users, l:'Users invited', ic:'mail' },\n    { n:s.customers, l:'Customer profiles', ic:'building' },\n    { n:s.custDocs + s.prompts, l:'Documents converted', ic:'file' },\n  ].map(function(x){\n    return '<div style=\"border:1px solid var(--genbil-line);border-radius:10px;padding:14px 16px;text-align:left;display:flex;align-items:center;gap:12px;\">'\n      + '<div style=\"color:var(--sm);\">'+sIcon(x.ic,18)+'<\u002Fdiv>'\n      + '<div><div style=\"font:700 18px/1 var(--font-sans);color:var(--genbil-ink);\">'+x.n+'<\u002Fdiv>'\n      + '<div style=\"font:400 11px/1.2 var(--font-sans);color:var(--genbil-ink-3);margin-top:3px;\">'+x.l+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }).join('');\n  return '<div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 20px;\">'\n    + '<div style=\"width:64px;height:64px;border-radius:50%;background:#DCFCE7;color:#166534;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\">'+sIcon('check',30)+'<\u002Fdiv>'\n    + '<h3 style=\"font:700 20px/1.2 var(--font-sans);color:var(--genbil-ink);margin:0 0 8px;\">Setup complete<\u002Fh3>'\n    + '<p style=\"font:400 13px/1.5 var(--font-sans);color:var(--genbil-ink-3);margin:0 0 22px;max-width:420px;\">Your account has been initialized. Everything below is now live in the system.<\u002Fp>'\n    + '<div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:420px;\">'+cards+'<\u002Fdiv><\u002Fdiv>';\n}\n\nfunction wizRenderRail() {\n  const rail = document.getElementById('sw-rail');\n  let steps = WIZ_STEPS.map(function(s,i){\n    const done = i < SW.step || SW.saving || SW.done;\n    const active = i === SW.step && !SW.saving && !SW.done;\n    const circleBg = done ? '#166534' : active ? 'var(--sm)' : '#1E293B';\n    const circle = done ? sIcon('check',13,'#fff') : (i+1);\n    return '<div style=\"display:flex;align-items:center;gap:12px;padding:10px;border-radius:9px;background:'+(active?'rgba(124,58,237,.18)':'transparent')+';transition:background .15s;\">'\n      + '<div style=\"width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+circleBg+';color:#fff;font:600 11px/1 var(--font-sans);'+(active?'':'border:1px solid #334155;')+'\">'+circle+'<\u002Fdiv>'\n      + '<div style=\"font:'+(active?'600':'400')+' 12.5px/1.2 var(--font-sans);color:'+(active?'#F1F5F9':done?'#CBD5E1':'#94A3B8')+';\">'+s.label+'<\u002Fdiv><\u002Fdiv>';\n  }).join('');\n  rail.innerHTML =\n    '<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:28px;\">'\n      + '<div style=\"width:32px;height:32px;border-radius:9px;background:var(--sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">'+sIcon('rocket',16,'#fff')+'<\u002Fdiv>'\n      + '<div><div style=\"font:700 13px/1.1 var(--font-sans);color:#F1F5F9;\">Setup Wizard<\u002Fdiv><div style=\"font:400 10.5px/1.1 var(--font-sans);color:#64748B;margin-top:2px;\">Initialize your account<\u002Fdiv><\u002Fdiv>'\n    + '<\u002Fdiv>'\n    + '<div style=\"display:flex;flex-direction:column;gap:4px;flex:1;\">'+steps+'<\u002Fdiv>'\n    + '<div style=\"font:400 10.5px/1.5 var(--font-sans);color:#475569;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07);\">All uploads are converted and saved to the system when you finish.<\u002Fdiv>';\n}\nfunction wizRenderBody() {\n  const body = document.getElementById('sw-body');\n  if (!body) return;\n  if (SW.saving) { body.innerHTML = wizStepSaving(); return; }\n  if (SW.done) { body.innerHTML = wizStepDone(); return; }\n  body.innerHTML = [wizStepProducts, wizStepUsers, wizStepIntel, wizStepPrompts][SW.step]();\n}\nfunction wizRenderFooter() {\n  const foot = document.getElementById('sw-footer');\n  if (SW.saving) {\n    foot.innerHTML = '<div style=\"font:400 12px/1 var(--font-sans);color:var(--genbil-ink-4);margin:0 auto;\">Please wait…<\u002Fdiv>';\n    return;\n  }\n  if (SW.done) {\n    foot.innerHTML = '<button onclick=\"wizFinish()\" style=\"margin-left:auto;display:flex;align-items:center;gap:7px;padding:9px 22px;border-radius:8px;border:none;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:#fff;background:var(--sm);\">Go to dashboard '+sIcon('arrowR',14)+'<\u002Fbutton>';\n    return;\n  }\n  const backLabel = SW.step===0 ? 'Cancel' : sIcon('arrowL',13)+' Back';\n  const backAction = SW.step===0 ? 'closeSetupWizard()' : 'wizPrev()';\n  const next = SW.step===3\n    ? '<button onclick=\"wizRunSave()\" style=\"display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:#fff;background:var(--sm);\">Finish &amp; save '+sIcon('check',14)+'<\u002Fbutton>'\n    : '<button onclick=\"wizNext()\" style=\"display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:#fff;background:var(--sm);\">Proceed '+sIcon('arrowR',14)+'<\u002Fbutton>';\n  foot.innerHTML = '<button onclick=\"'+backAction+'\" style=\"display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid var(--genbil-line-2);background:#fff;cursor:pointer;font:600 12.5px/1 var(--font-sans);color:var(--genbil-ink-2);\">'+backLabel+'<\u002Fbutton>' + next;\n}\nfunction wizRenderCounter() {\n  const c = document.getElementById('sw-counter');\n  if (c) c.textContent = SW.saving ? 'Saving…' : SW.done ? 'Complete' : ('Step '+(SW.step+1)+' of 4');\n}\nfunction wizRender() { wizRenderRail(); wizRenderBody(); wizRenderFooter(); wizRenderCounter(); }\nfunction wizNext(){ if (SW.step<3){ SW.step++; wizRender(); } }\nfunction wizPrev(){ if (SW.step>0){ SW.step--; wizRender(); } }\n\nfunction wizRunSave() {\n  const s = wizSummary();\n  SW.saving = true; SW.log = [];\n  wizRender();\n  const ops = [\n    'Populating Product Catalog — '+s.products+' products',\n    'Creating '+s.users+' user accounts',\n    'Sending '+s.users+' invitation emails',\n    'Building intelligence profiles — '+s.customers+' customers',\n    'Converting '+(s.custDocs + s.prompts)+' documents to Markdown',\n    'Attaching Account Prompts',\n  ];\n  let i = 0;\n  function tick(){\n    if (!SW || !SW.saving) return;\n    if (i >= ops.length) { setTimeout(function(){ if(SW){ SW.saving=false; SW.done=true; wizRender(); } }, 400); return; }\n    SW.log.push(ops[i]); i++;\n    wizRenderBody();\n    setTimeout(tick, 520);\n  }\n  setTimeout(tick, 400);\n}\nfunction wizFinish() {\n  const s = wizSummary();\n  closeSetupWizard();\n  const chip = document.getElementById('wiz-status-chip');\n  if (chip) { chip.textContent = 'Configured'; chip.style.background = '#DCFCE7'; chip.style.color = '#166534'; }\n  const cta = document.getElementById('wiz-cta-label');\n  if (cta) cta.textContent = 'Run again';\n  showToast('Setup complete — '+s.products+' products, '+s.users+' users, '+s.customers+' customers configured');\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
