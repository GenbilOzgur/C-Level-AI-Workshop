<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEARNAUT — Space Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #page {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #gameContainer {
    position: relative;
    width: min(800px, 98vw);
  }

  /* Browser chrome bar */
  #browserBar {
    background: #1a1a2e;
    border: 2px solid #16213e;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bDot { width: 12px; height: 12px; border-radius: 50%; }
  .bDot.r { background: #ff5f57; }
  .bDot.y { background: #ffbd2e; }
  .bDot.g { background: #28ca41; }
  #urlBar {
    flex: 1;
    background: #0f0f23;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 4px 12px;
    color: #8888aa;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    letter-spacing: 1px;
  }
  #urlBar span { color: #00ff88; }

  /* Game window */
  #gameWindow {
    background: #000;
    border: 2px solid #16213e;
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }

  /* HUD */
  #hud {
    background: #060618;
    border-bottom: 1px solid #0a0a30;
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 8px;
    color: #00ffcc;
    letter-spacing: 1px;
  }
  #hud span { color: #ff6b6b; }
  #hudPlanet { color: #a78bfa; }
  #hudScore { color: #fbbf24; }

  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
  }

  /* Message bar */
  #msgBar {
    background: #060618;
    border-top: 1px solid #0a0a30;
    padding: 5px 16px;
    font-size: 7px;
    color: #fbbf24;
    letter-spacing: 1px;
    min-height: 22px;
    text-align: center;
  }

  /* Start / Game Over overlay */
  #overlay {
    position: absolute;
    top: 36px;
    left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
  }
  #overlay h1 {
    font-size: clamp(18px, 4vw, 30px);
    color: #00ff88;
    text-shadow: 0 0 20px #00ff8844;
    letter-spacing: 4px;
    animation: pulse 2s ease-in-out infinite;
  }
  #overlay .sub { font-size: 8px; color: #8888aa; letter-spacing: 2px; }
  #overlay .info { font-size: 8px; color: #fbbf24; letter-spacing: 1px; line-height: 2; text-align: center; }
  #overlay .warn { color: #f87171; }
  #overlay .good { color: #4ade80; }
  #overlay .ctrl { color: #a78bfa; }
  #startBtn {
    margin-top: 8px;
    background: transparent;
    border: 2px solid #00ff88;
    color: #00ff88;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 28px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.15s, color 0.15s;
  }
  #startBtn:hover { background: #00ff88; color: #000; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Stars */
  #starfield {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }
</style>
</head>
<body>
<div id="page">
  <div id="gameContainer">

    <div id="browserBar">
      <div class="bDot r"></div>
      <div class="bDot y"></div>
      <div class="bDot g"></div>
      <div id="urlBar">https://<span>bearnaut.space</span>/mission/planet-1</div>
    </div>

    <div id="gameWindow">
      <div id="hud">
        <span id="hudLives">♥ x10</span>
        <div id="hudPlanet">ZEPHYRA</div>
        <div id="hudScore">KURTULUS: 0</div>
      </div>

      <canvas id="c"></canvas>

      <div id="msgBar" id="msg">HAZIR — MACERAYA BASLAMAK ICIN TIKLA</div>
    </div>

    <div id="overlay">
      <div id="starfield"></div>
      <h1>BEARNAUT</h1>
      <div class="sub">UZAY MACERASI</div>
      <div class="info">
        <span class="ctrl">↑ SPACE</span> &nbsp;ZIPLA &nbsp;&nbsp; <span class="ctrl">↓</span> &nbsp;EGIL<br><br>
        <span class="warn">ATES TOPU</span> = 2 can &nbsp;&nbsp; <span class="warn">KURSUN</span> = 1 can<br><br>
        <span class="good">Her 10 kurtulusta +1 can</span><br>
        <span class="good">10'un katinda yeni gezegen!</span>
      </div>
      <button id="startBtn">GOREVE BASLA</button>
    </div>
  </div>
</div>

<script src="bearnaut.js"></script>
</body>
</html>
