  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

headings */\n    --ink-strong: #1B2236;       /* body strong */\n    --ink-dim:    #4A5170;       /* secondary */\n    --ink-soft:   #7A819A;       /* tertiary labels */\n\n    /* Brain side — vivid indigo/violet against pastel lavender chrome */\n    --brain-pastel:    #E5E1F5;  /* pastel lavender bg */\n    --brain-chrome:    #6E63B6;  /* muted purple for tags/lines */\n    --brain-vivid:     #4F46E5;  /* vivid indigo neurons */\n    --brain-vivid-2:   #7C3AED;  /* violet halo */\n    --brain-bright:    #818CF8;  /* bright light core */\n\n    /* LLM side — pastel rose chrome, vivid red dots */\n    --llm-pastel:      #F7E1E4;  /* pastel rose bg */\n    --llm-chrome:      #B0556A;  /* muted rose */\n    --llm-vivid:       #E11D48;  /* vivid crimson */\n    --llm-vivid-2:     #F43F5E;  /* lighter pink-red */\n\n    --blue-pastel:     #DCE6F5;\n    --blue-chrome:     #2E5BB8;\n\n    --display: \"Bricolage Grotesque\", \"Helvetica Neue\", sans-serif;\n    --sans:    \"Geist\", \"Helvetica Neue\", system-ui, sans-serif;\n    --mono:    \"IBM Plex Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n  }\n  html, body {\n    margin: 0;\n    background: var(--paper);\n    color: var(--ink-strong);\n    font-family: var(--sans);\n    font-feature-settings: \"ss01\", \"ss02\";\n  }\n  deck-stage:not(:defined) { visibility: hidden; }\n  deck-stage { background: var(--paper); }\n\n  section.slide {\n    background:\n      radial-gradient(ellipse 70% 50% at 18% 8%,  rgba(180,170,230,0.20), transparent 60%),\n      radial-gradient(ellipse 70% 55% at 92% 96%, rgba(230,170,180,0.18), transparent 65%),\n      var(--paper);\n    color: var(--ink-strong);\n    overflow: hidden;\n    position: relative;\n  }\n\n  /* ============ SHARED ============ */\n  .frame {\n    position: absolute; inset: 56px 84px 48px 84px;\n    display: grid;\n    z-index: 2;\n  }\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 500;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    display: flex; align-items: center; gap: 18px;\n    margin-bottom: 22px;\n  }\n  .eyebrow .dot {\n    width: 10px; height: 10px;\n    background: var(--brain-vivid);\n    border-radius: 50%;\n    box-shadow: 0 0 0 4px rgba(79,70,229,0.18);\n  }\n  .eyebrow .sep { width: 36px; height: 1px; background: var(--rule-2); }\n  .eyebrow .b { color: var(--ink-dim); font-weight: 600; }\n\n  h1.display {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 96px;\n    line-height: 1.0;\n    letter-spacing: -0.025em;\n    margin: 10px 0 0 0;\n    color: var(--ink);\n  }\n  h1.display em {\n    font-style: normal;\n    font-weight: 800;\n    color: var(--brain-vivid);\n  }\n  h1.display .red {\n    font-style: normal;\n    font-weight: 800;\n    color: var(--llm-vivid);\n  }\n\n  /* ============ SLIDE 1 — BRAIN ============ */\n  .s1 .frame {\n    grid-template-columns: 1.05fr 1fr;\n    grid-template-rows: auto minmax(0, 1fr) auto;\n    gap: 40px 64px;\n  }\n  .s1 .head { grid-column: 1 / -1; padding-bottom: 8px; }\n  .s1 .stage { grid-column: 1 / 2; grid-row: 2 / 3; position: relative; min-height: 0; }\n  .s1 .side  { grid-column: 2 / 3; grid-row: 2 / 3; display: flex; flex-direction: column; justify-content: center; gap: 22px; padding-right: 8px; }\n  .s1 .strip { grid-column: 1 / -1; grid-row: 3 / 4; }\n\n  .brain-wrap {\n    position: absolute; inset: 0;\n    display: grid; place-items: center;\n    background:\n      radial-gradient(ellipse 70% 60% at 50% 50%, rgba(229,225,245,0.55), transparent 70%);\n    border-radius: 6px;\n  }\n  .brain-wrap svg { width: 100%; height: 100%; display: block; }\n\n  .region {\n    border-left: 3px solid var(--rule);\n    padding: 8px 0 8px 24px;\n    display: grid;\n    grid-template-columns: auto 1fr;\n    column-gap: 22px;\n    row-gap: 4px;\n    align-items: baseline;\n  }\n  .region .tag {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.16em;\n    color: var(--brain-chrome);\n    text-transform: uppercase;\n    grid-column: 1 / 2; grid-row: 1 / 2;\n  }\n  .region .name {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 34px;\n    color: var(--ink);\n    grid-column: 2 / 3; grid-row: 1 / 2;\n    line-height: 1.05;\n    letter-spacing: -0.01em;\n  }\n  .region .desc {\n    grid-column: 2 / 3; grid-row: 2 / 3;\n    font-size: 24px;\n    font-weight: 400;\n    color: var(--ink-dim);\n    line-height: 1.4;\n    margin-top: 6px;\n    max-width: 580px;\n  }\n\n  /* Bottom stats strip */\n  .stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    border-top: 1.5px solid var(--rule-2);\n    padding-top: 16px;\n    padding-bottom: 0;\n    gap: 24px;\n  }\n  .stat .k {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.18em;\n    color: var(--ink-soft);\n    text-transform: uppercase;\n  }\n  .stat .v {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 52px;\n    line-height: 1;\n    color: var(--ink);\n    margin-top: 8px;\n    letter-spacing: -0.025em;\n  }\n  .stat .v em { font-style: normal; color: var(--brain-vivid); }\n  .stat .v small { font-family: var(--mono); font-weight: 500; font-size: 24px; color: var(--ink-dim); margin-left: 10px; letter-spacing: 0; }\n\n  /* ============ SLIDE 2 — COMPARISON ============ */\n  .s2 .eyebrow .dot { background: var(--llm-vivid); box-shadow: 0 0 0 4px rgba(225,29,72,0.18); }\n  .s2 .frame {\n    grid-template-rows: auto 1fr auto;\n    gap: 36px;\n  }\n  .s2 .compare {\n    display: grid;\n    grid-template-columns: 1fr 1px 1fr;\n    gap: 0 64px;\n    min-height: 0;\n  }\n  .s2 .divider {\n    background: linear-gradient(to bottom, transparent, var(--rule-2) 18%, var(--rule-2) 82%, transparent);\n  }\n  .col {\n    display: grid;\n    grid-template-rows: auto auto 1fr auto;\n    gap: 18px;\n    min-height: 0;\n  }\n  .col .label {\n    font-family: var(--mono); font-size: 24px; font-weight: 600;\n    letter-spacing: 0.22em; color: var(--ink-soft);\n    text-transform: uppercase;\n    display: flex; align-items: center; gap: 14px;\n  }\n  .col .label .pip { width: 10px; height: 10px; border-radius: 50%; }\n  .col.brain .label .pip { background: var(--brain-vivid); box-shadow: 0 0 0 4px rgba(79,70,229,0.18); }\n  .col.brain .label { color: var(--brain-chrome); }\n  .col.llm   .label .pip { background: var(--llm-vivid);   box-shadow: 0 0 0 4px rgba(225,29,72,0.18); }\n  .col.llm   .label { color: var(--llm-chrome); }\n\n  .col .title {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 72px;\n    line-height: 1;\n    color: var(--ink);\n    letter-spacing: -0.025em;\n  }\n  .col.brain .title em { font-style: normal; font-weight: 800; color: var(--brain-vivid); }\n  .col.llm   .title em { font-style: normal; font-weight: 800; color: var(--llm-vivid); }\n  .col .title .mode {\n    display: block;\n    font-size: 24px;\n    font-weight: 500;\n    font-family: var(--mono);\n    color: var(--ink-dim);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    margin-top: 18px;\n  }\n\n  .viz {\n    position: relative;\n    border: 1.5px solid var(--rule);\n    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);\n    border-radius: 4px;\n    overflow: hidden;\n    min-height: 0;\n  }\n  .col.brain .viz { background: linear-gradient(180deg, #FAFAFE 0%, #EFEDF8 100%); border-color: #CFC9E5; }\n  .col.llm   .viz { background: linear-gradient(180deg, #FFFAFB 0%, #FAE7EB 100%); border-color: #ECC7CE; }\n\n  .viz svg { width: 100%; height: 100%; display: block; }\n\n  .viz .vtag {\n    position: absolute; top: 18px; left: 20px;\n    font-family: var(--mono); font-weight: 600; font-size: 24px;\n    letter-spacing: 0.2em;\n    color: var(--ink-soft); text-transform: uppercase;\n  }\n  .viz .vpct {\n    position: absolute; bottom: 18px; right: 20px;\n    font-family: var(--mono); font-weight: 600; font-size: 24px;\n    letter-spacing: 0.2em;\n    color: var(--ink-dim); text-transform: uppercase;\n  }\n  .col.brain .viz .vpct b { color: var(--brain-vivid); font-weight: 700; }\n  .col.llm   .viz .vpct b { color: var(--llm-vivid);   font-weight: 700; }\n\n  .metrics {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 22px 28px;\n    padding-top: 4px;\n  }\n  .m { display: grid; gap: 8px; }\n  .m .mk {\n    font-family: var(--mono); font-size: 24px; font-weight: 600;\n    letter-spacing: 0.18em; color: var(--ink-soft);\n    text-transform: uppercase;\n  }\n  .m .mv {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 56px;\n    line-height: 1;\n    letter-spacing: -0.025em;\n    color: var(--ink);\n  }\n  .col.brain .m .mv em { font-style: normal; color: var(--brain-vivid); }\n  .col.llm   .m .mv em { font-style: normal; color: var(--llm-vivid); }\n  .m .mv small {\n    font-family: var(--mono); font-weight: 500;\n    font-size: 24px; color: var(--ink-dim);\n    margin-left: 10px; letter-spacing: 0;\n  }\n  .m .mv.txt { font-size: 32px; font-weight: 700; }\n\n  /* Bottom: punchline */\n  .punch {\n    border-top: 1.5px solid var(--rule-2);\n    padding-top: 28px;\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    align-items: center;\n    gap: 48px;\n  }\n  .punch .lhs {\n    font-family: var(--mono); font-size: 24px; font-weight: 600;\n    letter-spacing: 0.22em; color: var(--ink-soft);\n    text-transform: uppercase;\n  }\n  .punch .quote {\n    font-family: var(--display);\n    font-weight: 600;\n    font-size: 30px;\n    line-height: 1.35;\n    color: var(--ink);\n    max-width: 1180px;\n    letter-spacing: -0.01em;\n  }\n  .punch .quote .hi-brain { color: var(--brain-vivid); font-weight: 800; }\n  .punch .quote .hi-llm   { color: var(--llm-vivid);   font-weight: 800; }\n  .punch .ratio {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 104px;\n    line-height: 0.9;\n    color: var(--llm-vivid);\n    letter-spacing: -0.04em;\n    text-align: right;\n  }\n  .punch .ratio small {\n    display: block;\n    font-family: var(--mono); font-weight: 600;\n    font-size: 24px; letter-spacing: 0.2em;\n    color: var(--ink-soft);\n    text-transform: uppercase;\n    margin-top: 14px;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ============== SLIDE 1 ============== -->\n  <section class=\"slide s1\" data-screen-label=\"01\" data-label=\"Beyin Aktivasyonu\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <div class=\"eyebrow\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"b\">Bölüm 04 · İnsan Beyni<\u002Fspan>\n          <span class=\"sep\"><\u002Fspan>\n          <span>Düşünmek pahalıdır — ama akıllıca pahalıdır<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"display\">Beyin <em>çalışıyor<\u002Fem>,<br>ama sadece gereken kısmı.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"stage\">\n        <div class=\"brain-wrap\" id=\"brain-stage\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"side\">\n        <div class=\"region\">\n          <div class=\"tag\">01 · Prefrontal Korteks<\u002Fdiv>\n          <div class=\"name\">Planlama &amp; akıl yürütme<\u002Fdiv>\n          <div class=\"desc\">Problemin yapısını çözer, alt adımlara böler. Zor matematikte en yoğun çalışan bölge.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"region\">\n          <div class=\"tag\">02 · Parietal Lob<\u002Fdiv>\n          <div class=\"name\">Sayısal işlem<\u002Fdiv>\n          <div class=\"desc\">Mekânsal ilişkiler, miktar ve sembol manipülasyonu — denklem kurarken devrede.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"region\">\n          <div class=\"tag\">03 · Hipokampus<\u002Fdiv>\n          <div class=\"name\">Hafıza erişimi<\u002Fdiv>\n          <div class=\"desc\">İlgili formülleri, daha önce çözülmüş örnek desenleri kısa sürede çağırır.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"region\">\n          <div class=\"tag\">04 · Temporal Lob<\u002Fdiv>\n          <div class=\"name\">Dil &amp; anlam<\u002Fdiv>\n          <div class=\"desc\">Soru metnini ayrıştırır; \"şu kadar daha fazla\" gibi ifadeleri anlama dönüştürür.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"strip\">\n        <div class=\"stats\">\n          <div class=\"stat\">\n            <div class=\"k\">Toplam Nöron<\u002Fdiv>\n            <div class=\"v\">86<small>milyar<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <div class=\"k\">Aynı Anda Aktif<\u002Fdiv>\n            <div class=\"v\"><em>~5<\u002Fem><small>%<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <div class=\"k\">Aktif Nöron<\u002Fdiv>\n            <div class=\"v\">≈ 4.3<small>milyar<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <div class=\"k\">Sürekli Enerji<\u002Fdiv>\n            <div class=\"v\">20<small>W<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============== SLIDE 2 ============== -->\n  <section class=\"slide s2\" data-screen-label=\"02\" data-label=\"Beyin vs LLM\">\n    <div class=\"frame\">\n      <div class=\"head\">\n        <div class=\"eyebrow\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"b\">Bölüm 04 · Karşılaştırma<\u002Fspan>\n          <span class=\"sep\"><\u002Fspan>\n          <span>Aynı iş, iki farklı mimari<\u002Fspan>\n        <\u002Fdiv>\n        <h1 class=\"display\" style=\"font-size: 100px;\">Sparse vs <span class=\"red\">Dense<\u002Fspan> —<br>aynı soruya iki maliyet.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"compare\">\n        <div class=\"col brain\">\n          <div class=\"label\"><span class=\"pip\"><\u002Fspan><span>A · İnsan Beyni<\u002Fspan><\u002Fdiv>\n          <div class=\"title\"><em>Sparse<\u002Fem> aktivasyon<span class=\"mode\">Yalnızca gereken alt-ağ devreye girer<\u002Fspan><\u002Fdiv>\n          <div class=\"viz\">\n            <div class=\"vtag\">Aktif nöron dağılımı<\u002Fdiv>\n            <svg viewBox=\"0 0 600 360\" id=\"viz-brain\"><\u002Fsvg>\n            <div class=\"vpct\">Aktif: <b>~5%<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metrics\">\n            <div class=\"m\"><div class=\"mk\">Güç<\u002Fdiv><div class=\"mv\"><em>20<\u002Fem><small>W<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Aktif birim<\u002Fdiv><div class=\"mv\"><em>4.3<\u002Fem><small>milyar nöron<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Mimari<\u002Fdiv><div class=\"mv txt\">Sparse · Hiyerarşik<\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Optimizasyon<\u002Fdiv><div class=\"mv txt\">500M yıl evrim<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"divider\"><\u002Fdiv>\n\n        <div class=\"col llm\">\n          <div class=\"label\"><span class=\"pip\"><\u002Fspan><span>B · Büyük Dil Modeli<\u002Fspan><\u002Fdiv>\n          <div class=\"title\"><em>Dense<\u002Fem> aktivasyon<span class=\"mode\">Her token'da tüm parametreler çalışır<\u002Fspan><\u002Fdiv>\n          <div class=\"viz\">\n            <div class=\"vtag\">Parametre kullanımı<\u002Fdiv>\n            <svg viewBox=\"0 0 600 360\" id=\"viz-llm\"><\u002Fsvg>\n            <div class=\"vpct\">Aktif: <b>~100%<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metrics\">\n            <div class=\"m\"><div class=\"mk\">Güç<\u002Fdiv><div class=\"mv\"><em>700<\u002Fem><small>W (GPU)<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Aktif birim<\u002Fdiv><div class=\"mv\"><em>157<\u002Fem><small>milyar parametre<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Mimari<\u002Fdiv><div class=\"mv txt\">Dense · Düz<\u002Fdiv><\u002Fdiv>\n            <div class=\"m\"><div class=\"mk\">Optimizasyon<\u002Fdiv><div class=\"mv txt\">~10 yıl araştırma<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"punch\">\n        <div class=\"lhs\">Sonuç<\u002Fdiv>\n        <div class=\"quote\">\"Beyin de düşünürken kaynak harcar — ama evrim bunu <span class=\"hi-brain\">sparse, paralel ve hiyerarşik<\u002Fspan> mimariyle optimize etti. <span class=\"hi-llm\">LLM'ler henüz bu verimliliğe ulaşamadı.<\u002Fspan>\"<\u002Fdiv>\n        <div class=\"ratio\">35×<small>Güç farkı (W)<\u002Fsmall><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"1e3b69d7-7e3e-43b7-8cc2-b39e97918aa3\"><\u002Fscript>\n<script>\n  // =========================================================================\n  // BRAIN VISUALIZATION (slide 1) — vivid indigo dots inside brain silhouette\n  // =========================================================================\n  function brainShapePath() {\n    return \"M 320,80 C 460,80 560,170 560,300 C 560,430 470,520 340,540 C 320,580 270,610 220,605 C 140,600 80,540 80,460 C 30,440 10,380 30,320 C 10,260 40,180 110,150 C 130,80 230,60 320,80 Z\";\n  }\n\n  function pointInPath(svg, path, x, y) {\n    const pt = svg.createSVGPoint(); pt.x = x; pt.y = y;\n    return path.isPointInFill(pt);\n  }\n  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }\n\n  function rng(seed) {\n    return function() {\n      seed = (seed + 0x6D2B79F5) | 0;\n      let t = seed;\n      t = Math.imul(t ^ (t >>> 15), t | 1);\n      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);\n      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n    };\n  }\n\n  function buildBrain() {\n    const host = document.getElementById('brain-stage');\n    if (!host) return;\n    host.innerHTML = '';\n    const NS = 'http://www.w3.org/2000/svg';\n    const svg = document.createElementNS(NS, 'svg');\n    svg.setAttribute('viewBox', '0 0 640 620');\n    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');\n\n    const defs = document.createElementNS(NS, 'defs');\n    defs.innerHTML = `\n      <radialGradient id=\"glow-indigo\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n        <stop offset=\"0%\"  stop-color=\"#A5B4FC\" stop-opacity=\"0.9\"/>\n        <stop offset=\"45%\" stop-color=\"#818CF8\" stop-opacity=\"0.45\"/>\n        <stop offset=\"100%\" stop-color=\"#6366F1\" stop-opacity=\"0\"/>\n      <\u002FradialGradient>\n      <filter id=\"bigblur\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n        <feGaussianBlur stdDeviation=\"14\"/>\n      <\u002Ffilter>\n    `;\n    svg.appendChild(defs);\n\n    // Hit-test path (invisible)\n    const hitPath = document.createElementNS(NS, 'path');\n    hitPath.setAttribute('d', brainShapePath());\n    hitPath.setAttribute('fill', 'rgba(255,255,255,0.01)');\n    hitPath.setAttribute('stroke', 'none');\n    svg.appendChild(hitPath);\n\n    // Outline (pastel)\n    const outline = document.createElementNS(NS, 'path');\n    outline.setAttribute('d', brainShapePath());\n    outline.setAttribute('fill', 'none');\n    outline.setAttribute('stroke', '#B5B0D6');\n    outline.setAttribute('stroke-width', '1.2');\n    outline.setAttribute('stroke-dasharray', '3 5');\n    svg.appendChild(outline);\n\n    // Central fissure\n    const fissure = document.createElementNS(NS, 'path');\n    fissure.setAttribute('d', 'M 295,100 C 305,200 290,300 305,400 C 315,470 290,520 285,540');\n    fissure.setAttribute('fill', 'none');\n    fissure.setAttribute('stroke', '#C8C2E2');\n    fissure.setAttribute('stroke-width', '1');\n    svg.appendChild(fissure);\n\n    host.appendChild(svg);\n\n    const clusters = [\n      { id: 1, x: 165, y: 195, r: 62, count: 24 },\n      { id: 2, x: 470, y: 230, r: 58, count: 22 },\n      { id: 3, x: 310, y: 360, r: 48, count: 20 },\n      { id: 4, x: 220, y: 470, r: 58, count: 18 },\n    ];\n\n    const rand = rng(20260528);\n    const minDist = 8.5;\n    const allDots = [];\n    let attempts = 0;\n    while (allDots.length < 1600 && attempts < 60000) {\n      attempts++;\n      const x = 40 + rand() * 560;\n      const y = 50 + rand() * 560;\n      if (!pointInPath(svg, hitPath, x, y)) continue;\n      let ok = true;\n      for (let i = allDots.length - 1; i >= Math.max(0, allDots.length - 80); i--) {\n        if (dist(allDots[i], { x, y }) < minDist) { ok = false; break; }\n      }\n      if (ok) allDots.push({ x, y });\n    }\n\n    const active = new Set();\n    for (const c of clusters) {\n      const candidates = [];\n      for (let i = 0; i < allDots.length; i++) {\n        const d = dist(allDots[i], c);\n        if (d < c.r) candidates.push({ i, d });\n      }\n      candidates.sort((a, b) => a.d - b.d);\n      const picked = candidates.slice(0, Math.min(candidates.length, c.count * 1.4));\n      for (let k = picked.length - 1; k > 0; k--) {\n        const j = Math.floor(rand() * (k + 1));\n        [picked[k], picked[j]] = [picked[j], picked[k]];\n      }\n      picked.slice(0, c.count).forEach(p => active.add(p.i));\n    }\n\n    // Big soft glows under each cluster\n    const glowLayer = document.createElementNS(NS, 'g');\n    glowLayer.setAttribute('filter', 'url(#bigblur)');\n    for (const c of clusters) {\n      const g = document.createElementNS(NS, 'circle');\n      g.setAttribute('cx', c.x); g.setAttribute('cy', c.y);\n      g.setAttribute('r', c.r * 0.95);\n      g.setAttribute('fill', 'url(#glow-indigo)');\n      g.setAttribute('opacity', '0.85');\n      glowLayer.appendChild(g);\n    }\n    svg.appendChild(glowLayer);\n\n    // Inactive dots — soft slate\n    const inactiveLayer = document.createElementNS(NS, 'g');\n    inactiveLayer.setAttribute('fill', '#9AA3BD');\n    for (let i = 0; i < allDots.length; i++) {\n      if (active.has(i)) continue;\n      const p = allDots[i];\n      const c = document.createElementNS(NS, 'circle');\n      c.setAttribute('cx', p.x.toFixed(1));\n      c.setAttribute('cy', p.y.toFixed(1));\n      c.setAttribute('r', '1.5');\n      c.setAttribute('opacity', (0.30 + rand() * 0.25).toFixed(2));\n      inactiveLayer.appendChild(c);\n    }\n    svg.appendChild(inactiveLayer);\n\n    // Active dots — vivid indigo with halo\n    const activeLayer = document.createElementNS(NS, 'g');\n    for (const i of active) {\n      const p = allDots[i];\n      const halo = document.createElementNS(NS, 'circle');\n      halo.setAttribute('cx', p.x.toFixed(1));\n      halo.setAttribute('cy', p.y.toFixed(1));\n      halo.setAttribute('r', '7');\n      halo.setAttribute('fill', '#818CF8');\n      halo.setAttribute('opacity', '0.28');\n      activeLayer.appendChild(halo);\n      const c = document.createElementNS(NS, 'circle');\n      c.setAttribute('cx', p.x.toFixed(1));\n      c.setAttribute('cy', p.y.toFixed(1));\n      c.setAttribute('r', '2.6');\n      c.setAttribute('fill', '#4F46E5');\n      activeLayer.appendChild(c);\n      // bright inner highlight\n      const hi = document.createElementNS(NS, 'circle');\n      hi.setAttribute('cx', (p.x - 0.6).toFixed(1));\n      hi.setAttribute('cy', (p.y - 0.6).toFixed(1));\n      hi.setAttribute('r', '0.9');\n      hi.setAttribute('fill', '#E0E7FF');\n      activeLayer.appendChild(hi);\n    }\n    svg.appendChild(activeLayer);\n\n    // Annotation lines + labels\n    const annLayer = document.createElementNS(NS, 'g');\n    annLayer.setAttribute('font-family', '\"IBM Plex Mono\", monospace');\n    annLayer.setAttribute('font-size', '24');\n    annLayer.setAttribute('font-weight', '600');\n    annLayer.setAttribute('fill', '#6E63B6');\n    const annTargets = [\n      { c: clusters[0], lx: 60,  ly: 110, label: '01', anchor: 'start' },\n      { c: clusters[1], lx: 590, ly: 150, label: '02', anchor: 'end' },\n      { c: clusters[2], lx: 430, ly: 360, label: '03', anchor: 'start' },\n      { c: clusters[3], lx: 60,  ly: 545, label: '04', anchor: 'start' },\n    ];\n    for (const a of annTargets) {\n      const line = document.createElementNS(NS, 'line');\n      line.setAttribute('x1', a.c.x); line.setAttribute('y1', a.c.y);\n      line.setAttribute('x2', a.lx);  line.setAttribute('y2', a.ly);\n      line.setAttribute('stroke', '#9088C3');\n      line.setAttribute('stroke-width', '0.9');\n      line.setAttribute('stroke-dasharray', '2 4');\n      annLayer.appendChild(line);\n      const t = document.createElementNS(NS, 'text');\n      t.setAttribute('x', a.lx + (a.anchor === 'end' ? -8 : 8));\n      t.setAttribute('y', a.ly + 6);\n      t.setAttribute('text-anchor', a.anchor);\n      t.setAttribute('letter-spacing', '2');\n      t.textContent = a.label;\n      annLayer.appendChild(t);\n      const ring = document.createElementNS(NS, 'circle');\n      ring.setAttribute('cx', a.lx); ring.setAttribute('cy', a.ly);\n      ring.setAttribute('r', '4');\n      ring.setAttribute('fill', '#FFFFFF');\n      ring.setAttribute('stroke', '#6E63B6');\n      ring.setAttribute('stroke-width', '1.2');\n      annLayer.appendChild(ring);\n    }\n    svg.appendChild(annLayer);\n  }\n\n  // =========================================================================\n  // COMPARISON VISUALIZATIONS (slide 2)\n  // =========================================================================\n  function buildCompareViz() {\n    const NS = 'http://www.w3.org/2000/svg';\n    const b = document.getElementById('viz-brain');\n    const l = document.getElementById('viz-llm');\n    if (!b || !l) return;\n\n    const cols = 60, rows = 36;\n    const cellW = 600 / cols, cellH = 360 / rows;\n\n    // ---- BRAIN compact (sparse) ----\n    b.innerHTML = '';\n    const rand = rng(424242);\n    const clusters = [\n      { cx: 14, cy: 11, r: 4 },\n      { cx: 44, cy: 12, r: 4 },\n      { cx: 30, cy: 22, r: 3 },\n      { cx: 18, cy: 28, r: 3.5 },\n    ];\n    for (let r = 0; r < rows; r++) {\n      for (let c = 0; c < cols; c++) {\n        const x = c * cellW + cellW / 2 + (rand() - 0.5) * 2;\n        const y = r * cellH + cellH / 2 + (rand() - 0.5) * 2;\n        let isActive = false;\n        for (const cl of clusters) {\n          const d = Math.hypot(c - cl.cx, r - cl.cy);\n          if (d < cl.r && rand() < (1 - d / cl.r) * 0.9) { isActive = true; break; }\n        }\n        if (isActive) {\n          const halo = document.createElementNS(NS, 'circle');\n          halo.setAttribute('cx', x.toFixed(1)); halo.setAttribute('cy', y.toFixed(1));\n          halo.setAttribute('r', '5.5');\n          halo.setAttribute('fill', '#818CF8');\n          halo.setAttribute('opacity', '0.30');\n          b.appendChild(halo);\n          const dot = document.createElementNS(NS, 'circle');\n          dot.setAttribute('cx', x.toFixed(1)); dot.setAttribute('cy', y.toFixed(1));\n          dot.setAttribute('r', '2.3');\n          dot.setAttribute('fill', '#4F46E5');\n          b.appendChild(dot);\n        } else {\n          const dot = document.createElementNS(NS, 'circle');\n          dot.setAttribute('cx', x.toFixed(1)); dot.setAttribute('cy', y.toFixed(1));\n          dot.setAttribute('r', '1.2');\n          dot.setAttribute('fill', '#A6ADC4');\n          dot.setAttribute('opacity', (0.30 + rand() * 0.25).toFixed(2));\n          b.appendChild(dot);\n        }\n      }\n    }\n\n    // ---- LLM compact (DENSE — every cell vivid red) ----\n    l.innerHTML = '';\n    const rand2 = rng(777);\n    for (let r = 0; r < rows; r++) {\n      for (let c = 0; c < cols; c++) {\n        const x = c * cellW + cellW / 2;\n        const y = r * cellH + cellH / 2;\n        const intensity = 0.78 + rand2() * 0.22;\n        const dot = document.createElementNS(NS, 'circle');\n        dot.setAttribute('cx', x.toFixed(1));\n        dot.setAttribute('cy', y.toFixed(1));\n        dot.setAttribute('r', '2.3');\n        dot.setAttribute('fill', '#E11D48');\n        dot.setAttribute('opacity', intensity.toFixed(2));\n        l.appendChild(dot);\n      }\n    }\n    const overlay = document.createElementNS(NS, 'rect');\n    overlay.setAttribute('x', '0'); overlay.setAttribute('y', '0');\n    overlay.setAttribute('width', '600'); overlay.setAttribute('height', '360');\n    overlay.setAttribute('fill', '#E11D48');\n    overlay.setAttribute('opacity', '0.05');\n    l.appendChild(overlay);\n  }\n\n  function init() {\n    try { buildBrain(); } catch (e) { console.error(e); }\n    try { buildCompareViz(); } catch (e) { console.error(e); }\n  }\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);\n  else init();\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
