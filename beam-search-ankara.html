<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Beam Search Simülatörü</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f7f8fc; color: #1a1d27; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 36px 28px 60px; max-width: 860px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 700; color: #1a1d27; margin-bottom: 4px; letter-spacing: -0.3px; }
.subtitle { font-size: 12px; color: #9aa0b4; font-family: 'JetBrains Mono', monospace; margin-bottom: 28px; }
.card { background: #fff; border: 1px solid #e4e8f0; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
.ctitle { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9aa0b4; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
.step-badge { background: #e8f0fe; color: #1a56db; font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 3px 9px; border-radius: 20px; }
.ctx { font-size: 12px; color: #9aa0b4; font-family: 'JetBrains Mono', monospace; }
.ctx b { color: #1a56db; font-weight: 500; }
.bar-row { margin-bottom: 6px; }
.bar-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.tok { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; padding: 1px 7px; border-radius: 5px; background: #f4f5f8; color: #1a1d27; border: 1px solid #e2e5ed; }
.tok.top { background: #e8f0fe; color: #1a56db; border-color: #b4ccfb; }
.barpct { font-size: 11px; color: #9aa0b4; font-family: 'JetBrains Mono', monospace; }
.bar-bg { height: 17px; background: #f4f5f8; border-radius: 3px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-txt { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.brow { background: #f8f9fb; border: 1px solid #e2e5ed; border-radius: 9px; padding: 10px 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; gap: 10px; }
.brow.best { background: #e8f0fe; border: 1.5px solid #1a56db; }
.brow.pruned { opacity: 0.28; }
.bseq { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #2a3050; flex: 1; min-width: 0; word-break: break-word; line-height: 1.5; }
.bseq .nt { color: #1a56db; font-weight: 700; }
.brow.best .bseq { color: #1a56db; }
.bsc { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #9aa0b4; white-space: nowrap; flex-shrink: 0; }
.brow.best .bsc { color: #1a56db; font-weight: 600; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-left: 5px; white-space: nowrap; }
.b-best { background: #1a56db; color: #fff; }
.b-pruned { background: #f0f0f5; color: #b0b6c8; }
.divider { border: none; border-top: 1px solid #eaecf2; margin: 13px 0; }
.final-box { background: #e8f0fe; border: 1.5px solid #1a56db; border-radius: 11px; padding: 16px 18px; margin-bottom: 13px; }
.final-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1a56db; margin-bottom: 7px; font-family: 'JetBrains Mono', monospace; }
.final-seq { font-size: 16px; font-weight: 700; color: #1a1d27; line-height: 1.6; }
.final-score { font-size: 11px; color: #7a80a0; margin-top: 5px; font-family: 'JetBrains Mono', monospace; }
.vsgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vsbox { background: #f8f9fb; border: 1px solid #e2e5ed; border-radius: 9px; padding: 13px; }
.vsbox.win { background: #e8f0fe; border: 1.5px solid #1a56db; }
.vsm { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #9aa0b4; font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
.vss { font-size: 13px; color: #2a3050; font-family: 'JetBrains Mono', monospace; line-height: 1.5; }
.vsbox.win .vss { color: #1a56db; }
.vssc { font-size: 11px; color: #9aa0b4; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
.vsw { font-size: 11px; color: #1a56db; font-weight: 600; margin-top: 4px; }
.note { background: #fffbf0; border: 1px solid #f0dfa0; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #7a6020; margin-top: 13px; line-height: 1.7; }
.prompt-pill { display: inline-block; background: #f4f5f8; border: 1px solid #e2e5ed; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: #7a80a0; margin-bottom: 18px; }
.prompt-pill b { color: #1a1d27; font-weight: 600; }
</style>
</head>
<body>

<h1>LLM Beam Search Simülatörü</h1>
<p class="subtitle">// Türkiye'nin başkenti neresidir? · k=3 beam · 4 adım</p>

<div id="root"></div>

<script>
const PROMPT = "Türkiye'nin başkenti neresidir?";
const K = 3;

const DATA = {
  beams: [
    {
      id: 0,
      tokens: ["Ankara", "Türkiye'nin", "resmî", "başkentidir"],
      token_probs: [0.74, 0.70, 0.68, 0.88],
      full_text: "Ankara Türkiye'nin resmî başkentidir"
    },
    {
      id: 1,
      tokens: ["Türkiye'nin", "başkenti", "Ankara'dır", "kesinlikle"],
      token_probs: [0.18, 0.65, 0.80, 0.55],
      full_text: "Türkiye'nin başkenti Ankara'dır kesinlikle"
    },
    {
      id: 2,
      tokens: ["Başkent", "Ankara'dır", "Türkiye'de", "bilinir"],
      token_probs: [0.08, 0.72, 0.58, 0.60],
      full_text: "Başkent Ankara'dır Türkiye'de bilinir"
    }
  ],
  steps: [
    {
      step_index: 0,
      candidates: [
        { token: "Ankara",       prob: 0.74 },
        { token: "Türkiye'nin",  prob: 0.18 },
        { token: "Başkent",      prob: 0.08 },
        { token: "Cevap:",       prob: 0.00 },
        { token: "Şehir",        prob: 0.00 }
      ]
    },
    {
      step_index: 1,
      candidates: [
        { token: "Türkiye'nin",  prob: 0.70 },
        { token: "şehridir",     prob: 0.14 },
        { token: "ili",          prob: 0.09 },
        { token: "kenti",        prob: 0.05 },
        { token: "bölgesi",      prob: 0.02 }
      ]
    },
    {
      step_index: 2,
      candidates: [
        { token: "resmî",        prob: 0.68 },
        { token: "başkentidir",  prob: 0.18 },
        { token: "büyük",        prob: 0.09 },
        { token: "önemli",       prob: 0.03 },
        { token: "tek",          prob: 0.02 }
      ]
    },
    {
      step_index: 3,
      candidates: [
        { token: "başkentidir",  prob: 0.88 },
        { token: "merkezi",      prob: 0.07 },
        { token: "şehridir",     prob: 0.03 },
        { token: "kentidir",     prob: 0.01 },
        { token: "yeridir",      prob: 0.01 }
      ]
    }
  ]
};

const COLORS = [
  { bar: '#1a56db', txt: '#1a56db' },
  { bar: '#0f766e', txt: '#0f766e' },
  { bar: '#7c3aed', txt: '#7c3aed' },
  { bar: '#b45309', txt: '#b45309' },
  { bar: '#dc2626', txt: '#dc2626' },
];

function lp(p) { return Math.log(Math.max(p, 1e-9)); }

function renderBars(candidates) {
  const tot = candidates.reduce((s, c) => s + c.prob, 0) || 1;
  return candidates.map((c, i) => {
    const col = COLORS[i % COLORS.length];
    const pct = (c.prob / tot * 100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-meta">
        <span class="tok ${i === 0 ? 'top' : ''}">${c.token}</span>
        <span class="barpct">${pct}%</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${pct}%;background:${col.bar}22;border-right:2.5px solid ${col.bar}"></div>
        <span class="bar-txt" style="color:${col.bar}">${pct}%</span>
      </div>
    </div>`;
  }).join('');
}

function renderBeamRows(beams, stepIdx) {
  return beams.map((beam, bi) => {
    const safeLen = Math.min(stepIdx + 1, beam.tokens.length);
    const pLogP = beam.token_probs.slice(0, safeLen).reduce((a, p) => a + lp(p), 0);
    const prev = beam.tokens.slice(0, stepIdx).join(' ');
    const nt = beam.tokens[stepIdx] || '…';
    const isBest = bi === 0;
    const isPruned = bi >= K;
    return `<div class="brow ${isBest ? 'best' : ''} ${isPruned ? 'pruned' : ''}">
      <div class="bseq">${prev ? prev + ' ' : ''}<span class="nt">${nt}</span></div>
      <div style="display:flex;align-items:center;flex-shrink:0">
        <span class="bsc">log-p: ${pLogP.toFixed(3)}</span>
        ${isBest ? '<span class="badge b-best">en iyi</span>' : ''}
        ${isPruned ? '<span class="badge b-pruned">budandı</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

function build() {
  const beams = DATA.beams
    .map(b => ({ ...b, cumLogP: b.token_probs.reduce((s, p) => s + lp(p), 0) }))
    .sort((a, b) => b.cumLogP - a.cumLogP);

  let html = `<div class="prompt-pill">prompt: <b>${PROMPT}</b></div>`;

  DATA.steps.forEach((si, s) => {
    const ctx = beams[0].tokens.slice(0, s).join(' ');
    html += `<div class="card">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px;">
        <span class="step-badge">adım ${s + 1}</span>
        <span class="ctx">bağlam: "<b>${PROMPT}${ctx ? ' → ' + ctx : ''}</b>"</span>
      </div>
      <div class="ctitle">token adayları — olasılık dağılımı</div>
      ${renderBars(si.candidates)}
      <div class="divider"></div>
      <div class="ctitle">beam yolları · kümülatif log-olasılık sıralaması</div>
      ${renderBeamRows(beams, s)}
    </div>`;
  });

  const winner = beams[0];
  const greedyTokens = DATA.steps.map(st => st.candidates.reduce((a, b) => a.prob > b.prob ? a : b).token);
  const greedyLogP = DATA.steps.reduce((acc, st) => acc + lp(st.candidates.reduce((a, b) => a.prob > b.prob ? a : b).prob), 0);
  const beamWins = winner.cumLogP > greedyLogP;

  html += `<div class="card">
    <div class="ctitle">sonuç</div>
    <div class="final-box">
      <div class="final-label">Kazanan dizi · en yüksek kümülatif log-olasılık</div>
      <div class="final-seq">${winner.full_text}</div>
      <div class="final-score">kümülatif log-p: ${winner.cumLogP.toFixed(4)}</div>
    </div>
    <div class="ctitle" style="margin-bottom:10px;">greedy vs beam search</div>
    <div class="vsgrid">
      <div class="vsbox ${!beamWins ? 'win' : ''}">
        <div class="vsm">Greedy · her adımda max token</div>
        <div class="vss">${greedyTokens.join(' ')}</div>
        <div class="vssc">log-p: ${greedyLogP.toFixed(4)}</div>
        ${!beamWins ? '<div class="vsw">bu senaryoda kazandı</div>' : ''}
      </div>
      <div class="vsbox ${beamWins ? 'win' : ''}">
        <div class="vsm">Beam search · kümülatif max</div>
        <div class="vss">${winner.full_text}</div>
        <div class="vssc">log-p: ${winner.cumLogP.toFixed(4)}</div>
        ${beamWins ? '<div class="vsw">bu senaryoda kazandı</div>' : ''}
      </div>
    </div>
    <div class="note">
      <strong>Greedy vs beam search:</strong> Greedy her adımda en yüksek olasılıklı tokeni seçer.
      Beam search ise <strong>3 paralel yolu</strong> eş zamanlı takip ederek tüm dizi boyunca
      kümülatif log-olasılığı en yüksek tamamlamayı belirler. Dizi uzadıkça ve bağlaçlar,
      çekimli fiiller devreye girdikçe greedy ile beam arasındaki fark belirginleşir.
    </div>
  </div>`;

  document.getElementById('root').innerHTML = html;
}

build();
</script>
</body>
</html>
