  { id:'pd1', name:'MEDDIC Sales Methodology', active:true, date:'2026-06-10', content:`# MEDDIC Sales Methodology

A qualification framework for complex B2B sales, used to assess deal health and coach reps toward a rigorous, evidence-based close.

## M — Metrics
What quantifiable business outcome will the customer achieve? Push the rep to get a number (cost saved, uptime gained, defects reduced) — not a vague "efficiency improvement."

## E — Economic Buyer
Who has the budget authority to approve this purchase? Confirm the rep has met, or has a credible path to, the Economic Buyer — not just a technical champion.

## D — Decision Criteria
What formal and informal criteria will the customer use to evaluate vendors? Get the rep to list these explicitly and map Teknosin's strengths against each one.

## D — Decision Process
What are the concrete steps, approvers, and timeline between "interested" and "signed"? A vague process is a red flag — ask for dates and names.

## I — Identify Pain
What specific operational or financial pain triggered this evaluation? The pain must be strong enough to justify budget and urgency — surface it in the customer's own words.

## C — Champion
Who inside the account is actively selling on Teknosin's behalf when the rep isn't in the room? Confirm this person has influence and a personal stake in the outcome, not just enthusiasm.

## Coaching Use
When reviewing a deal, walk the rep through each letter and flag any that are unanswered or answered with a guess rather than a fact. A deal missing more than one or two MEDDIC elements is at real risk regardless of how positive the meeting felt.` },
  { id:'pd2', name:'SPIN Selling Principles', active:true, date:'2026-06-12', content:`# SPIN Selling Principles

A questioning framework (Neil Rackham) for larger, more considered sales, built around four question types asked in sequence.

## Situation Questions
Establish facts about the customer's current setup (equipment, volumes, shifts, current supplier). Use sparingly — too many feels like an interrogation and adds no perceived value.

## Problem Questions
Surface dissatisfaction with the current situation: difficulties, malfunctions, complaints. These get the customer articulating a problem in their own words rather than the rep asserting one.

## Implication Questions
Explore the consequences of the problem if left unsolved: cost, delay, risk, downstream impact on other departments. This is where the pain becomes bigger and harder to ignore than the price of a solution.

## Need-Payoff Questions
Ask the customer to state the value of solving the problem themselves: "If downtime dropped by 30%, what would that mean for your plant?" Customer-articulated value is far more persuasive than rep-stated value.

## Coaching Use
Most under-trained reps over-ask Situation Questions and skip Implication and Need-Payoff entirely — this produces a technically accurate but commercially flat conversation. When coaching, check whether the rep got the customer to state the size of the problem and the value of solving it in their own words, not just describe their setup.` },
  { id:'pd3', name:'Challenger Sale Framework', active:false, date:'2026-06-15', content:`# Challenger Sale Framework

Based on research by Matthew Dixon and Brent Adamson, this model argues the highest-performing reps "teach, tailor, and take control" rather than simply building relationships or servicing requests.

## Teach for Differentiation
Bring the customer a new, commercially relevant insight about their business they hadn't considered — not a product pitch. The goal is to reframe how they think about their problem in a way that favors Teknosin's strengths.

## Tailor the Message
Adapt the insight and the framing to the specific stakeholder in the room — a plant manager and a procurement lead need different angles on the same insight.

## Take Control
Be comfortable discussing money, pushing back on unreasonable asks, and creating constructive tension rather than avoiding conflict to preserve harmony.

## Coaching Use
This approach works best with informed, complex-buying-committee accounts and can backfire with early-stage or price-sensitive relationships — use judgement on when to apply it. When coaching, check whether the rep is leading with an insight the customer didn't already have, or simply confirming what the customer already believes.` },

const INIT_PLATFORM_PROMPT = `You are a sales coach supporting a rep before and after their customer meetings.

Session opening: at the very start of every meeting-based session, before asking anything else, confirm the rep is ready to talk — for example "Are you ready to talk? Shall we begin?" Do not ask the first real coaching question, and do not start coaching content, until the rep gives a clear positive confirmation (voice or text — "yes", "ready", "let's go", "sure", etc.). If their response is unclear, hesitant, or negative, ask what they'd prefer instead of proceeding — never assume readiness.

Language: Always respond in the user's preferred language, as set on their account (Turkish or English) — regardless of the language of any product, policy, or market reference material in context. Never mix languages within a single reply; if the user explicitly switches language mid-conversation, follow their lead for the rest of the session.`;

const INIT_GENERAL_PROMPT = `You are a sales coach available for general, on-demand consultation — this session is not tied to any specific scheduled meeting.

Language: Always respond in the user's preferred language, as set on their account (Turkish or English) — regardless of the language of any product, policy, or market reference material in context. Never mix languages within a single reply; if the user explicitly switches language mid-conversation, follow their lead for the rest of the session.

Start by asking the seller what they need help with. Determine first:
- First meeting
- Follow-up meeting
- Negotiation
- Deal recovery
- Account planning
- Something else

Ask ONE question at a time. Wait for the answer. If the answer is weak or vague, ask ONE follow-up to push deeper — then move on regardless. Be direct and concise.

Once the situation is clear, coach using the same underlying principles as a meeting-prep session: identify the trigger and cost of inaction, quantify the pain, validate the Champion, clarify Economic Buyer access, map internal risk, connect to the account's top priorities, and define the Next Best Action.

If the seller has no specific deal in mind, help them think through general skill areas instead — prospecting, objection handling, negotiation tactics, or account strategy — drawing on the frameworks in your knowledge base (SPIN, Challenger, SNAP, Voss / Fisher-Ury for negotiation).`;

          <button onClick={()=>{ if(!name.trim()||!content.trim())return; onSave({ ...policy, name:name.trim(), content }); }} style={{ padding:'9px 20px', borderRadius:8, border:'none', background:'var(--sm)', color:'#fff', cursor:'pointer', font:'600 13px/1 var(--font-sans)' }}>Save</button>
        </div>
      </div>
    </div>
  );
};

const PromptEditor = ({ value, onChange, maxChars, label }) => {
  const pct = value.length/maxChars;
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
        <label style={{ font:'600 13px/1 var(--font-sans)', color:'var(--genbil-ink)' }}>{label}</label>
        <span style={{ font:'500 11px/1 var(--font-sans)', color:pct>0.9?'var(--danger)':'var(--genbil-ink-4)' }}>{value.length.toLocaleString()} / {maxChars.toLocaleString()}</span>
      </div>
      <textarea value={value} onChange={e=>e.target.value.length<=maxChars&&onChange(e.target.value)} rows={8}
        style={{ width:'100%', resize:'vertical', border:`1px solid ${pct>0.9?'var(--danger)':'var(--genbil-line-2)'}`, borderRadius:8, padding:'12px 14px', font:'400 13px/1.6 var(--font-sans)', color:'var(--genbil-ink)', outline:'none', background:'#fff' }} />
      <div style={{ height:3, background:'var(--genbil-line)', borderRadius:2, marginTop:6, overflow:'hidden' }}>
        <div style={{ height:'100%', borderRadius:2, width:`${Math.min(pct*100,100)}%`, background:pct>0.9?'var(--danger)':pct>0.7?'var(--warn-deep)':'var(--sm)', transition:'width .1s' }} />
      </div>
    </div>
  );
};

const StatsBar = ({ docs, maxTotal, maxCount }) => {
  const totalChars = docs.filter(d=>d.active).reduce((s,d)=>s+d.content.length,0);
  const pct = totalChars/maxTotal;
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
      {[
        { label:'Policies',     val:`${docs.length} / ${maxCount}`,                            warn:docs.length>=maxCount },
        { label:'Prompt chars', val:`${totalChars.toLocaleString()} / ${maxTotal.toLocaleString()}`, warn:pct>0.85 },
      ].map(({label,val,warn})=>(
        <div key={label} style={{ background:warn?'#FEF2F2':'var(--genbil-paper-2)', border:`1px solid ${warn?'#FECACA':'var(--genbil-line)'}`, borderRadius:8, padding:'10px 14px' }}>
          <div style={{ font:'400 11px/1 var(--font-sans)', color:warn?'var(--danger)':'var(--genbil-ink-4)', marginBottom:4 }}>{label}</div>
          <div style={{ font:'600 14px/1 var(--font-sans)', color:warn?'var(--danger)':'var(--genbil-ink)' }}>{val}</div>
        </div>
      ))}
    </div>
  );
};

/* ── PLATFORM DOCUMENTS PANEL ── */
const PlatformDocsPanel = ({ config, showToast }) => {
  const [docs, setDocs] = useState(INIT_PLATFORM_DOCS);
  const [editing, setEditing] = useState(null); // null | policy object being added/edited
  const promptMaxChars = config.doc_max_chars_per_file;
  const [promptMode, setPromptMode] = useState('meeting'); // 'meeting' | 'general'
  const [meetingPrompt, setMeetingPrompt] = useState(INIT_PLATFORM_PROMPT);
  const [generalPrompt, setGeneralPrompt] = useState(INIT_GENERAL_PROMPT);
  const [promptSaved, setPromptSaved] = useState(true);
  const prompt = promptMode === 'meeting' ? meetingPrompt : generalPrompt;
  const setPrompt = promptMode === 'meeting' ? setMeetingPrompt : setGeneralPrompt;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:24, animation:'fade-in .2s ease-out' }}>
      <Card>
        <div style={{ font:'600 15px/1 var(--font-sans)', color:'var(--genbil-ink)', marginBottom:4 }}>Platform Sales Policies</div>
        <div style={{ font:'400 12px/1.5 var(--font-sans)', color:'var(--genbil-ink-3)', marginBottom:16 }}>Applied to all tenants. Injected into every agent session prompt. Authored directly as Markdown — max {promptMaxChars.toLocaleString()} characters per policy.</div>
        <StatsBar docs={docs} maxTotal={config.doc_max_chars_total} maxCount={config.doc_count_limit} />
        <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:16 }}>
          {docs.map(d=><PolicyRow key={d.id} doc={d}
            onToggle={id=>setDocs(prev=>prev.map(x=>x.id===id?{...x,active:!x.active}:x))}
            onEdit={id=>setEditing(docs.find(x=>x.id===id))}
            onDelete={id=>{setDocs(prev=>prev.filter(x=>x.id!==id));showToast('Policy deleted');}}
            maxChars={promptMaxChars} />)}
          {docs.length===0&&<div style={{ textAlign:'center', padding:'28px 0', color:'var(--genbil-ink-4)', font:'400 13px/1 var(--font-sans)' }}>No policies yet.</div>}
        </div>
        <button onClick={()=>setEditing(docs.length>=config.doc_count_limit?null:{ id:null, name:'', content:'', active:true })}
          disabled={docs.length>=config.doc_count_limit}
          style={{ width:'100%', padding:'11px 0', borderRadius:8, border:`1.5px dashed ${docs.length>=config.doc_count_limit?'var(--genbil-line)':'var(--genbil-line-2)'}`, background:'transparent', cursor:docs.length>=config.doc_count_limit?'not-allowed':'pointer', font:'600 13px/1 var(--font-sans)', color:docs.length>=config.doc_count_limit?'var(--genbil-ink-4)':'var(--sm)' }}>
          {docs.length>=config.doc_count_limit ? 'Policy limit reached' : '+ Add Policy'}
        </button>
        {editing && <PolicyEditorModal policy={editing} maxChars={promptMaxChars}
          onClose={()=>setEditing(null)}
          onSave={saved=>{
            setDocs(prev => saved.id
              ? prev.map(x=>x.id===saved.id?{...x,name:saved.name,content:saved.content}:x)
              : [...prev, { ...saved, id:'pd'+Date.now(), date:new Date().toISOString().slice(0,10) }]);
            setEditing(null);
            showToast(saved.id ? 'Policy updated' : 'Policy added');
          }} />}
      </Card>
      <Card>
        <div style={{ font:'600 15px/1 var(--font-sans)', color:'var(--genbil-ink)', marginBottom:4 }}>Platform System Prompt</div>
        <div style={{ font:'400 12px/1.5 var(--font-sans)', color:'var(--genbil-ink-3)', marginBottom:16 }}>The agent uses one of two prompts per session, selected deterministically by the app based on whether a task/meeting is attached — never inferred by the model itself. Meeting-Based Session max 8,000 characters; General Consultation max 3,000.</div>
        <div style={{ display:'flex', gap:8, marginBottom:20, borderBottom:'1px solid var(--genbil-line)' }}>
          {[['meeting','Meeting-Based Session'],['general','General Consultation']].map(([id,label])=>(
            <button key={id} onClick={()=>setPromptMode(id)}
              style={{ padding:'9px 4px', marginBottom:-1, border:'none', borderBottom:'2px solid '+(promptMode===id?'var(--sm)':'transparent'), background:'transparent', cursor:'pointer', font: (promptMode===id?'700':'500')+' 13px/1 var(--font-sans)', color: promptMode===id?'var(--sm)':'var(--genbil-ink-3)' }}>{label}</button>
          ))}
        </div>
        <div style={{ font:'400 12px/1.5 var(--font-sans)', color:'var(--genbil-ink-3)', marginBottom:20 }}>
          {promptMode==='meeting'
            ? 'Used by Start Session on a Mentor Task — a task_id is present, so customer/opportunity/product/market context is already resolved and injected alongside this prompt.'
            : 'Used by the “Sales Consultant” button — no task_id, no meeting context. The agent asks the rep what they need help with before coaching.'}
        </div>
        <PromptEditor value={prompt} onChange={v=>{setPrompt(v);setPromptSaved(false);}} maxChars={promptMode==='meeting'?8000:3000} label={promptMode==='meeting'?'Meeting-Based Session Prompt':'General Consultation Prompt'} />
        <div style={{ display:'flex', justifyContent:'flex-end', marginTop:14 }}>
          <button onClick={()=>{setPromptSaved(true);showToast('Saved');}} disabled={promptSaved}

            <Icon name={promptSaved?'check':'save'} size={13} color={promptSaved?'var(--genbil-ink-4)':'#fff'} />{promptSaved?'Saved':'Save'}
          </button>
        </div>
      </Card>
    </div>
  );
};

  const [dirty, setDirty] = useState(false);
  const [testState, setTestState] = useState('idle'); // idle | testing | success | failed
  const set = (k,v) => { setDraft(d=>({...d,[k]:v})); setDirty(true); setTestState('idle'); };
  const save = () => { setConfig(draft); setDirty(false); showToast('Configuration saved'); };
  const cancel = () => { setDraft({...config}); setDirty(false); setTestState('idle'); };
  const p = draft.active_provider;

  const runTest = async () => {
    setTestState('testing');
    await new Promise(r => setTimeout(r, 1800));
    // Simulate: succeed if an API key field is non-empty for the selected provider
    const hasKey = p === 'gemini_live' ? !!draft.gemini_api_key_ref
      : p === 'azure_openai_realtime' ? (!!draft.aoai_endpoint && !!draft.aoai_api_key_ref)
      : (!!draft.azure_voice_endpoint && !!draft.azure_voice_api_key_ref);

                  </Field>

                    <Field label="Voice Name" hint={draft.avl_voice_type==='azure-standard'?'e.g. en-US-EmmaNeural, tr-TR-EmelNeural':'Custom voice name in your Foundry resource.'}>

                    </Field>
                    {draft.avl_voice_type==='azure-custom' && (
                      <Field label="Custom Voice Endpoint ID" hint="GUID of the deployed custom voice endpoint.">
                        <input value={draft.avl_voice_endpoint_id} onChange={e=>set('avl_voice_endpoint_id',e.target.value)} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style={iStyle({fontFamily:'var(--font-mono)',fontSize:12})} />
                      </Field>
                    )}
                  </div>
                </div>

                <Field label="STT Languages" hint="Comma-separated BCP-47 codes for Azure Speech STT. First language is primary. Leave blank for auto-multilingual." required>
                  <input value={draft.avl_stt_languages} onChange={e=>set('avl_stt_languages',e.target.value)} placeholder="en-US,tr-TR" style={iStyle({fontFamily:'var(--font-mono)',fontSize:12})} />
                </Field>

                <div style={{ height:1, background:'var(--genbil-line)', margin:'4px 0' }} />
                <div style={{ font:'500 11px/1 var(--font-sans)', color:'var(--genbil-ink-4)', letterSpacing:'.06em', textTransform:'uppercase' }}>Optional Inference Parameters</div>
                <div style={grid2}>
                  <Field label="Temperature" hint="0.0 – 1.0 for Azure custom voices; 0.0 – 2.0 for LLM.">
                    <input type="number" step="0.05" min="0" max="2" value={draft.avl_temperature} onChange={e=>set('avl_temperature',parseFloat(e.target.value))} style={iStyle()} />
                  </Field>
                  <Field label="Max Completion Tokens">
                    <input type="number" step="128" min="256" max="32000" value={draft.avl_max_tokens} onChange={e=>set('avl_max_tokens',parseInt(e.target.value))} style={iStyle()} />
                  </Field>
                </div>
              </div>
            </Card>
          )}

      )}

      {/* ── DOCUMENT LIMITS TAB ── */}
      {tab==='limits' && (
        <Card>
          <div style={{ font:'600 14px/1 var(--font-sans)', color:'var(--genbil-ink)', marginBottom:4 }}>Session & Document Limits</div>

            <button onClick={save} style={{ display:'flex', alignItems:'center', gap:6, padding:'9px 20px', borderRadius:8, border:'none', background:'var(--sm)', color:'#fff', cursor:'pointer', font:'600 13px/1 var(--font-sans)' }}>

          </div>
        </div>
      )}

  );
};

const DB_TABLES = DB_SCHEMA.map(s => s.table);

const DbManagementPanel = ({ showToast }) => {
  const [connStr, setConnStr] = React.useState('');
  const [connState, setConnState] = React.useState('idle'); // idle | testing | success | failed
  const [tableStatus, setTableStatus] = React.useState({}); // { tableName: 'exists' | 'missing' }
  const [colStatus,   setColStatus]   = React.useState({}); // { tableName: [{name, type, exists, changed}] }
  const [creating, setCreating] = React.useState(false);
  const [updating, setUpdating] = React.useState(false);
  const [opLog,    setOpLog]    = React.useState([]);
  const [activeTab, setActiveTab] = React.useState('tables'); // tables | schema
  const connected = connState === 'success';

  const testConn = async () => {
    if (!connStr.trim()) { showToast('Enter a connection string first', false); return; }
    setConnState('testing');
    setTableStatus({}); setColStatus({}); setOpLog([]);
    await new Promise(r => setTimeout(r, 1600));
    const ok = connStr.trim().length > 0;
    if (ok) {
      setConnState('success');
      showToast('Database connection succeeded');
      // Simulate: first 14 tables exist with some missing cols; rest fully missing
      const tStatus = {};
      const cStatus = {};
      DB_SCHEMA.forEach((tbl, i) => {
        if (i < 14) {
          tStatus[tbl.table] = 'exists';
          // Simulate: last 2 cols of each existing table are 'missing' or 'changed'
          cStatus[tbl.table] = tbl.columns.map((c, j) => ({
            ...c,
            exists:  j < tbl.columns.length - 2,
            changed: j === tbl.columns.length - 2,
          }));
        } else {
          tStatus[tbl.table] = 'missing';
          cStatus[tbl.table] = tbl.columns.map(c => ({...c, exists:false, changed:false}));
        }
      });
      setTableStatus(tStatus);
      setColStatus(cStatus);
    } else {
      setConnState('failed');
      showToast('Connection failed — check connection string', false);
    }
  };

  const createTables = async () => {
    const missing = DB_TABLES.filter(t => tableStatus[t] === 'missing');
    if (!missing.length) { showToast('All tables already exist'); return; }
    setCreating(true); setOpLog([]);
    for (const tbl of missing) {
      await new Promise(r => setTimeout(r, 180));
      setOpLog(l => [...l, { op:'CREATE TABLE', table:tbl, ok:true }]);
      setTableStatus(s => ({...s, [tbl]: 'exists'}));
      setColStatus(s => ({...s, [tbl]: DB_SCHEMA.find(d=>d.table===tbl).columns.map(c=>({...c,exists:true,changed:false}))}));
    }
    setCreating(false);
    showToast('All missing tables created successfully');
  };

  const runSchemaUpdate = async () => {
    const ops = [];
    DB_SCHEMA.forEach(tbl => {
      if (tableStatus[tbl.table] !== 'exists') return;
      (colStatus[tbl.table]||[]).forEach(col => {
        if (!col.exists) ops.push({op:'ADD COLUMN', table:tbl.table, col:col.name, type:col.type});
        else if (col.changed) ops.push({op:'ALTER COLUMN', table:tbl.table, col:col.name, type:col.type});
      });
    });
    if (!ops.length) { showToast('Schema is up to date — no changes needed'); return; }
    setUpdating(true); setOpLog([]);
    for (const op of ops) {
      await new Promise(r => setTimeout(r, 160));
      const sql = op.op === 'ADD COLUMN'
        ? `ALTER TABLE ${op.table} ADD COLUMN IF NOT EXISTS ${op.col} ${op.type}`
        : `ALTER TABLE ${op.table} ALTER COLUMN ${op.col} TYPE ${op.type}`;
      setOpLog(l => [...l, { op: op.op, table: op.table, col: op.col, sql, ok:true }]);
      setColStatus(s => ({...s, [op.table]: (s[op.table]||[]).map(c => c.name===op.col ? {...c, exists:true, changed:false} : c)}));
    }
    setUpdating(false);
    showToast(`Schema update complete — ${ops.length} operation${ops.length>1?'s':''} applied`);
  };

  const existCount   = DB_TABLES.filter(t => tableStatus[t] === 'exists').length;
  const missingCount = DB_TABLES.filter(t => tableStatus[t] === 'missing').length;
  const addColCount  = Object.values(colStatus).flat().filter(c => !c.exists).length;
  const altColCount  = Object.values(colStatus).flat().filter(c => c.exists && c.changed).length;
  const schemaDirty  = addColCount > 0 || altColCount > 0;
  const allGood = connected && missingCount === 0 && existCount === DB_TABLES.length && !schemaDirty;

  const connBtnStyle = (bg, border, color) => ({ padding:'9px 20px', borderRadius:8, border:`1px solid ${border}`, background:bg, font:'600 12.5px/1 var(--font-sans)', color, cursor:'pointer' });
  const tabBtn = (t, lbl) => <button onClick={()=>setActiveTab(t)} style={{ padding:'9px 18px', border:'none', background:'none', cursor:'pointer', borderBottom:`2px solid ${activeTab===t?'var(--sm)':'transparent'}`, font:`${activeTab===t?'600':'400'} 13px/1 var(--font-sans)`, color:activeTab===t?'var(--sm)':'var(--genbil-ink-3)', marginBottom:-1 }}>{lbl}</button>;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20, animation:'fade-in .2s ease-out' }}>

      {/* Overall status */}
      <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 16px', borderRadius:10,
        background: allGood ? '#F0FDF4' : '#FFFBEB',
        border: `1px solid ${allGood ? '#BBF7D0' : '#FDE68A'}` }}>
        <span style={{ fontSize:15 }}>{allGood ? '\u2705' : '\u26A0\uFE0F'}</span>
        <span style={{ font:'600 13px/1 var(--font-sans)', color: allGood ? '#166534' : '#92400E' }}>
          {allGood ? 'Database ready \u2014 all 21 tables and columns are up to date' :
            !connected ? 'Not connected \u2014 enter connection string and test' :
            missingCount > 0 ? `${missingCount} table${missingCount>1?'s':''} missing` :
            schemaDirty ? `Schema drift detected \u2014 ${addColCount} column${addColCount!==1?'s':''} to add, ${altColCount} to alter` :
            'Checking\u2026'}
        </span>
      </div>

      {/* Connection String */}
      <Card>
        <div style={{ marginBottom:16 }}>
          <div style={{ font:'600 14px/1 var(--font-sans)', color:'var(--genbil-ink)' }}>PostgreSQL Connection</div>
          <div style={{ font:'400 12px/1.4 var(--font-sans)', color:'var(--genbil-ink-4)', marginTop:3 }}>Connection string is stored encrypted in Azure Key Vault. Never logged or transmitted in plain text.</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <Field label="Connection String" hint="Format: Host=...;Database=...;Username=...;Password=...;Ssl Mode=Require" required>
            <input
              type="password"
              value={connStr}
              onChange={e=>{ setConnStr(e.target.value); setConnState('idle'); setTableStatus({}); setColStatus({}); }}
              placeholder="Host=your-host.postgres.database.azure.com;Database=aibus_salesmentor;Username=admin;Password=***"
              style={{...iStyle(), fontFamily:'var(--font-mono)', fontSize:12}}
            />
          </Field>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            {connState === 'idle'    && <button onClick={testConn} style={connBtnStyle('var(--genbil-ink)','var(--genbil-ink)','#fff')}>Test Connection</button>}
            {connState === 'testing' && <button disabled style={connBtnStyle('#F8FAFC','var(--genbil-line)','var(--genbil-ink-4)')}>Testing\u2026</button>}
            {connState === 'success' && <button onClick={testConn} style={connBtnStyle('#F0FDF4','#22C55E','#166534')}>✓ Connected \u2014 Re-test</button>}
            {connState === 'failed'  && <button onClick={testConn} style={connBtnStyle('#FEF2F2','#FCA5A5','#DC2626')}>✗ Failed \u2014 Retry</button>}
            {connState === 'success' && <span style={{ font:'400 12px/1 var(--font-sans)', color:'#22C55E' }}>Connected successfully</span>}
            {connState === 'failed'  && <span style={{ font:'400 12px/1 var(--font-sans)', color:'#DC2626' }}>Could not connect \u2014 verify credentials</span>}
          </div>
        </div>
      </Card>

      {/* Table Status + Schema Update Tabs */}
      {connected && (
        <Card>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10, marginBottom:0 }}>
            <div style={{ display:'flex', borderBottom:'1px solid var(--genbil-line)', flex:1 }}>
              {tabBtn('tables', `Tables (${existCount}/${DB_TABLES.length})`)}
              {tabBtn('schema', `Schema${schemaDirty ? ` ⚠ ${addColCount+altColCount}` : ' ✓'}`)}
            </div>
            <div style={{ display:'flex', gap:8, paddingBottom:4 }}>
              {activeTab==='tables' && missingCount > 0 && (
                <button onClick={createTables} disabled={creating}
                  style={{ padding:'8px 16px', borderRadius:7, border:'none', background:creating?'#F1F5F9':'var(--sm)', color:creating?'var(--genbil-ink-4)':'#fff', font:'600 12px/1 var(--font-sans)', cursor:creating?'not-allowed':'pointer' }}>
                  {creating ? 'Creating…' : `Create ${missingCount} Missing Table${missingCount>1?'s':''}`}
                </button>
              )}
              {activeTab==='schema' && schemaDirty && (
                <button onClick={runSchemaUpdate} disabled={updating}
                  style={{ padding:'8px 16px', borderRadius:7, border:'none', background:updating?'#F1F5F9':'var(--sm)', color:updating?'var(--genbil-ink-4)':'#fff', font:'600 12px/1 var(--font-sans)', cursor:updating?'not-allowed':'pointer' }}>
                  {updating ? 'Updating…' : `Run Schema Update (${addColCount+altColCount} ops)`}
                </button>
              )}
            </div>
          </div>

          {/* Tables tab */}
          {activeTab==='tables' && (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))', gap:7, marginTop:16 }}>
              {DB_TABLES.map(t => {
                const st = tableStatus[t];
                return (
                  <div key={t} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', borderRadius:7,
                    background:st==='exists'?'#F0FDF4':'#FEF2F2',
                    border:`1px solid ${st==='exists'?'#BBF7D0':'#FCA5A5'}` }}>
                    <span style={{ fontSize:12, flexShrink:0 }}>{st==='exists'?'✓':'✗'}</span>
                    <span style={{ font:'500 11px/1.2 var(--font-mono)', color:'var(--genbil-ink-2)', wordBreak:'break-all' }}>{t}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Schema tab */}
          {activeTab==='schema' && (
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:16 }}>
              {!schemaDirty && !missingCount && (
                <div style={{ padding:'24px', textAlign:'center', font:'400 13px/1 var(--font-sans)', color:'var(--genbil-ink-4)' }}>✅ All columns match the schema definition.</div>
              )}
              {DB_SCHEMA.map(tbl => {
                if (tableStatus[tbl.table] !== 'exists') return null;
                const cols = (colStatus[tbl.table]||[]).filter(c => !c.exists || c.changed);
                if (!cols.length) return null;
                return (
                  <div key={tbl.table} style={{ border:'1px solid var(--genbil-line)', borderRadius:8, overflow:'hidden' }}>
                    <div style={{ padding:'8px 14px', background:'var(--genbil-paper-2)', font:'600 12px/1 var(--font-mono)', color:'var(--genbil-ink)' }}>{tbl.table}</div>
                    {cols.map(col => (
                      <div key={col.name} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 14px', borderTop:'1px solid var(--genbil-line)',
                        background: col.changed ? '#FFFBEB' : '#FEF2F2' }}>
                        <span style={{ font:'600 10px/1 var(--font-sans)', padding:'2px 7px', borderRadius:4,
                          background: col.changed?'#FDE68A':'#FCA5A5', color: col.changed?'#92400E':'#991B1B' }}>
                          {col.changed ? 'ALTER' : 'ADD'}
                        </span>
                        <span style={{ font:'500 12px/1 var(--font-mono)', color:'var(--genbil-ink-2)', flex:1 }}>{col.name}</span>
                        <span style={{ font:'400 11px/1 var(--font-mono)', color:'var(--genbil-ink-4)' }}>{col.type}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      )}

      {/* Operation Log */}
      {opLog.length > 0 && (
        <Card style={{ padding:0, overflow:'hidden' }}>
          <div style={{ padding:'10px 16px', background:'var(--genbil-paper-2)', font:'600 12px/1 var(--font-sans)', color:'var(--genbil-ink-3)', borderBottom:'1px solid var(--genbil-line)' }}>
            Operation Log
          </div>
          <div style={{ maxHeight:200, overflowY:'auto', background:'#0B1220', padding:'12px 16px' }}>
            {opLog.map((l,i) => (
              <div key={i} style={{ font:'400 11.5px/1.8 var(--font-mono)', color: l.ok?'#4ADE80':'#F87171' }}>
                {l.ok ? '✓' : '✗'} {l.op === 'CREATE TABLE'
                  ? `CREATE TABLE IF NOT EXISTS ${l.table} — OK`
                  : l.op === 'ADD COLUMN'
                  ? `ALTER TABLE ${l.table} ADD COLUMN IF NOT EXISTS ${l.col} ${l.type} — OK`
                  : `ALTER TABLE ${l.table} ALTER COLUMN ${l.col} TYPE ${l.type} — OK`}
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
};

/* ── PAGE META ── */
const PAGE_META = {
  'platform-docs': { title:'Sales Intelligence',   sub:'Documents and the system prompt applied to all tenants.' },
  'config':        { title:'Global Configuration', sub:'Active AI + Voice provider, credentials, and document limits for this deployment.' },
  'database':      { title:'Database Management', sub:'PostgreSQL connection, table provisioning and schema status.' },
};

/* ── SIDE NAV ── */
const sideNav = [
  { id:'platform-docs', label:'Sales Intelligence',   icon:'file2'   },
  { id:'config',        label:'Global Configuration', icon:'sliders' },
  { id:'database',      label:'Database Management',  icon:'db'      },
];

/* ── APP ── */
const App = () => {
  const [active, setActive] = useState('platform-docs');
  const [config, setConfig] = useState(INIT_GLOBAL_CONFIG);
  const [toast, setToast] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2800); };
  const meta = PAGE_META[active];
  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', fontFamily:'var(--font-sans)', background:'var(--genbil-paper-2)' }}>
      <aside style={{ width:'var(--nav-w)', flexShrink:0, background:'#0F172A', display:'flex', flexDirection:'column', borderRight:'1px solid rgba(255,255,255,.06)' }}>
        <div style={{ padding:'20px 20px 16px', borderBottom:'1px solid rgba(255,255,255,.08)', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:30, height:30, borderRadius:8, background:'var(--sm)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </div>
          <div>
            <div style={{ font:'700 13px/1 var(--font-sans)', color:'#F1F5F9' }}>Sales Mentor</div>
            <div style={{ font:'400 10px/1 var(--font-sans)', color:'#64748B', marginTop:2 }}>SaaS Admin</div>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'12px 8px' }}>
          <div style={{ font:'600 10px/1 var(--font-sans)', letterSpacing:'.1em', textTransform:'uppercase', color:'#475569', padding:'0 10px', marginBottom:6 }}>SaaS Admin</div>
          {sideNav.map(item=>(
            <button key={item.id} onClick={()=>setActive(item.id)} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'9px 10px', borderRadius:8, border:'none', cursor:'pointer', textAlign:'left', background:active===item.id?'rgba(124,58,237,.2)':'transparent', color:active===item.id?'#a78bfa':'#94A3B8', font:`${active===item.id?'600':'400'} 13px/1 var(--font-sans)`, transition:'all .12s' }}>
              <Icon name={item.icon} size={15} />{item.label}
            </button>
          ))}
        </div>
        <div style={{ padding:'14px 16px', borderTop:'1px solid rgba(255,255,255,.06)', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:28, height:28, borderRadius:'50%', background:'linear-gradient(135deg,var(--sm) 0%,#a855f7 100%)', display:'flex', alignItems:'center', justifyContent:'center', font:'600 10px/1 var(--font-sans)', color:'#fff', flexShrink:0 }}>SA</div>
          <div>
            <div style={{ font:'500 12px/1 var(--font-sans)', color:'#CBD5E1' }}>SaaS Admin</div>
            <div style={{ font:'400 10px/1 var(--font-sans)', color:'#64748B', marginTop:2 }}>admin@salesmentor.ai</div>
          </div>
        </div>
      </aside>
      <main style={{ flex:1, overflowY:'auto', padding:'32px 36px' }}>
        <div style={{ maxWidth:800 }}>
          <h1 style={{ font:'700 22px/1 var(--font-sans)', color:'var(--genbil-ink)', marginBottom:6 }}>{meta.title}</h1>
          <p style={{ font:'400 13px/1.5 var(--font-sans)', color:'var(--genbil-ink-3)', margin:'0 0 28px' }}>{meta.sub}</p>
          {active==='platform-docs' && <PlatformDocsPanel config={config} showToast={showToast} />}
          {active==='config'        && <GlobalConfigPanel config={config} setConfig={setConfig} showToast={showToast} />}
          {active==='database'      && <DbManagementPanel showToast={showToast} />}
        </div>
      </main>
      {toast && <Toast msg={toast} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
